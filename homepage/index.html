<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    (function () {
      const targetHost = "5g88-main.vercel.app";

      // ✅ kalau dah berada di main, jangan redirect lagi
      if (location.hostname === targetHost) return;

      const targetBase = "https://" + targetHost;
      const newUrl = targetBase + location.pathname + location.search + location.hash;

      location.replace(newUrl);
    })();
  </script>

  <noscript>
    <meta http-equiv="refresh" content="0; url=https://5g88-main.vercel.app">
  </noscript>
</head>
<body></body>
</html>
