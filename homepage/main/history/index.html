<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tab History</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
:root{
  --page-bg:#000;
  --page-text:rgba(255,255,255,0.85);
  --page-input:#141414;
  --border-input:#424242;
  --blue:#1668dc;
  --blue-hover:#3c89e8;
  --blue-active:#1554ad;
  --soft:#8b9bb4;
  --bg-chip:rgba(255,255,255,0.12);
}

*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  font-family:Inter,Segoe UI,Arial,sans-serif;
  background:
    radial-gradient(circle at top left, rgba(22,104,220,.16), transparent 30%),
    linear-gradient(180deg, #050505, var(--page-bg));
  color:var(--page-text);
  padding:18px;
}

.history-wrap{
  max-width:1250px;
  margin:0 auto;
}

/* ===== STATS TABLE ===== */
.stats-table-wrap{
  width:100%;
  margin-bottom:14px;
  border:1px solid var(--border-input);
  border-radius:16px;
  overflow:hidden;
  background:rgba(11,11,11,.92);
  box-shadow:0 16px 42px rgba(0,0,0,.28);
}

.stats-table{
  width:100%;
  border-collapse:collapse;
}

.stats-table thead{
  background:rgba(255,255,255,.045);
}

.stats-table th{
  text-align:left;
  padding:12px 14px;
  font-size:12px;
  color:#9ca3af;
  font-weight:800;
  border-bottom:1px solid var(--border-input);
  white-space:nowrap;
}

.stats-table td{
  padding:14px;
  font-size:22px;
  color:#fff;
  font-weight:900;
  border-bottom:1px solid rgba(255,255,255,.06);
}

.stats-table tr:last-child td{
  border-bottom:none;
}

/* ===== MAIN TABLE ===== */
.panel{
  background:rgba(11,11,11,.92);
  border:1px solid var(--border-input);
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
  overflow:hidden;
}

.table-wrap{
  width:100%;
  overflow:auto;
}

.history-table{
  width:100%;
  min-width:760px;
  border-collapse:collapse;
}

.history-table thead{
  background:rgba(255,255,255,.045);
}

.history-table th{
  text-align:left;
  padding:13px 14px;
  font-size:12px;
  color:#9ca3af;
  font-weight:800;
  border-bottom:1px solid var(--border-input);
  white-space:nowrap;
}

.history-table td{
  padding:14px;
  font-size:13px;
  color:var(--page-text);
  border-bottom:1px solid rgba(255,255,255,.08);
  vertical-align:middle;
}

.history-table tbody tr{
  transition:.18s ease;
}

.history-table tbody tr:hover{
  background:rgba(22,104,220,.10);
}

.history-table tbody tr:last-child td{
  border-bottom:none;
}

.no-col{
  width:58px;
  color:#9ca3af;
}

.tab-name{
  color:#fff;
  font-weight:900;
}

.group-chip{
  display:inline-flex;
  padding:5px 9px;
  border-radius:999px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.10);
  color:#dbeafe;
  font-size:12px;
  text-transform:uppercase;
}

.count-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:38px;
  height:24px;
  padding:0 9px;
  border-radius:999px;
  background:rgba(22,104,220,.16);
  color:#8bbdff;
  border:1px solid rgba(22,104,220,.35);
  font-weight:900;
}

.empty-cell{
  text-align:center !important;
  padding:45px 20px !important;
  color:#6b7280 !important;
}

::-webkit-scrollbar{
  width:8px;
  height:8px;
}
::-webkit-scrollbar-track{
  background:transparent;
}
::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,.18);
  border-radius:999px;
}
::-webkit-scrollbar-thumb:hover{
  background:rgba(255,255,255,.3);
}

@media(max-width:700px){
  body{ padding:12px; }

  .stats-table{
    min-width:650px;
  }

  .stats-table-wrap{
    overflow:auto;
  }

  .history-table{
    min-width:680px;
  }
}
</style>
</head>

<body>
<div class="history-wrap">

  <div class="stats-table-wrap">
    <table class="stats-table">
      <thead>
        <tr>
          <th>Total Opened</th>
          <th>Unique Tabs</th>
          <th>Most Opened</th>
          <th>Last Opened</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td id="totalOpened">0</td>
          <td id="uniqueTabs">0</td>
          <td id="mostOpened">-</td>
          <td id="lastOpened">-</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="panel">
    <div class="table-wrap">
      <table class="history-table">
        <thead>
          <tr>
            <th class="no-col">No</th>
            <th>Tab Name</th>
            <th>Group</th>
            <th>Open Count</th>
            <th>Last Opened</th>
          </tr>
        </thead>
        <tbody id="historyTableBody">
          <tr>
            <td colspan="5" class="empty-cell">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
const blurphpApp = firebase.initializeApp({
  apiKey: "AIzaSyCKmrlS4qrZCrMNRIfIRCWCbNgZT1uQ3ZI",
  authDomain: "blurphp.firebaseapp.com",
  databaseURL: "https://blurphp-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "blurphp",
  storageBucket: "blurphp.appspot.com",
  messagingSenderId: "593904200464",
  appId: "1:593904200464:web:cea7bc1360532c20d99395",
  measurementId: "G-R494S2DPZ5"
}, "historyBlurphpApp");

const blurphpDb = blurphpApp.database();

let currentUser = null;
let allHistory = [];

const els = {
  totalOpened: document.getElementById("totalOpened"),
  uniqueTabs: document.getElementById("uniqueTabs"),
  mostOpened: document.getElementById("mostOpened"),
  lastOpened: document.getElementById("lastOpened"),
  historyTableBody: document.getElementById("historyTableBody")
};

function safeUserKey(email) {
  return String(email || "guest")
    .trim()
    .toLowerCase()
    .replace(/[.#$\[\]/\s]/g, "_");
}

function getLoginFromLocal() {
  try {
    return JSON.parse(localStorage.getItem("gmailLogin") || "{}");
  } catch {
    return {};
  }
}

function requestLoginFromParent() {
  try {
    window.parent.postMessage({ type: "request-login" }, "*");
  } catch {}
}

window.addEventListener("message", (event) => {
  const data = event.data || {};

  if (data.type === "user-login" && data.user && data.user.email) {
    currentUser = data.user;
    localStorage.setItem("gmailLogin", JSON.stringify(currentUser));
    loadHistory();
  }
});

function formatDate(ms) {
  const d = new Date(Number(ms || 0));
  if (isNaN(d.getTime())) return "-";

  const dd = String(d.getDate()).padStart(2, "0");
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const yy = d.getFullYear();
  const hh = String(d.getHours()).padStart(2, "0");
  const mi = String(d.getMinutes()).padStart(2, "0");
  const ss = String(d.getSeconds()).padStart(2, "0");

  return `${dd}-${mm}-${yy} ${hh}:${mi}:${ss}`;
}

function shortDate(ms) {
  const d = new Date(Number(ms || 0));
  if (isNaN(d.getTime())) return "-";

  const dd = String(d.getDate()).padStart(2, "0");
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const hh = String(d.getHours()).padStart(2, "0");
  const mi = String(d.getMinutes()).padStart(2, "0");

  return `${dd}/${mm} ${hh}:${mi}`;
}

function escapeHtml(str) {
  return String(str || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function normalizeHistoryItem(item) {
  return {
    label: String(item.label || "UNKNOWN").trim().toUpperCase(),
    url: String(item.url || ""),
    group: String(item.group || "none").toLowerCase(),
    route: String(item.route || ""),
    openedAt: Number(item.openedAt || 0)
  };
}

function buildSummary(list) {
  const map = new Map();

  list.forEach(item => {
    const key = item.label;

    if (!map.has(key)) {
      map.set(key, {
        label: item.label,
        group: item.group,
        count: 0,
        lastOpened: 0
      });
    }

    const cur = map.get(key);
    cur.count += 1;
    cur.lastOpened = Math.max(cur.lastOpened, item.openedAt || 0);
  });

  return [...map.values()].sort((a, b) => {
    if (b.count !== a.count) return b.count - a.count;
    return b.lastOpened - a.lastOpened;
  });
}

function renderStats(list, summary) {
  els.totalOpened.textContent = list.length;
  els.uniqueTabs.textContent = summary.length;
  els.mostOpened.textContent = summary[0] ? summary[0].count : "-";
  els.lastOpened.textContent = list[0] ? shortDate(list[0].openedAt) : "-";
}

function renderTable(summary) {
  if (!summary.length) {
    els.historyTableBody.innerHTML = `
      <tr>
        <td colspan="5" class="empty-cell">No history found.</td>
      </tr>
    `;
    return;
  }

  els.historyTableBody.innerHTML = summary.map((item, index) => `
    <tr>
      <td class="no-col">${index + 1}</td>
      <td><span class="tab-name">${escapeHtml(item.label)}</span></td>
      <td><span class="group-chip">${escapeHtml(item.group || "none")}</span></td>
      <td><span class="count-badge">${item.count}x</span></td>
      <td>${escapeHtml(formatDate(item.lastOpened))}</td>
    </tr>
  `).join("");
}

function renderAll() {
  const summary = buildSummary(allHistory);
  renderStats(allHistory, summary);
  renderTable(summary);
}

function loadLocalBackup(userKey) {
  try {
    const localKey = `tabHistory_${userKey}`;
    const list = JSON.parse(localStorage.getItem(localKey) || "[]");
    return Array.isArray(list) ? list.map(normalizeHistoryItem) : [];
  } catch {
    return [];
  }
}

function loadHistory() {
  const login = currentUser || getLoginFromLocal();
  const email = String(login.email || "").trim().toLowerCase();

  if (!email) {
    els.historyTableBody.innerHTML = `
      <tr>
        <td colspan="5" class="empty-cell">
          No login data found. Open this page inside main iframe.
        </td>
      </tr>
    `;
    requestLoginFromParent();
    return;
  }

  const userKey = safeUserKey(email);

  els.historyTableBody.innerHTML = `
    <tr>
      <td colspan="5" class="empty-cell">Loading...</td>
    </tr>
  `;

  blurphpDb.ref(`users/${userKey}/tabHistory`)
    .orderByChild("openedAt")
    .limitToLast(500)
    .on("value", snap => {
      const data = snap.val() || {};

      const firebaseList = Object.values(data)
        .map(normalizeHistoryItem)
        .filter(x => x.label && x.openedAt);

      const localList = loadLocalBackup(userKey);
      const merged = [...firebaseList, ...localList];

      const uniqueMap = new Map();
      merged.forEach(item => {
        const key = `${item.label}_${item.url}_${item.openedAt}`;
        uniqueMap.set(key, item);
      });

      allHistory = [...uniqueMap.values()]
        .sort((a, b) => b.openedAt - a.openedAt);

      renderAll();
    }, err => {
      console.warn("History load error:", err);
      els.historyTableBody.innerHTML = `
        <tr>
          <td colspan="5" class="empty-cell">
            Failed to load Firebase history. Please check Firebase rules.
          </td>
        </tr>
      `;
    });
}

document.addEventListener("DOMContentLoaded", () => {
  currentUser = getLoginFromLocal();

  if (!currentUser || !currentUser.email) {
    requestLoginFromParent();
  }

  setTimeout(loadHistory, 250);
});
</script>
</body>
</html>
