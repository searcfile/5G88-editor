<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My History</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
  --bg: #050505;
  --card: #111;
  --card2: #171717;
  --border: rgba(255,255,255,.12);
  --text: #fff;
  --muted: #aaa;
  --gold: #d6a84f;
  --gold2: #f6d98b;
  --danger: #ef4444;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.history-page {
  width: 100%;
  min-height: 100vh;
  padding: 16px;
}

.history-layout {
  display: grid;
  grid-template-columns: 400px 1fr;
  gap: 8px;
}

.left-panel,
.right-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.panel-head {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #181818, #101010);
  font-weight: 700;
  color: var(--gold2);
}

.search-box {
  padding: 10px;
  border-bottom: 1px solid var(--border);
}

.search-box input {
  width: 100%;
  height: 36px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: #070707;
  color: #fff;
  padding: 0 12px;
  outline: none;
}

.search-box input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(214,168,79,.15);
}

.tab-list {
  max-height: calc(100vh - 150px);
  overflow: auto;
  padding: 8px;
}

.tab-item {
  width: 100%;
  border: 1px solid var(--border);
  background: var(--card2);
  color: #fff;
  text-align: left;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: .18s;
}

.tab-item:hover,
.tab-item.active {
  border-color: var(--gold);
  background: rgba(214,168,79,.12);
}

.tab-name {
  font-weight: 800;
  font-size: 14px;
}

.tab-meta {
  margin-top: 5px;
  font-size: 12px;
  color: var(--muted);
}

.status-open {
  color: #22c55e;
}

.status-closed {
  color: #aaa;
}

.detail-wrap {
  padding: 14px;
}

.detail-empty {
  color: var(--muted);
  text-align: center;
  padding: 50px 10px;
}

.detail-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(120px, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}

.stat-card {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
}

.stat-label {
  color: var(--muted);
  font-size: 12px;
}

.stat-value {
  margin-top: 6px;
  font-size: 18px;
  font-weight: 800;
  color: var(--gold2);
}
.stats-table-wrap {
  margin-bottom: 14px;
  overflow: auto;
  border: 1px solid var(--border);
  border-radius: 12px;
}

.stats-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 620px;
}

.stats-table th,
.stats-table td {
  padding: 11px 12px;
  border-bottom: 1px solid var(--border);
  text-align: left;
  font-size: 14px;
}

.stats-table th {
  background: #181818;
  color: var(--gold2);
}

.stats-table td {
  color: #fff;
  font-weight: 700;
}

.stats-table td:nth-child(2) {
  color: var(--gold2);
}
.table-wrap {
  overflow: auto;
  border: 1px solid var(--border);
  border-radius: 12px;
}
table th:nth-child(2),
table td:nth-child(2) {
  text-align: center;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 520px;
}

th,
td {
  padding: 11px 12px;
  border-bottom: 1px solid var(--border);
  text-align: left;
  font-size: 14px;
}

th {
  background: #181818;
  color: var(--gold2);
  position: sticky;
  top: 0;
}

tr:last-child td {
  border-bottom: none;
}

.count-badge {
  display: inline-flex;
  min-width: 34px;
  height: 24px;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  background: rgba(214,168,79,.18);
  border: 1px solid rgba(214,168,79,.35);
  color: var(--gold2);
  font-weight: 800;
}

.logs-box {
  margin-top: 14px;
}

.log-list {
  max-height: 240px;
  overflow: auto;
  border: 1px solid var(--border);
  border-radius: 12px;
}

.log-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.log-row:last-child {
  border-bottom: 0;
}

.log-action {
  color: #fff;
}

.log-time {
  color: var(--muted);
  white-space: nowrap;
}

@media (max-width: 850px) {
  .history-layout {
    grid-template-columns: 1fr;
  }

  .tab-list {
    max-height: 280px;
  }

  .detail-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
/* ================= SCROLLBAR GLOBAL ================= */

/* Chrome, Edge, Safari */
::-webkit-scrollbar {
  width: 6px; /* nipis */
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: #555;
  border-radius: 10px;
  transition: all 0.25s ease;
}

::-webkit-scrollbar-thumb:hover {
  background: #777;
}

/* Firefox */
html {
  scrollbar-width: thin;
  scrollbar-color: #555 transparent;
}
</style>
</head>

<body>
<div class="history-page">

  <div class="history-layout">
    <aside class="left-panel">
      <div class="panel-head">History Tabs</div>
      <div class="search-box">
        <input id="searchInput" type="text" placeholder="Search tab...">
      </div>
      <div id="tabList" class="tab-list"></div>
    </aside>

    <main class="right-panel">
      <div class="panel-head">History Detail</div>
      <div id="detailWrap" class="detail-wrap">
        <div class="detail-empty">Select tab session from left side.</div>
      </div>
    </main>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
const blurphpApp = firebase.initializeApp({
  apiKey: "AIzaSyCKmrlS4qrZCrMNRIfIRCWCbNgZT1uQ3ZI",
  authDomain: "blurphp.firebaseapp.com",
  databaseURL: "https://blurphp-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "blurphp",
  storageBucket: "blurphp.appspot.com",
  messagingSenderId: "593904200464",
  appId: "1:593904200464:web:cea7bc1360532c20d99395"
}, "blurphpHistoryApp");

const blurphpDb = blurphpApp.database();

const tabList = document.getElementById("tabList");
const detailWrap = document.getElementById("detailWrap");
const searchInput = document.getElementById("searchInput");

let allSessions = [];
let selectedSessionId = "";

function historyEmailKey(email) {
  return String(email || "")
    .trim()
    .toLowerCase()
    .replace(/[.#$[\]/]/g, "_");
}

function getLoginData() {
  try {
    return JSON.parse(localStorage.getItem("gmailLogin") || "{}");
  } catch {
    return {};
  }
}

function formatTime(ms) {
  if (!ms) return "-";
  const d = new Date(Number(ms));
  if (isNaN(d.getTime())) return "-";

  const dd = String(d.getDate()).padStart(2, "0");
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const yy = d.getFullYear();
  const hh = String(d.getHours()).padStart(2, "0");
  const mi = String(d.getMinutes()).padStart(2, "0");
  const ss = String(d.getSeconds()).padStart(2, "0");

  return `${dd}-${mm}-${yy} ${hh}:${mi}:${ss}`;
}

function escapeHtml(str) {
  return String(str || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function renderTabList() {
  const q = searchInput.value.trim().toLowerCase();

  const filtered = allSessions.filter(item => {
    const tab = String(item.tab || "").toLowerCase();
    return tab.includes(q);
  });

  if (!filtered.length) {
    tabList.innerHTML = `
      <div class="detail-empty">No history found.</div>
    `;
    detailWrap.innerHTML = `
      <div class="detail-empty">No action detail.</div>
    `;
    return;
  }

  tabList.innerHTML = filtered.map(item => {
    const isActive = item.sessionId === selectedSessionId;
    const status = item.closedAt ? "Closed" : "Open";
    const statusClass = item.closedAt ? "status-closed" : "status-open";

    return `
      <button class="tab-item ${isActive ? "active" : ""}" data-id="${escapeHtml(item.sessionId)}">
        <div class="tab-name">${escapeHtml(item.tab || "UNKNOWN")}</div>
        <div class="tab-meta">
          Total Action: ${Number(item.totalActions || 0)}
        </div>
        <div class="tab-meta">
          Opened: ${formatTime(item.openedAt)}
        </div>
        <div class="tab-meta ${statusClass}">
          ${status}
        </div>
      </button>
    `;
  }).join("");

  tabList.querySelectorAll(".tab-item").forEach(btn => {
    btn.addEventListener("click", () => {
      selectedSessionId = btn.dataset.id;
      renderTabList();
      renderDetail();
    });
  });

  if (!selectedSessionId && filtered[0]) {
    selectedSessionId = filtered[0].sessionId;
    renderTabList();
    renderDetail();
  }
}

function renderDetail() {
  const item = allSessions.find(x => x.sessionId === selectedSessionId);

  if (!item) {
    detailWrap.innerHTML = `
      <div class="detail-empty">Select tab session from left side.</div>
    `;
    return;
  }

let actions = item.actions || {};
const labels = item.actionLabels || {};

// ✅ kalau actions kosong, kira semula dari logs
if (!actions || Object.keys(actions).length === 0) {
  actions = {};

  Object.values(item.logs || {}).forEach(log => {
    const name = String(log.action || "").trim();
    if (!name) return;

    const key = name
      .toLowerCase()
      .replace(/[.#$[\]/]/g, "_")
      .replace(/\s+/g, "_");

    actions[key] = (actions[key] || 0) + 1;
    labels[key] = name;
  });
}

const realTotalActions = Object.values(actions)
  .reduce((sum, n) => sum + Number(n || 0), 0);

const actionRows = Object.entries(actions)
  .sort((a, b) => b[1] - a[1])
  .map(([key, count]) => {
    const name = labels[key] || key;

    return `
      <tr>
        <td>${escapeHtml(name)}</td>
        <td><span class="count-badge">${Number(count || 0)}</span></td>
      </tr>
    `;
  }).join("");

  const logs = item.logs || {};
  const logRows = Object.values(logs)
    .sort((a, b) => Number(b.time || 0) - Number(a.time || 0))
    .slice(0, 50)
    .map(log => `
      <div class="log-row">
        <span class="log-action">${escapeHtml(log.action)}</span>
        <span class="log-time">${formatTime(log.time)}</span>
      </div>
    `).join("");

detailWrap.innerHTML = `
    <div class="stats-table-wrap">
      <table class="stats-table">
        <thead>
          <tr>
            <th>Tab</th>
            <th>Total Action</th>
            <th>Opened At</th>
            <th>Closed At</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>${escapeHtml(item.tab || "-")}</td>
            <td>${realTotalActions}</td>
            <td>${formatTime(item.openedAt)}</td>
            <td>${formatTime(item.closedAt)}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Action Detail</th>
            <th>Total Click</th>
          </tr>
        </thead>
        <tbody>
          ${actionRows || `<tr><td colspan="2">No action yet.</td></tr>`}
        </tbody>
      </table>
    </div>

    <div class="logs-box">
      <div class="panel-head" style="border:1px solid var(--border);border-radius:12px 12px 0 0;">
        History Logs
      </div>
      <div class="log-list">
        ${logRows || `<div class="detail-empty">No logs yet.</div>`}
      </div>
    </div>
  `;
}

function startHistoryListener() {
  const login = getLoginData();

  if (!login.email) {
    detailWrap.innerHTML = `
      <div class="detail-empty">No login data found.</div>
    `;
    return;
  }

  const emailKey = historyEmailKey(login.email);

  blurphpDb.ref(`tabHistory/${emailKey}/sessions`).on("value", snap => {
    const data = snap.val() || {};

    allSessions = Object.values(data).sort((a, b) => {
      return Number(b.openedAt || 0) - Number(a.openedAt || 0);
    });

    if (selectedSessionId && !allSessions.some(x => x.sessionId === selectedSessionId)) {
      selectedSessionId = "";
    }

    renderTabList();
    renderDetail();
  });
}

searchInput.addEventListener("input", renderTabList);

window.addEventListener("message", function(e) {
  const allowedOrigins = [
    "https://5g88-main.vercel.app",
    "https://searcfile.github.io"
  ];

  if (!allowedOrigins.includes(e.origin)) return;

  const data = e.data || {};

  if (data.type === "user-login" && data.user) {
    localStorage.setItem("gmailLogin", JSON.stringify(data.user));
    startHistoryListener();
  }

  if (data.type === "theme-change") {
    document.body.classList.toggle("light-theme", data.theme === "light");
  }
});

startHistoryListener();
</script>
</body>
</html>
