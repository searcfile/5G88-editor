<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tab History</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
:root{
  --bg:#ffffff;
  --panel:#ffffff;
  --panel2:#f6f8fb;
  --text:#111827;
  --soft:#6b7280;
  --border:#d9d9d9;
  --blue:#1668dc;
  --blue-hover:#3c89e8;
  --blue-active:#1554ad;
  --danger:#dc2626;
  --shadow:0 10px 30px rgba(15,23,42,.10);
  --close-hover2:rgba(0,0,0,0.08);

  --page-bg: #000;
  --page-text: rgba(255,255,255,0.85);
  --page-input: #141414;
  --border-input:#424242;
  --page-bg2:#1f1f1f;
  --name:#1668dc;
  --blur:rgba(255,255,255,0.25);

  --xclose-hover:#ffffff;
  --xclose-hover-active:rgba(255,255,255,0.25);
  --bg-chip:rgba(255, 255, 255, 0.12);
  --chip-close:rgba(255,255,255,0.45);
  --chip-menu:#111a2c;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  font-family:Inter,Segoe UI,Arial,sans-serif;
  background:
    radial-gradient(circle at top left, rgba(22,104,220,.20), transparent 32%),
    linear-gradient(180deg, #050505, var(--page-bg));
  color:var(--page-text);
  padding:18px;
}

.history-wrap{
  max-width:1250px;
  margin:0 auto;
}

.header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
  margin-bottom:18px;
}

.title-box h1{
  margin:0;
  font-size:24px;
  color:#fff;
  letter-spacing:.2px;
}

.title-box p{
  margin:7px 0 0;
  font-size:13px;
  color:#8b9bb4;
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-bottom:16px;
}

.stat-card{
  background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.025));
  border:1px solid var(--border-input);
  border-radius:18px;
  padding:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.22);
}

.stat-card .label{
  font-size:12px;
  color:#8b9bb4;
  margin-bottom:9px;
}

.stat-card .value{
  font-size:25px;
  font-weight:800;
  color:#fff;
}

.panel{
  background:rgba(11,11,11,.92);
  border:1px solid var(--border-input);
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
  overflow:hidden;
}

.toolbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:14px;
  border-bottom:1px solid var(--border-input);
  background:rgba(255,255,255,.025);
}

.search-box{
  flex:1;
  position:relative;
  min-width:220px;
}

.search-box input{
  width:100%;
  height:38px;
  border:1px solid var(--border-input);
  background:var(--page-input);
  color:#fff;
  outline:none;
  border-radius:12px;
  padding:0 13px 0 38px;
  transition:.2s;
}

.search-box input::placeholder{
  color:#6b7280;
}

.search-box input:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(22,104,220,.18);
}

.search-box svg{
  position:absolute;
  left:13px;
  top:50%;
  transform:translateY(-50%);
  width:15px;
  height:15px;
  color:#8b9bb4;
}

.select{
  height:38px;
  border:1px solid var(--border-input);
  background:var(--page-input);
  color:#fff;
  border-radius:12px;
  padding:0 12px;
  outline:none;
}

.table-wrap{
  width:100%;
  overflow:auto;
}

.history-table{
  width:100%;
  min-width:900px;
  border-collapse:collapse;
}

.history-table thead{
  background:rgba(255,255,255,.045);
}

.history-table th{
  text-align:left;
  padding:13px 14px;
  font-size:12px;
  color:#9ca3af;
  font-weight:800;
  border-bottom:1px solid var(--border-input);
  white-space:nowrap;
}

.history-table td{
  padding:14px;
  font-size:13px;
  color:var(--page-text);
  border-bottom:1px solid rgba(255,255,255,.08);
  vertical-align:middle;
}

.history-table tbody tr{
  transition:.18s ease;
}

.history-table tbody tr:hover{
  background:rgba(22,104,220,.10);
}

.no-col{
  width:58px;
  color:#8b9bb4;
}

.tab-name{
  color:#fff;
  font-weight:800;
}

.group-chip{
  display:inline-flex;
  padding:5px 9px;
  border-radius:999px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.10);
  color:#dbeafe;
  font-size:12px;
  text-transform:uppercase;
}

.count-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:38px;
  height:24px;
  padding:0 9px;
  border-radius:999px;
  background:rgba(22,104,220,.16);
  color:#8bbdff;
  border:1px solid rgba(22,104,220,.35);
  font-weight:800;
}

.url-text{
  max-width:430px;
  display:block;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  color:#8da2c0;
}

.empty-cell{
  text-align:center !important;
  padding:48px 20px !important;
  color:#6b7280 !important;
}

::-webkit-scrollbar{
  width:8px;
  height:8px;
}
::-webkit-scrollbar-track{
  background:transparent;
}
::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,.18);
  border-radius:999px;
}
::-webkit-scrollbar-thumb:hover{
  background:rgba(255,255,255,.3);
}

@media(max-width:900px){
  body{ padding:12px; }

  .header{
    flex-direction:column;
    align-items:stretch;
  }

  .stats-grid{
    grid-template-columns:repeat(2,1fr);
  }

  .toolbar{
    flex-direction:column;
    align-items:stretch;
  }
}

@media(max-width:520px){
  .stats-grid{
    grid-template-columns:1fr;
  }

  .title-box h1{
    font-size:21px;
  }
}
</style>
</head>

<body>
<div class="history-wrap">

  <div class="header">
    <div class="title-box">
      <h1>Tab History</h1>
      <p>View user opened tabs, total visits, and latest activity.</p>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="label">Total Opened</div>
      <div class="value" id="totalOpened">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Unique Tabs</div>
      <div class="value" id="uniqueTabs">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Most Opened</div>
      <div class="value" id="mostOpened">-</div>
    </div>
    <div class="stat-card">
      <div class="label">Last Opened</div>
      <div class="value" id="lastOpened">-</div>
    </div>
  </div>

  <div class="panel">
    <div class="toolbar">
      <div class="search-box">
        <svg viewBox="64 64 896 896" fill="currentColor">
          <path d="M909.6 854.5L649.9 594.8C690.2 542.7 712 479 712 412c0-80.2-31.3-155.4-87.9-212.1-56.6-56.7-132-87.9-212.1-87.9s-155.5 31.3-212.1 87.9C143.2 256.5 112 331.8 112 412c0 80.1 31.3 155.5 87.9 212.1C256.5 680.8 331.8 712 412 712c67 0 130.6-21.8 182.7-62l259.7 259.6a8.2 8.2 0 0011.6 0l43.6-43.5a8.2 8.2 0 000-11.6zM570.4 570.4C528 612.7 471.8 636 412 636s-116-23.3-158.4-65.6C211.3 528 188 471.8 188 412s23.3-116.1 65.6-158.4C296 211.3 352.2 188 412 188s116.1 23.2 158.4 65.6S636 352.2 636 412s-23.3 116.1-65.6 158.4z"></path>
        </svg>
        <input id="searchInput" type="text" placeholder="Search tab, url, group..." />
      </div>

      <select class="select" id="groupFilter">
        <option value="all">All Group</option>
      </select>
    </div>

    <div class="table-wrap">
      <table class="history-table">
        <thead>
          <tr>
            <th class="no-col">No</th>
            <th>Tab Name</th>
            <th>Group</th>
            <th>Open Count</th>
            <th>Last Opened</th>
            <th>URL</th>
          </tr>
        </thead>
        <tbody id="historyTableBody">
          <tr>
            <td colspan="6" class="empty-cell">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const blurphpApp = firebase.initializeApp({
  apiKey: "AIzaSyCKmrlS4qrZCrMNRIfIRCWCbNgZT1uQ3ZI",
  authDomain: "blurphp.firebaseapp.com",
  databaseURL: "https://blurphp-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "blurphp",
  storageBucket: "blurphp.appspot.com",
  messagingSenderId: "593904200464",
  appId: "1:593904200464:web:cea7bc1360532c20d99395",
  measurementId: "G-R494S2DPZ5"
}, "historyBlurphpApp");

const blurphpDb = blurphpApp.database();

let currentUser = null;
let allHistory = [];

const els = {
  totalOpened: document.getElementById("totalOpened"),
  uniqueTabs: document.getElementById("uniqueTabs"),
  mostOpened: document.getElementById("mostOpened"),
  lastOpened: document.getElementById("lastOpened"),
  searchInput: document.getElementById("searchInput"),
  groupFilter: document.getElementById("groupFilter"),
  historyTableBody: document.getElementById("historyTableBody")
};

function safeUserKey(email) {
  return String(email || "guest")
    .trim()
    .toLowerCase()
    .replace(/[.#$\[\]/\s]/g, "_");
}

function getLoginFromLocal() {
  try {
    return JSON.parse(localStorage.getItem("gmailLogin") || "{}");
  } catch {
    return {};
  }
}

function requestLoginFromParent() {
  try {
    window.parent.postMessage({ type: "request-login" }, "*");
  } catch {}
}

window.addEventListener("message", (event) => {
  const data = event.data || {};

  if (data.type === "user-login" && data.user && data.user.email) {
    currentUser = data.user;
    localStorage.setItem("gmailLogin", JSON.stringify(currentUser));
    loadHistory();
  }
});

function formatDate(ms) {
  const d = new Date(Number(ms || 0));
  if (isNaN(d.getTime())) return "-";

  const dd = String(d.getDate()).padStart(2, "0");
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const yy = d.getFullYear();
  const hh = String(d.getHours()).padStart(2, "0");
  const mi = String(d.getMinutes()).padStart(2, "0");
  const ss = String(d.getSeconds()).padStart(2, "0");

  return `${dd}-${mm}-${yy} ${hh}:${mi}:${ss}`;
}

function shortDate(ms) {
  const d = new Date(Number(ms || 0));
  if (isNaN(d.getTime())) return "-";

  const dd = String(d.getDate()).padStart(2, "0");
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const hh = String(d.getHours()).padStart(2, "0");
  const mi = String(d.getMinutes()).padStart(2, "0");

  return `${dd}/${mm} ${hh}:${mi}`;
}

function escapeHtml(str) {
  return String(str || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function normalizeHistoryItem(item) {
  return {
    label: String(item.label || "UNKNOWN").trim().toUpperCase(),
    url: String(item.url || ""),
    group: String(item.group || "none").toLowerCase(),
    route: String(item.route || ""),
    openedAt: Number(item.openedAt || 0)
  };
}

function getFilteredHistory() {
  const q = els.searchInput.value.trim().toLowerCase();
  const group = els.groupFilter.value;

  return allHistory.filter(item => {
    const text = `${item.label} ${item.url} ${item.group} ${item.route}`.toLowerCase();
    const matchSearch = !q || text.includes(q);
    const matchGroup = group === "all" || item.group === group;
    return matchSearch && matchGroup;
  });
}

function buildSummary(list) {
  const map = new Map();

  list.forEach(item => {
    const key = item.label;

    if (!map.has(key)) {
      map.set(key, {
        label: item.label,
        url: item.url,
        group: item.group,
        route: item.route,
        count: 0,
        lastOpened: 0
      });
    }

    const cur = map.get(key);
    cur.count += 1;
    cur.lastOpened = Math.max(cur.lastOpened, item.openedAt || 0);
  });

  return [...map.values()].sort((a, b) => {
    if (b.count !== a.count) return b.count - a.count;
    return b.lastOpened - a.lastOpened;
  });
}

function updateGroupFilter() {
  const oldValue = els.groupFilter.value || "all";
  const groups = [...new Set(allHistory.map(x => x.group || "none"))].sort();

  els.groupFilter.innerHTML = `<option value="all">All Group</option>`;

  groups.forEach(group => {
    const opt = document.createElement("option");
    opt.value = group;
    opt.textContent = group.toUpperCase();
    els.groupFilter.appendChild(opt);
  });

  if ([...els.groupFilter.options].some(o => o.value === oldValue)) {
    els.groupFilter.value = oldValue;
  }
}

function renderStats(list, summary) {
  els.totalOpened.textContent = list.length;
  els.uniqueTabs.textContent = summary.length;
  els.mostOpened.textContent = summary[0] ? summary[0].count : "-";
  els.lastOpened.textContent = list[0] ? shortDate(list[0].openedAt) : "-";
}

function renderTable(summary) {
  if (!summary.length) {
    els.historyTableBody.innerHTML = `
      <tr>
        <td colspan="6" class="empty-cell">No history found.</td>
      </tr>
    `;
    return;
  }

  els.historyTableBody.innerHTML = summary.map((item, index) => `
    <tr>
      <td class="no-col">${index + 1}</td>
      <td><span class="tab-name">${escapeHtml(item.label)}</span></td>
      <td><span class="group-chip">${escapeHtml(item.group || "none")}</span></td>
      <td><span class="count-badge">${item.count}x</span></td>
      <td>${escapeHtml(formatDate(item.lastOpened))}</td>
      <td>
        <span class="url-text" title="${escapeHtml(item.url)}">
          ${escapeHtml(item.url)}
        </span>
      </td>
    </tr>
  `).join("");
}

function renderAll() {
  const filtered = getFilteredHistory();
  const summary = buildSummary(filtered);

  renderStats(filtered, summary);
  renderTable(summary);
}

function loadLocalBackup(userKey) {
  try {
    const localKey = `tabHistory_${userKey}`;
    const list = JSON.parse(localStorage.getItem(localKey) || "[]");
    return Array.isArray(list) ? list.map(normalizeHistoryItem) : [];
  } catch {
    return [];
  }
}

function loadHistory() {
  const login = currentUser || getLoginFromLocal();
  const email = String(login.email || "").trim().toLowerCase();

  if (!email) {
    els.historyTableBody.innerHTML = `
      <tr>
        <td colspan="6" class="empty-cell">
          No login data found. Open this page inside main iframe.
        </td>
      </tr>
    `;
    requestLoginFromParent();
    return;
  }

  const userKey = safeUserKey(email);

  els.historyTableBody.innerHTML = `
    <tr>
      <td colspan="6" class="empty-cell">Loading...</td>
    </tr>
  `;

  blurphpDb.ref(`users/${userKey}/tabHistory`)
    .orderByChild("openedAt")
    .limitToLast(500)
    .on("value", snap => {
      const data = snap.val() || {};

      const firebaseList = Object.values(data)
        .map(normalizeHistoryItem)
        .filter(x => x.label && x.openedAt);

      const localList = loadLocalBackup(userKey);
      const merged = [...firebaseList, ...localList];

      const uniqueMap = new Map();
      merged.forEach(item => {
        const key = `${item.label}_${item.url}_${item.openedAt}`;
        uniqueMap.set(key, item);
      });

      allHistory = [...uniqueMap.values()]
        .sort((a, b) => b.openedAt - a.openedAt);

      updateGroupFilter();
      renderAll();
    }, err => {
      console.warn("History load error:", err);
      els.historyTableBody.innerHTML = `
        <tr>
          <td colspan="6" class="empty-cell">
            Failed to load Firebase history. Please check Firebase rules.
          </td>
        </tr>
      `;
    });
}

els.searchInput.addEventListener("input", renderAll);
els.groupFilter.addEventListener("change", renderAll);

document.addEventListener("DOMContentLoaded", () => {
  currentUser = getLoginFromLocal();

  if (!currentUser || !currentUser.email) {
    requestLoginFromParent();
  }

  setTimeout(loadHistory, 250);
});
</script>
</body>
</html>
