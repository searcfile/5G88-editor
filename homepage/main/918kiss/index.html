<!DOCTYPE html>
<html lang="en">
<head>

    <label for="betSelect" class="form-label">Bet:</label>
    <select id="betSelect" class="select-main select-click"></select>

    <label for="pecahanSelect" class="form-label">Pecahan:</label>
    <select id="pecahanSelect" class="select-main select-click"></select>

    <button onclick="setNow()" class="btn-main h38 px12 fs16">Click Now</button>

    <label for="manualTime" class="form-label">Set Time:</label>
    <input type="text" id="manualTime" placeholder="Add Date & Time" class="input-time" />

    <label for="freeGameInput" class="form-label label-left-gap">Set Rows:</label>
    <input type="number" id="freeGameInput" min="0" max="10" value="0" class="input-small" />

    <button id="setFreeGameBtn" class="btn-main h38">Set Free Game</button>

    <button id="autoFreeGameBtn" class="btn-auto-off">
      AUTO OFF
    </button>
  </div>

  <div class="form-row bottom-gap">
    <div class="inline-group">
      <label for="manualScore" class="form-label h38 flex-center label-pad">Add Score :</label>
      <input type="number" id="manualScore" value="0" class="input-score" />

      <button id="autoAddScoreBtn" type="button" class="btn-auto-on">
        AUTO ON
      </button>
    </div>

    <div class="inline-group">
      <label for="manualJackpot" class="form-label h38 flex-center">Jackpot Amount:</label>
      <input type="number" id="manualJackpot" value="0" class="input-jackpot" />
    </div>

    <button onclick="addJackpot()" class="btn-main h38">Set Jackpot</button>

    <div class="inline-group">
      <label for="manualScoreInput" class="form-label h38 flex-center">Support Amount:</label>
      <input type="number" id="manualScoreInput" value="0" class="input-support" />
    </div>

    <button onclick="addManualSetScore()" class="btn-main h38">Support Back</button>

    <div class="inline-group">
      <label for="manualWinInput" class="form-label h38 flex-center">Win Amount:</label>
      <input type="number" id="manualWinInput" value="0" class="input-win" />
    </div>

    <button onclick="setRandomWin()" class="btn-main h38">Set Winner</button>
  </div>

  <div class="form-row bottom-gap">
    <button onclick="generateLog()" class="btn-main h38">Change</button>
    <button onclick="deleteCents()" class="btn-main h38">Delete Cents</button>
    <button onclick="copyGameLogImage()" class="btn-main h38">COPY IMAGE</button>
  </div>
<div class="table-wrap">
  <table id="gameLog">
    <thead>
      <tr>
        <th>GameName</th>
        <th>TableID</th>
        <th>Bet</th>
        <th>Win</th>
        <th>BeginMoney</th>
        <th>EndMoney</th>
        <th>DateTime</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>
</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="918kiss/918kiss.js"></script>

</html>
