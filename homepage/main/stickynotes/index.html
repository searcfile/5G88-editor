<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sticky Notes</title>

<style>
:root{
  --bg:#ffffff;
  --panel:#ffffff;
  --panel2:#f6f8fb;
  --text:#111827;
  --soft:#6b7280;
  --border:#d9d9d9;
  --blue:#1668dc;
  --blue-hover:#3c89e8;
  --blue-active:#1554ad;
  --danger:#dc2626;
  --shadow:0 10px 30px rgba(15,23,42,.10);
}

body.dark-theme{
  --bg:#000;
  --panel:#141414;
  --panel2:#1f1f1f;
  --text:rgba(255,255,255,.88);
  --soft:rgba(255,255,255,.55);
  --border:#303030;
  --shadow:0 12px 32px rgba(0,0,0,.45);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

html,
body{
  width:100%;
  height:100%;
}

body{
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

.app{
  width:100%;
  height:100vh;
  padding:16px;
}

.main{
  width:100%;
  height:100%;
  min-height:0;
  display:block;
}

.content{
  width:100%;
  height:100%;
  min-width:0;
  min-height:0;
  overflow:auto;
  padding:0;
}

.notes-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:14px;
  align-items:start;
  padding-bottom:82px;
}

.note-card{
  border:1px solid rgba(0,0,0,.08);
  border-radius:18px;
  min-height:190px;
  padding:14px;
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
  transition:.22s;
}

body.dark-theme .note-card{
  border-color:rgba(255,255,255,.08);
}

.note-card:hover{
  transform:translateY(-3px);
}

.note-head{
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:flex-start;
}

.note-title{
  font-weight:800;
  font-size:15px;
  line-height:1.35;
  word-break:break-word;
}

.pin{
  border:none;
  background:rgba(255,255,255,.45);
  color:#111827;
  width:30px;
  height:30px;
  border-radius:10px;
  cursor:pointer;
  flex-shrink:0;
}

.note-body{
  margin-top:10px;
  white-space:pre-wrap;
  word-break:break-word;
  font-size:14px;
  line-height:1.55;
  color:rgba(17,24,39,.78);
  max-height:145px;
  overflow:auto;
}

.note-meta{
  margin-top:16px;
  padding-top:10px;
  border-top:1px solid rgba(0,0,0,.10);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  font-size:12px;
  color:rgba(17,24,39,.65);
}

.note-user{
  max-width:130px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.note-actions{
  margin-top:10px;
  display:flex;
  gap:8px;
}

.note-actions button{
  flex:1;
  height:32px;
  border:1px solid rgba(0,0,0,.12);
  background:rgba(255,255,255,.42);
  color:#111827;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
}

.note-actions button:hover{
  background:rgba(255,255,255,.75);
}

.empty{
  width:100%;
  height:100%;
  min-height:360px;
  border:1px dashed var(--border);
  border-radius:18px;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  color:var(--soft);
  gap:10px;
}

.empty.show{
  display:flex;
}

.floating-create{
  position:fixed;
  right:18px;
  bottom:18px;
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  background:var(--blue);
  color:#fff;
  font-size:30px;
  line-height:1;
  cursor:pointer;
  box-shadow:0 12px 28px rgba(22,104,220,.38);
  z-index:80;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.2s;
}

.floating-create:hover{
  background:var(--blue-hover);
  transform:translateY(-2px);
}

.floating-create:active{
  background:var(--blue-active);
  transform:translateY(0);
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(2px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:16px;
}

.modal.show{
  display:flex;
}

.dialog{
  width:min(560px,100%);
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:0 25px 70px rgba(0,0,0,.35);
  overflow:hidden;
  animation:pop .18s ease;
}

@keyframes pop{
  from{transform:scale(.96);opacity:0}
  to{transform:scale(1);opacity:1}
}

.dialog-head{
  height:54px;
  padding:0 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
}

.dialog-title{
  font-weight:800;
}

.close{
  width:34px;
  height:34px;
  border:none;
  border-radius:10px;
  background:transparent;
  color:var(--text);
  cursor:pointer;
  font-size:20px;
}

.close:hover{
  background:var(--panel2);
}

.dialog-body{
  padding:16px;
}

.field{
  margin-bottom:12px;
}

.label{
  display:block;
  font-size:12px;
  color:var(--soft);
  font-weight:700;
  margin-bottom:6px;
}

.input,
.textarea{
  width:100%;
  border:1px solid var(--border);
  background:var(--panel2);
  color:var(--text);
  border-radius:12px;
  outline:none;
  padding:10px 12px;
  font-size:14px;
  transition:.2s;
}

.input{
  height:42px;
}

.textarea{
  min-height:150px;
  resize:vertical;
  line-height:1.5;
}

.input:focus,
.textarea:focus{
  border-color:var(--blue);
}

.colors{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.color-dot{
  width:30px;
  height:30px;
  border-radius:50%;
  border:2px solid transparent;
  cursor:pointer;
}

.color-dot.active{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(22,104,220,.18);
}

.dialog-foot{
  padding:12px 16px;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:flex-end;
  gap:8px;
  background:var(--panel2);
}

.btn{
  height:36px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--panel);
  color:var(--text);
  padding:0 13px;
  cursor:pointer;
  transition:.2s;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  font-size:14px;
}

.btn:hover{
  border-color:var(--blue-hover);
  color:var(--blue-hover);
}

.btn.primary{
  background:var(--blue);
  border-color:transparent;
  color:white;
}

.confirm-text{
  font-size:14px;
  color:var(--text);
  line-height:1.5;
}

@media(max-width:760px){
  .app{
    padding:12px;
  }

  .notes-grid{
    grid-template-columns:1fr;
    gap:12px;
    padding-bottom:82px;
  }

  .dialog{
    width:100%;
  }

  .floating-create{
    right:14px;
    bottom:14px;
  }
}
</style>
</head>

<body class="light-theme">
<div class="app">
  <main class="main">
    <section class="content">
      <div id="notesGrid" class="notes-grid"></div>

      <div id="emptyState" class="empty">
        <div style="font-size:44px">🗒️</div>
        <h3>No notes yet</h3>
        <p>Click + button to add your first sticky note.</p>
      </div>
    </section>
  </main>
</div>

<button id="floatingCreateBtn" class="floating-create" title="Create New">+</button>

<div id="noteModal" class="modal">
  <div class="dialog">
    <div class="dialog-head">
      <div id="modalTitle" class="dialog-title">Create Note</div>
      <button id="closeModal" class="close">×</button>
    </div>

    <div class="dialog-body">
      <div class="field">
        <label class="label">Title</label>
        <input id="noteTitle" class="input" type="text" placeholder="Enter note title..." maxlength="80" />
      </div>

      <div class="field">
        <label class="label">Note</label>
        <textarea id="noteBody" class="textarea" placeholder="Write your note..."></textarea>
      </div>

      <div class="field">
        <label class="label">Color</label>
        <div id="colorList" class="colors"></div>
      </div>
    </div>

    <div class="dialog-foot">
      <button id="cancelBtn" class="btn">Cancel</button>
      <button id="saveBtn" class="btn primary">Save</button>
    </div>
  </div>
</div>

<div id="confirmModal" class="modal">
  <div class="dialog" style="width:min(420px,100%)">
    <div class="dialog-head">
      <div class="dialog-title">Delete Note</div>
      <button id="confirmClose" class="close">×</button>
    </div>
    <div class="dialog-body">
      <p class="confirm-text">Are you sure you want to delete this note?</p>
    </div>
    <div class="dialog-foot">
      <button id="confirmNo" class="btn">Cancel</button>
      <button id="confirmYes" class="btn primary" style="background:#dc2626">Delete</button>
    </div>
  </div>
</div>

<!-- WAJIB ADA sebelum script ini -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
/* =========================
   FIREBASE - guna blurphp
========================= */
const blurphpApp = firebase.apps.find(app => app.name === "blurphpStickyApp")
  || firebase.initializeApp({
    apiKey: "AIzaSyCKmrlS4qrZCrMNRIfIRCWCbNgZT1uQ3ZI",
    authDomain: "blurphp.firebaseapp.com",
    databaseURL: "https://blurphp-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "blurphp",
    storageBucket: "blurphp.appspot.com",
    messagingSenderId: "593904200464",
    appId: "1:593904200464:web:cea7bc1360532c20d99395",
    measurementId: "G-R494S2DPZ5"
  }, "blurphpStickyApp");

const blurphpDb = blurphpApp.database();

/* =========================
   STATE
========================= */
let currentUser = {
  name: "Guest",
  email: "guest",
  photo: ""
};

let notes = [];
let editingId = null;
let deleteId = null;
let activeFilter = "all";
let selectedColor = "#fff4b8";
let notesRef = null;
let notesListener = null;

const COLORS = [
  "#fff4b8",
  "#dbeafe",
  "#dcfce7",
  "#ffe4e6",
  "#ede9fe",
  "#fef3c7",
  "#e0f2fe",
  "#f3f4f6"
];

const els = {
  userName: document.getElementById("userName"),
  userEmail: document.getElementById("userEmail"),
  pageSub: document.getElementById("pageSub"),
  searchInput: document.getElementById("searchInput"),
  createBtn: document.getElementById("createBtn"),
  floatingCreateBtn: document.getElementById("floatingCreateBtn"),

  notesGrid: document.getElementById("notesGrid"),
  emptyState: document.getElementById("emptyState"),

  noteModal: document.getElementById("noteModal"),
  modalTitle: document.getElementById("modalTitle"),
  closeModal: document.getElementById("closeModal"),
  cancelBtn: document.getElementById("cancelBtn"),
  saveBtn: document.getElementById("saveBtn"),
  noteTitle: document.getElementById("noteTitle"),
  noteBody: document.getElementById("noteBody"),
  colorList: document.getElementById("colorList"),

  confirmModal: document.getElementById("confirmModal"),
  confirmClose: document.getElementById("confirmClose"),
  confirmNo: document.getElementById("confirmNo"),
  confirmYes: document.getElementById("confirmYes"),

  countAll: document.getElementById("countAll"),
  countPinned: document.getElementById("countPinned"),
  countRecent: document.getElementById("countRecent")
};

/* =========================
   HELPERS
========================= */
function sanitizeEmail(email){
  return String(email || "guest")
    .toLowerCase()
    .trim()
    .replace(/\./g, "_")
    .replace(/[@#$\[\]\/\s]/g, "_");
}

function getUserNotesPath(){
  const key = sanitizeEmail(currentUser.email);
  return `users/${key}/stickyNotes`;
}

function escapeHtml(str){
  return String(str || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function formatTime(ms){
  const d = new Date(Number(ms || Date.now()));
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth() + 1).padStart(2,"0");
  const yy = d.getFullYear();
  const hh = String(d.getHours()).padStart(2,"0");
  const mi = String(d.getMinutes()).padStart(2,"0");
  return `${dd}/${mm}/${yy} ${hh}:${mi}`;
}

/* =========================
   FIREBASE LOAD / SAVE
========================= */
function detachNotesListener(){
  if(notesRef && notesListener){
    notesRef.off("value", notesListener);
  }
  notesRef = null;
  notesListener = null;
}

function loadNotes(){
  detachNotesListener();

  notesRef = blurphpDb.ref(getUserNotesPath());

  notesListener = notesRef.on("value", (snap) => {
    const data = snap.val() || {};

    notes = Object.keys(data).map(id => ({
      id,
      ...data[id]
    }));

    renderNotes();
  }, (err) => {
    console.error("Sticky notes Firebase error:", err);
    notes = [];
    renderNotes();
  });
}

function saveNoteToFirebase(note){
  if(!note || !note.id) return Promise.resolve();
  return blurphpDb.ref(`${getUserNotesPath()}/${note.id}`).set(note);
}

function deleteNoteFromFirebase(id){
  if(!id) return Promise.resolve();
  return blurphpDb.ref(`${getUserNotesPath()}/${id}`).remove();
}

/* =========================
   RENDER
========================= */
function renderUser(){
  const name = currentUser.name || "Guest";
  const email = currentUser.email || "guest";

  if(els.userName) els.userName.textContent = name;
  if(els.userEmail) els.userEmail.textContent = email;
  if(els.pageSub) els.pageSub.textContent = `Notes for ${name}`;
}

function renderCounts(){
  if(els.countAll) els.countAll.textContent = notes.length;
  if(els.countPinned) els.countPinned.textContent = notes.filter(n => n.pinned).length;

  const sevenDays = Date.now() - (7 * 24 * 60 * 60 * 1000);
  if(els.countRecent){
    els.countRecent.textContent = notes.filter(n => Number(n.updatedAt || 0) >= sevenDays).length;
  }
}

function getVisibleNotes(){
  const q = (els.searchInput?.value || "").trim().toLowerCase();

  let list = [...notes];

  if(activeFilter === "pinned"){
    list = list.filter(n => n.pinned);
  }

  if(activeFilter === "recent"){
    const sevenDays = Date.now() - (7 * 24 * 60 * 60 * 1000);
    list = list.filter(n => Number(n.updatedAt || 0) >= sevenDays);
  }

  if(q){
    list = list.filter(n =>
      String(n.title || "").toLowerCase().includes(q) ||
      String(n.body || "").toLowerCase().includes(q) ||
      String(n.userName || "").toLowerCase().includes(q)
    );
  }

  list.sort((a,b) => {
    if(Boolean(a.pinned) !== Boolean(b.pinned)){
      return a.pinned ? -1 : 1;
    }
    return Number(b.updatedAt || 0) - Number(a.updatedAt || 0);
  });

  return list;
}

function renderNotes(){
  renderUser();
  renderCounts();

  if(!els.notesGrid) return;

  const list = getVisibleNotes();
  els.notesGrid.innerHTML = "";

  if(!list.length){
    els.emptyState?.classList.add("show");
    return;
  }

  els.emptyState?.classList.remove("show");

  list.forEach(note => {
    const card = document.createElement("div");
    card.className = "note-card";
    card.style.background = note.color || "#fff4b8";

    card.innerHTML = `
      <div class="note-head">
        <div class="note-title">${escapeHtml(note.title || "Untitled")}</div>
        <button class="pin" title="Pin note" data-action="pin" data-id="${note.id}">
          ${note.pinned ? "📌" : "📍"}
        </button>
      </div>

      <div class="note-body">${escapeHtml(note.body || "")}</div>

      <div class="note-meta">
        <span class="note-user">👤 ${escapeHtml(note.userName || "Guest")}</span>
        <span>${formatTime(note.updatedAt)}</span>
      </div>

      <div class="note-actions">
        <button data-action="edit" data-id="${note.id}">Edit</button>
        <button data-action="delete" data-id="${note.id}">Delete</button>
      </div>
    `;

    els.notesGrid.appendChild(card);
  });
}

/* =========================
   MODAL
========================= */
function renderColors(){
  if(!els.colorList) return;

  els.colorList.innerHTML = "";

  COLORS.forEach(color => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "color-dot" + (color === selectedColor ? " active" : "");
    btn.style.background = color;
    btn.onclick = () => {
      selectedColor = color;
      renderColors();
    };
    els.colorList.appendChild(btn);
  });
}

function openModal(note = null){
  editingId = note ? note.id : null;
  selectedColor = note?.color || COLORS[0];

  if(els.modalTitle) els.modalTitle.textContent = note ? "Edit Note" : "Create Note";
  if(els.noteTitle) els.noteTitle.value = note?.title || "";
  if(els.noteBody) els.noteBody.value = note?.body || "";

  renderColors();
  els.noteModal?.classList.add("show");

  setTimeout(() => els.noteTitle?.focus(), 50);
}

function closeModal(){
  els.noteModal?.classList.remove("show");
  editingId = null;
}

function handleSave(){
  const title = (els.noteTitle?.value || "").trim();
  const body = (els.noteBody?.value || "").trim();

  if(!title && !body){
    els.noteTitle?.focus();
    return;
  }

  const now = Date.now();

  let note;

  if(editingId){
    const old = notes.find(n => n.id === editingId);
    if(!old) return;

    note = {
      ...old,
      title: title || "Untitled",
      body,
      color: selectedColor,
      userName: currentUser.name || "Guest",
      userEmail: currentUser.email || "guest",
      updatedAt: now
    };
  }else{
    const id = "note_" + now + "_" + Math.random().toString(16).slice(2);

    note = {
      id,
      title: title || "Untitled",
      body,
      color: selectedColor,
      pinned: false,
      userName: currentUser.name || "Guest",
      userEmail: currentUser.email || "guest",
      createdAt: now,
      updatedAt: now
    };
  }

  saveNoteToFirebase(note)
    .then(() => {
      closeModal();
    })
    .catch(err => {
      console.error("Save note failed:", err);
      alert("Save failed. Please check Firebase rules.");
    });
}

/* =========================
   DELETE / PIN
========================= */
function openConfirm(id){
  deleteId = id;
  els.confirmModal?.classList.add("show");
}

function closeConfirm(){
  deleteId = null;
  els.confirmModal?.classList.remove("show");
}

function deleteNote(){
  if(!deleteId) return;

  deleteNoteFromFirebase(deleteId)
    .then(() => closeConfirm())
    .catch(err => {
      console.error("Delete note failed:", err);
      alert("Delete failed. Please check Firebase rules.");
    });
}

function togglePin(id){
  const note = notes.find(n => n.id === id);
  if(!note) return;

  const updated = {
    ...note,
    pinned: !note.pinned,
    updatedAt: Date.now()
  };

  saveNoteToFirebase(updated).catch(err => {
    console.error("Pin failed:", err);
  });
}

/* =========================
   THEME / PARENT
========================= */
function applyTheme(theme){
  document.body.classList.remove("light-theme","dark-theme");
  document.body.classList.add(theme === "dark" ? "dark-theme" : "light-theme");
}

function requestParentData(){
  try{
    window.parent.postMessage({ type:"sticky-notes-ready" }, "*");
    window.parent.postMessage({ type:"request-login" }, "*");
    window.parent.postMessage({ type:"request-theme" }, "*");
  }catch{}
}

window.addEventListener("message", (e) => {
  const data = e.data || {};

  if(data.type === "user-login" && data.user){
    const nextUser = {
      name: data.user.name || "Guest",
      email: data.user.email || "guest",
      photo: data.user.photo || ""
    };

    const oldEmail = String(currentUser.email || "").toLowerCase();
    const newEmail = String(nextUser.email || "").toLowerCase();

    currentUser = nextUser;

    if(oldEmail !== newEmail){
      loadNotes();
    }else{
      renderNotes();
    }
  }

  if(data.type === "theme-change"){
    applyTheme(data.theme);
  }
});

/* =========================
   EVENTS
========================= */
els.createBtn?.addEventListener("click", () => openModal());
els.floatingCreateBtn?.addEventListener("click", () => openModal());

els.closeModal?.addEventListener("click", closeModal);
els.cancelBtn?.addEventListener("click", closeModal);
els.saveBtn?.addEventListener("click", handleSave);

els.searchInput?.addEventListener("input", renderNotes);

els.noteModal?.addEventListener("click", (e) => {
  if(e.target === els.noteModal) closeModal();
});

els.confirmClose?.addEventListener("click", closeConfirm);
els.confirmNo?.addEventListener("click", closeConfirm);
els.confirmYes?.addEventListener("click", deleteNote);

els.confirmModal?.addEventListener("click", (e) => {
  if(e.target === els.confirmModal) closeConfirm();
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter || "all";
    renderNotes();
  });
});

els.notesGrid?.addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-action]");
  if(!btn) return;

  const id = btn.dataset.id;
  const action = btn.dataset.action;
  const note = notes.find(n => n.id === id);

  if(action === "edit" && note) openModal(note);
  if(action === "delete") openConfirm(id);
  if(action === "pin") togglePin(id);
});

document.addEventListener("keydown", (e) => {
  if(e.key === "Escape"){
    closeModal();
    closeConfirm();
  }

  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "n"){
    e.preventDefault();
    openModal();
  }
});

/* =========================
   INIT
========================= */
(function init(){
  try{
    const localLogin = JSON.parse(localStorage.getItem("gmailLogin") || "{}");
    if(localLogin.email){
      currentUser = {
        name: localLogin.name || "Guest",
        email: localLogin.email || "guest",
        photo: localLogin.photo || ""
      };
    }
  }catch{}

  const savedTheme = localStorage.getItem("siteTheme") || "light";
  applyTheme(savedTheme);

  loadNotes();
  requestParentData();

  setTimeout(requestParentData, 500);
  setTimeout(requestParentData, 1200);
})();
</script>
