<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sticky Notes</title>

<style>
:root{
  --bg:#ffffff;
  --panel:#ffffff;
  --panel2:#f6f8fb;
  --text:#111827;
  --soft:#6b7280;
  --border:#d9d9d9;
  --blue:#1668dc;
  --blue-hover:#3c89e8;
  --blue-active:#1554ad;
  --danger:#dc2626;
  --shadow:0 10px 30px rgba(15,23,42,.10);
}

body.dark-theme{
  --bg:#000;
  --panel:#141414;
  --panel2:#1f1f1f;
  --text:rgba(255,255,255,.88);
  --soft:rgba(255,255,255,.55);
  --border:#303030;
  --shadow:0 12px 32px rgba(0,0,0,.45);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow:hidden;
}

.app{
  height:100vh;
  display:flex;
  flex-direction:column;
}

.topbar{
  height:64px;
  padding:0 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:var(--panel);
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
}

.brand-icon{
  width:38px;
  height:38px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--blue),#7aa7ff);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  box-shadow:0 8px 18px rgba(22,104,220,.28);
}

.brand h1{
  font-size:17px;
  line-height:1.1;
}

.brand p{
  margin-top:3px;
  font-size:12px;
  color:var(--soft);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.actions{
  display:flex;
  align-items:center;
  gap:8px;
}

.search{
  width:260px;
  height:36px;
  border:1px solid var(--border);
  background:var(--panel2);
  color:var(--text);
  border-radius:10px;
  padding:0 12px;
  outline:none;
  transition:.2s;
}

.search:hover,
.search:focus{
  border-color:var(--blue-hover);
}

.btn{
  height:36px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--panel);
  color:var(--text);
  padding:0 13px;
  cursor:pointer;
  transition:.2s;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  font-size:14px;
}

.btn:hover{
  border-color:var(--blue-hover);
  color:var(--blue-hover);
}

.btn:active{
  border-color:var(--blue-active);
  color:var(--blue-active);
}

.btn.primary{
  background:var(--blue);
  border-color:transparent;
  color:white;
}

.btn.primary:hover{
  background:var(--blue-hover);
  color:white;
}

.main{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:220px minmax(0,1fr);
}

.sidebar{
  border-right:1px solid var(--border);
  background:var(--panel);
  padding:14px;
  overflow:auto;
}

.user-card{
  border:1px solid var(--border);
  background:var(--panel2);
  border-radius:14px;
  padding:12px;
  margin-bottom:14px;
}

.user-name{
  font-size:14px;
  font-weight:700;
  color:var(--text);
  word-break:break-word;
}

.user-email{
  margin-top:4px;
  font-size:12px;
  color:var(--soft);
  word-break:break-word;
}

.filter-title{
  font-size:12px;
  color:var(--soft);
  font-weight:700;
  margin:15px 0 8px;
  text-transform:uppercase;
}

.filter-btn{
  width:100%;
  height:36px;
  border:1px solid transparent;
  border-radius:10px;
  background:transparent;
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 10px;
  cursor:pointer;
  transition:.2s;
  margin-bottom:5px;
}

.filter-btn:hover{
  background:var(--panel2);
}

.filter-btn.active{
  background:rgba(22,104,220,.12);
  color:var(--blue);
  border-color:rgba(22,104,220,.25);
}

.content{
  min-width:0;
  min-height:0;
  padding:18px;
  overflow:auto;
}

.notes-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:14px;
  align-items:start;
}

.note-card{
  border:1px solid rgba(0,0,0,.08);
  border-radius:18px;
  min-height:190px;
  padding:14px;
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
  transition:.22s;
}

body.dark-theme .note-card{
  border-color:rgba(255,255,255,.08);
}

.note-card:hover{
  transform:translateY(-3px);
}

.note-head{
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:flex-start;
}

.note-title{
  font-weight:800;
  font-size:15px;
  line-height:1.35;
  word-break:break-word;
}

.pin{
  border:none;
  background:rgba(255,255,255,.45);
  color:#111827;
  width:30px;
  height:30px;
  border-radius:10px;
  cursor:pointer;
  flex-shrink:0;
}

.note-body{
  margin-top:10px;
  white-space:pre-wrap;
  word-break:break-word;
  font-size:14px;
  line-height:1.55;
  color:rgba(17,24,39,.78);
  max-height:145px;
  overflow:auto;
}

.note-meta{
  margin-top:16px;
  padding-top:10px;
  border-top:1px solid rgba(0,0,0,.10);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  font-size:12px;
  color:rgba(17,24,39,.65);
}

.note-user{
  max-width:130px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.note-actions{
  margin-top:10px;
  display:flex;
  gap:8px;
}

.note-actions button{
  flex:1;
  height:32px;
  border:1px solid rgba(0,0,0,.12);
  background:rgba(255,255,255,.42);
  color:#111827;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
}

.note-actions button:hover{
  background:rgba(255,255,255,.75);
}

.empty{
  height:100%;
  min-height:360px;
  border:1px dashed var(--border);
  border-radius:18px;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  color:var(--soft);
  gap:10px;
}

.empty.show{
  display:flex;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(2px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:16px;
}

.modal.show{
  display:flex;
}

.dialog{
  width:min(560px,100%);
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:0 25px 70px rgba(0,0,0,.35);
  overflow:hidden;
  animation:pop .18s ease;
}

@keyframes pop{
  from{transform:scale(.96);opacity:0}
  to{transform:scale(1);opacity:1}
}

.dialog-head{
  height:54px;
  padding:0 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
}

.dialog-title{
  font-weight:800;
}

.close{
  width:34px;
  height:34px;
  border:none;
  border-radius:10px;
  background:transparent;
  color:var(--text);
  cursor:pointer;
  font-size:20px;
}

.close:hover{
  background:var(--panel2);
}

.dialog-body{
  padding:16px;
}

.field{
  margin-bottom:12px;
}

.label{
  display:block;
  font-size:12px;
  color:var(--soft);
  font-weight:700;
  margin-bottom:6px;
}

.input,
.textarea{
  width:100%;
  border:1px solid var(--border);
  background:var(--panel2);
  color:var(--text);
  border-radius:12px;
  outline:none;
  padding:10px 12px;
  font-size:14px;
  transition:.2s;
}

.input{
  height:42px;
}

.textarea{
  min-height:150px;
  resize:vertical;
  line-height:1.5;
}

.input:focus,
.textarea:focus{
  border-color:var(--blue);
}

.colors{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.color-dot{
  width:30px;
  height:30px;
  border-radius:50%;
  border:2px solid transparent;
  cursor:pointer;
}

.color-dot.active{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(22,104,220,.18);
}

.dialog-foot{
  padding:12px 16px;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:flex-end;
  gap:8px;
  background:var(--panel2);
}

.confirm-text{
  font-size:14px;
  color:var(--text);
  line-height:1.5;
}

@media(max-width:760px){
  body{
    overflow:auto;
  }

  .app{
    height:auto;
    min-height:100vh;
  }

  .topbar{
    height:auto;
    min-height:64px;
    padding:12px;
    flex-direction:column;
    align-items:stretch;
    gap:10px;
  }

  .actions{
    width:100%;
  }

  .search{
    width:100%;
    flex:1;
  }

  .main{
    grid-template-columns:1fr;
  }

  .sidebar{
    border-right:none;
    border-bottom:1px solid var(--border);
    display:block;
  }

  .filter-row{
    display:flex;
    gap:8px;
    overflow:auto;
  }

  .filter-btn{
    min-width:105px;
  }

  .content{
    padding:12px;
  }

  .notes-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body class="light-theme">
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">📝</div>
      <div>
        <h1>Sticky Notes</h1>
        <p id="pageSub">Create, edit and manage your notes</p>
      </div>
    </div>

    <div class="actions">
      <input id="searchInput" class="search" type="search" placeholder="Search notes..." />
      <button id="createBtn" class="btn primary">+ Create New</button>
    </div>
  </header>

  <main class="main">
    <aside class="sidebar">
      <div class="user-card">
        <div class="user-name" id="userName">Guest</div>
        <div class="user-email" id="userEmail">guest</div>
      </div>

      <div class="filter-title">Filter</div>
      <div class="filter-row">
        <button class="filter-btn active" data-filter="all">All <span id="countAll">0</span></button>
        <button class="filter-btn" data-filter="pinned">Pinned <span id="countPinned">0</span></button>
        <button class="filter-btn" data-filter="recent">Recent <span id="countRecent">0</span></button>
      </div>
    </aside>

    <section class="content">
      <div id="notesGrid" class="notes-grid"></div>

      <div id="emptyState" class="empty">
        <div style="font-size:44px">🗒️</div>
        <h3>No notes yet</h3>
        <p>Click Create New to add your first sticky note.</p>
      </div>
    </section>
  </main>
</div>

<div id="noteModal" class="modal">
  <div class="dialog">
    <div class="dialog-head">
      <div id="modalTitle" class="dialog-title">Create Note</div>
      <button id="closeModal" class="close">×</button>
    </div>

    <div class="dialog-body">
      <div class="field">
        <label class="label">Title</label>
        <input id="noteTitle" class="input" type="text" placeholder="Enter note title..." maxlength="80" />
      </div>

      <div class="field">
        <label class="label">Note</label>
        <textarea id="noteBody" class="textarea" placeholder="Write your note..."></textarea>
      </div>

      <div class="field">
        <label class="label">Color</label>
        <div id="colorList" class="colors"></div>
      </div>
    </div>

    <div class="dialog-foot">
      <button id="cancelBtn" class="btn">Cancel</button>
      <button id="saveBtn" class="btn primary">Save</button>
    </div>
  </div>
</div>

<div id="confirmModal" class="modal">
  <div class="dialog" style="width:min(420px,100%)">
    <div class="dialog-head">
      <div class="dialog-title">Delete Note</div>
      <button id="confirmClose" class="close">×</button>
    </div>
    <div class="dialog-body">
      <p class="confirm-text">Are you sure you want to delete this note?</p>
    </div>
    <div class="dialog-foot">
      <button id="confirmNo" class="btn">Cancel</button>
      <button id="confirmYes" class="btn primary" style="background:#dc2626">Delete</button>
    </div>
  </div>
</div>

<script>
let currentUser = {
  name: "Guest",
  email: "guest",
  photo: ""
};

let notes = [];
let editingId = null;
let deleteId = null;
let activeFilter = "all";
let selectedColor = "#fff4b8";

const COLORS = [
  "#fff4b8",
  "#dbeafe",
  "#dcfce7",
  "#ffe4e6",
  "#ede9fe",
  "#fef3c7",
  "#e0f2fe",
  "#f3f4f6"
];

const els = {
  userName: document.getElementById("userName"),
  userEmail: document.getElementById("userEmail"),
  pageSub: document.getElementById("pageSub"),
  searchInput: document.getElementById("searchInput"),
  createBtn: document.getElementById("createBtn"),
  notesGrid: document.getElementById("notesGrid"),
  emptyState: document.getElementById("emptyState"),
  noteModal: document.getElementById("noteModal"),
  modalTitle: document.getElementById("modalTitle"),
  closeModal: document.getElementById("closeModal"),
  cancelBtn: document.getElementById("cancelBtn"),
  saveBtn: document.getElementById("saveBtn"),
  noteTitle: document.getElementById("noteTitle"),
  noteBody: document.getElementById("noteBody"),
  colorList: document.getElementById("colorList"),
  confirmModal: document.getElementById("confirmModal"),
  confirmClose: document.getElementById("confirmClose"),
  confirmNo: document.getElementById("confirmNo"),
  confirmYes: document.getElementById("confirmYes"),
  countAll: document.getElementById("countAll"),
  countPinned: document.getElementById("countPinned"),
  countRecent: document.getElementById("countRecent")
};

function sanitizeEmail(email){
  return String(email || "guest")
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]/g, "_");
}

function getStorageKey(){
  return "stickyNotes_" + sanitizeEmail(currentUser.email);
}

function loadNotes(){
  try{
    notes = JSON.parse(localStorage.getItem(getStorageKey()) || "[]");
  }catch{
    notes = [];
  }
  renderNotes();
}

function saveNotes(){
  localStorage.setItem(getStorageKey(), JSON.stringify(notes));
}

function escapeHtml(str){
  return String(str || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function formatTime(ms){
  const d = new Date(Number(ms || Date.now()));
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth() + 1).padStart(2,"0");
  const yy = d.getFullYear();
  const hh = String(d.getHours()).padStart(2,"0");
  const mi = String(d.getMinutes()).padStart(2,"0");
  return `${dd}/${mm}/${yy} ${hh}:${mi}`;
}

function renderUser(){
  const name = currentUser.name || "Guest";
  const email = currentUser.email || "guest";

  els.userName.textContent = name;
  els.userEmail.textContent = email;
  els.pageSub.textContent = `Notes for ${name}`;
}

function getVisibleNotes(){
  const q = els.searchInput.value.trim().toLowerCase();

  let list = [...notes];

  if(activeFilter === "pinned"){
    list = list.filter(n => n.pinned);
  }

  if(activeFilter === "recent"){
    const sevenDays = Date.now() - (7 * 24 * 60 * 60 * 1000);
    list = list.filter(n => Number(n.updatedAt || 0) >= sevenDays);
  }

  if(q){
    list = list.filter(n =>
      String(n.title || "").toLowerCase().includes(q) ||
      String(n.body || "").toLowerCase().includes(q) ||
      String(n.userName || "").toLowerCase().includes(q)
    );
  }

  list.sort((a,b) => {
    if(Boolean(a.pinned) !== Boolean(b.pinned)){
      return a.pinned ? -1 : 1;
    }
    return Number(b.updatedAt || 0) - Number(a.updatedAt || 0);
  });

  return list;
}

function renderCounts(){
  els.countAll.textContent = notes.length;
  els.countPinned.textContent = notes.filter(n => n.pinned).length;

  const sevenDays = Date.now() - (7 * 24 * 60 * 60 * 1000);
  els.countRecent.textContent = notes.filter(n => Number(n.updatedAt || 0) >= sevenDays).length;
}

function renderNotes(){
  renderUser();
  renderCounts();

  const list = getVisibleNotes();
  els.notesGrid.innerHTML = "";

  if(!list.length){
    els.emptyState.classList.add("show");
    return;
  }

  els.emptyState.classList.remove("show");

  list.forEach(note => {
    const card = document.createElement("div");
    card.className = "note-card";
    card.style.background = note.color || "#fff4b8";

    card.innerHTML = `
      <div class="note-head">
        <div class="note-title">${escapeHtml(note.title || "Untitled")}</div>
        <button class="pin" title="Pin note" data-action="pin" data-id="${note.id}">
          ${note.pinned ? "📌" : "📍"}
        </button>
      </div>

      <div class="note-body">${escapeHtml(note.body || "")}</div>

      <div class="note-meta">
        <span class="note-user">👤 ${escapeHtml(note.userName || "Guest")}</span>
        <span>${formatTime(note.updatedAt)}</span>
      </div>

      <div class="note-actions">
        <button data-action="edit" data-id="${note.id}">Edit</button>
        <button data-action="delete" data-id="${note.id}">Delete</button>
      </div>
    `;

    els.notesGrid.appendChild(card);
  });
}

function renderColors(){
  els.colorList.innerHTML = "";

  COLORS.forEach(color => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "color-dot" + (color === selectedColor ? " active" : "");
    btn.style.background = color;
    btn.onclick = () => {
      selectedColor = color;
      renderColors();
    };
    els.colorList.appendChild(btn);
  });
}

function openModal(note = null){
  editingId = note ? note.id : null;
  selectedColor = note?.color || COLORS[0];

  els.modalTitle.textContent = note ? "Edit Note" : "Create Note";
  els.noteTitle.value = note?.title || "";
  els.noteBody.value = note?.body || "";

  renderColors();
  els.noteModal.classList.add("show");

  setTimeout(() => els.noteTitle.focus(), 50);
}

function closeModal(){
  els.noteModal.classList.remove("show");
  editingId = null;
}

function handleSave(){
  const title = els.noteTitle.value.trim();
  const body = els.noteBody.value.trim();

  if(!title && !body){
    els.noteTitle.focus();
    return;
  }

  const now = Date.now();

  if(editingId){
    notes = notes.map(n => {
      if(n.id !== editingId) return n;

      return {
        ...n,
        title: title || "Untitled",
        body,
        color: selectedColor,
        userName: currentUser.name || "Guest",
        userEmail: currentUser.email || "guest",
        updatedAt: now
      };
    });
  }else{
    notes.push({
      id: "note_" + now + "_" + Math.random().toString(16).slice(2),
      title: title || "Untitled",
      body,
      color: selectedColor,
      pinned: false,
      userName: currentUser.name || "Guest",
      userEmail: currentUser.email || "guest",
      createdAt: now,
      updatedAt: now
    });
  }

  saveNotes();
  closeModal();
  renderNotes();
}

function openConfirm(id){
  deleteId = id;
  els.confirmModal.classList.add("show");
}

function closeConfirm(){
  deleteId = null;
  els.confirmModal.classList.remove("show");
}

function deleteNote(){
  if(!deleteId) return;
  notes = notes.filter(n => n.id !== deleteId);
  saveNotes();
  closeConfirm();
  renderNotes();
}

function togglePin(id){
  notes = notes.map(n => {
    if(n.id !== id) return n;
    return {
      ...n,
      pinned: !n.pinned,
      updatedAt: Date.now()
    };
  });
  saveNotes();
  renderNotes();
}

function applyTheme(theme){
  document.body.classList.remove("light-theme","dark-theme");
  document.body.classList.add(theme === "dark" ? "dark-theme" : "light-theme");
}

function requestParentData(){
  try{
    window.parent.postMessage({ type:"sticky-notes-ready" }, "*");
    window.parent.postMessage({ type:"request-login" }, "*");
    window.parent.postMessage({ type:"request-theme" }, "*");
  }catch{}
}

window.addEventListener("message", (e) => {
  const data = e.data || {};

  if(data.type === "user-login" && data.user){
    currentUser = {
      name: data.user.name || "Guest",
      email: data.user.email || "guest",
      photo: data.user.photo || ""
    };
    loadNotes();
  }

  if(data.type === "theme-change"){
    applyTheme(data.theme);
  }
});

els.createBtn.addEventListener("click", () => openModal());
els.closeModal.addEventListener("click", closeModal);
els.cancelBtn.addEventListener("click", closeModal);
els.saveBtn.addEventListener("click", handleSave);
els.searchInput.addEventListener("input", renderNotes);

els.noteModal.addEventListener("click", (e) => {
  if(e.target === els.noteModal) closeModal();
});

els.confirmClose.addEventListener("click", closeConfirm);
els.confirmNo.addEventListener("click", closeConfirm);
els.confirmYes.addEventListener("click", deleteNote);

els.confirmModal.addEventListener("click", (e) => {
  if(e.target === els.confirmModal) closeConfirm();
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.filter || "all";
    renderNotes();
  });
});

els.notesGrid.addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-action]");
  if(!btn) return;

  const id = btn.dataset.id;
  const action = btn.dataset.action;
  const note = notes.find(n => n.id === id);

  if(action === "edit" && note) openModal(note);
  if(action === "delete") openConfirm(id);
  if(action === "pin") togglePin(id);
});

document.addEventListener("keydown", (e) => {
  if(e.key === "Escape"){
    closeModal();
    closeConfirm();
  }

  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "n"){
    e.preventDefault();
    openModal();
  }
});

(function init(){
  try{
    const localLogin = JSON.parse(localStorage.getItem("gmailLogin") || "{}");
    if(localLogin.email){
      currentUser = localLogin;
    }
  }catch{}

  const savedTheme = localStorage.getItem("siteTheme") || "light";
  applyTheme(savedTheme);
  loadNotes();
  requestParentData();

  setTimeout(requestParentData, 500);
  setTimeout(requestParentData, 1200);
})();
</script>
</body>
</html>
