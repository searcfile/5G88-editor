<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EVO888 Generator</title>
  <script>if (window.top === window.self) {window.location.replace("/main");}</script>
  <link rel="stylesheet" href="evo888/evo888.css">
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="header">EVO888 GENERATE</div>

  <div class="top-note-row">
    <button onclick="resetLog()" class="reset-button">Reset Log</button>
    <span class="key-note">Key (CTRL + C) Copy Image</span>
  </div>

 <div class="form-row form-row-top">
    <select id="gameSelect" class="select2 select-main">
    <option value="" disabled selected hidden>Select Game</option>
    <option value="BonusBears">BonusBears</option><option value="GreatChina">GreatChina</option><option value="AmazingThailand">AmazingThailand</option><option value="FairyGarden">FairyGarden</option><option value="TripleTwister">TripleTwister</option><option value="DolphinReef">DolphinReef</option><option value="GreatBlue">GreatBlue</option><option value="WaterMargin">WaterMargin</option><option value="PantherMoon">PantherMoon</option><option value="Laura">Laura</option><option value="HighWay">HighWay</option><option value="HalloweenFortune">HalloweenFortune</option><option value="SilverBullets">SilverBullets</option><option value="BigProsperity">BigProsperity</option><option value="GreatBlue">GreatBlue</option><option value="SafariHeat">SafariHeat</option><option value="Samurai">Samurai</option><option value="ZhaoCaiJinBao">ZhaoCaiJinBao</option><option value="FootBall">FootBall</option><option value="Iceland">Iceland</option><option value="GodOfWealth">GodOfWealth</option><option value="GoldenTour">GoldenTour</option><option value="Boyking">Boyking</option><option value="Victory">Victory</option><option value="GoldRush">GoldRush</option><option value="Amazon">Amazon</option>
  </select>
    
    <select id="betSelect" class="select-main">
      <option value="" disabled selected hidden>Select Bet</option>
    </select>
    <select id="pecahanSelect" class="select-main">
      <option value="" disabled selected hidden>Select Win</option>
    </select>
    
   <input type="text" id="manualTime" placeholder="Set Time" class="input-time" />
   <button onclick="setNow()" class="btn-main h38 px12 fs16">Click Now</button>
    
   <input type="number" id="freeGameInput" placeholder="Set Rows" class="input-small" />

    <button id="setFreeGameBtn" class="btn-main h38">Set Free Game</button>

    <button id="autoFreeGameBtn" class="btn-auto-off">
      AUTO OFF
    </button>
  </div>

  <div class="form-row bottom-gap">
    <div class="inline-group">
      <input type="number" id="manualScore" placeholder="Add Score" class="input-score" />
      <button id="autoAddScoreBtn" type="button" class="btn-auto-on">
        AUTO ON
      </button>
    </div>

    <div class="inline-group">
      <input type="number" id="manualJackpot" placeholder="Jackpot Amount" class="input-jackpot" />
    </div>

    <button onclick="addJackpot()" class="btn-main h38">Set Jackpot</button>

    <div class="inline-group">
      <input type="number" id="manualScoreInput" placeholder="Support Amount" class="input-support" />
    </div>

    <button onclick="addManualSetScore()" class="btn-main h38">Support Back</button>

    <div class="inline-group">
      <input type="number" id="manualWinInput" placeholder="Win Amount" class="input-win" />
    </div>

    <button onclick="setRandomWin()" class="btn-main h38">Set Winner</button>
  </div>

  <div class="form-row bottom-gap">
    <button onclick="generateLog()" class="btn-main h38">Change</button>
    <button onclick="deleteCents()" class="btn-main h38">Delete Cents</button>
    <button onclick="copyGameLogImage()" class="btn-main h38">COPY IMAGE</button>
  </div>
<div class="table-wrap">
  <table id="gameLog">
    <thead>
      <tr>
        <th>GameName</th>
        <th>TableID</th>
        <th>Bet</th>
        <th>Win</th>
        <th>BeginMoney</th>
        <th>EndMoney</th>
        <th>DateTime</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>
</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="evo888/evo888.js"></script>
</body>
</html>
