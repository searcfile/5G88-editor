<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Universal Valid Bet Calculator</title>

<style>
*{box-sizing:border-box}

:root{
  --bg:#050505;
  --panel:#111;
  --panel2:#080808;
  --border:#333;
  --text:#fff;
  --muted:#9ca3af;
  --gold:#f6c945;
  --gold2:#ffdd55;
}

html,body{
  width:100%;
  min-height:100%;
}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(246,201,69,.16), transparent 35%),
    radial-gradient(circle at bottom right, rgba(246,201,69,.08), transparent 35%),
    var(--bg);
  color:var(--text);
  font-family:Arial, sans-serif;
  padding:18px;
}

.container{
  width:min(100%, 1080px);
  margin:0 auto;
  background:linear-gradient(180deg,#141414,#0b0b0b);
  padding:20px;
  border-radius:20px;
  border:1px solid var(--border);
  box-shadow:0 22px 70px rgba(0,0,0,.55);
}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
}

h2{
  color:var(--gold);
  margin:0;
  font-size:25px;
  line-height:1.2;
}

.badge{
  color:#111;
  background:var(--gold);
  border-radius:999px;
  padding:7px 11px;
  font-size:12px;
  font-weight:bold;
}

textarea{
  display:block;
  width:100%;
  height:340px;
  resize:vertical;
  background:#030303;
  color:#fff;
  border:1px solid #444;
  border-radius:14px;
  padding:15px;
  outline:none;
  font-size:13px;
  line-height:1.5;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.02);
}

textarea::placeholder{color:var(--muted)}

textarea:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(246,201,69,.16);
}

.controls{
  margin-top:14px;
  display:grid;
  grid-template-columns:160px 180px 90px 1fr auto auto;
  gap:10px;
  align-items:center;
}

select,input{
  width:100%;
  height:40px;
  border-radius:10px;
  border:1px solid #444;
  background:#111;
  color:#fff;
  padding:0 12px;
  outline:none;
  font-size:14px;
}

select:focus,
input:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(246,201,69,.14);
}

.hint{
  color:var(--muted);
  font-size:12px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

button{
  height:40px;
  border:0;
  border-radius:10px;
  padding:0 16px;
  background:linear-gradient(180deg,var(--gold2),var(--gold));
  color:#111;
  font-weight:bold;
  cursor:pointer;
  font-size:14px;
}

button:hover{filter:brightness(1.08)}
button:active{transform:translateY(1px)}

.ghost{
  background:#222;
  color:#fff;
  border:1px solid #444;
}

.result{
  margin-top:15px;
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:10px;
}

.card{
  min-width:0;
  background:linear-gradient(180deg,#0b0b0b,#050505);
  border:1px solid #333;
  padding:14px;
  border-radius:14px;
}

.card .label{
  font-size:14px;
  margin-bottom:7px;
  color:#fff;
}

.value{
  font-size:26px;
  line-height:1;
  color:var(--gold);
  font-weight:bold;
  word-break:break-all;
}

.debug{
  margin-top:14px;
  background:#070707;
  border:1px solid #2b2b2b;
  border-radius:14px;
  overflow:hidden;
}

.debug-title{
  padding:11px 13px;
  color:var(--gold);
  font-weight:bold;
  border-bottom:1px solid #222;
}

.debug-list{
  max-height:190px;
  overflow:auto;
  font-size:12px;
}

.debug-row{
  display:grid;
  grid-template-columns:55px 90px 1fr;
  gap:8px;
  padding:8px 13px;
  border-bottom:1px solid rgba(255,255,255,.05);
  color:#ddd;
}

.debug-row.bad{color:#ff8b8b}
.debug-row.good{color:#d7ffd7}

textarea::-webkit-scrollbar,
.debug-list::-webkit-scrollbar{
  width:8px;
  height:8px;
}

textarea::-webkit-scrollbar-track,
.debug-list::-webkit-scrollbar-track{
  background:transparent;
}

textarea::-webkit-scrollbar-thumb,
.debug-list::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,.18);
  border-radius:999px;
}

textarea::-webkit-scrollbar-thumb:hover,
.debug-list::-webkit-scrollbar-thumb:hover{
  background:rgba(246,201,69,.45);
}

@media(max-width:850px){
  .controls{
    grid-template-columns:1fr 1fr 90px 1fr;
  }

  .controls button{
    width:100%;
  }

  .result{
    grid-template-columns:1fr;
  }
}

@media(max-width:520px){
  body{padding:10px}
  .container{padding:14px;border-radius:16px}
  .header{align-items:flex-start;flex-direction:column}
  h2{font-size:21px}
  textarea{height:300px}
  .controls{grid-template-columns:1fr}
  .hint{white-space:normal}
  .debug-row{grid-template-columns:45px 75px 1fr}
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <h2>Universal Valid Bet Calculator</h2>
    <div class="badge">Multi Platform</div>
  </div>

  <textarea id="input" placeholder="Paste game log text here..."></textarea>

  <div class="controls">
    <select id="mode">
      <option value="auto">Auto Detect</option>
      <option value="manual">Manual Column</option>
    </select>

    <input id="manualCol" type="number" value="3" min="1" title="Bet column position">

    <button type="button" onclick="applyManual()">OK</button>

    <div class="hint" id="hintText">Auto detect aktif. Manual boleh guna column apa saja.</div>

    <button type="button" onclick="copyResult()">Copy</button>
    <button type="button" class="ghost" onclick="clearAll()">Reset</button>
  </div>

  <div class="result">
    <div class="card">
      <div class="label">Total Bet</div>
      <div class="value" id="total">0.00</div>
    </div>

    <div class="card">
      <div class="label">Valid Rows</div>
      <div class="value" id="rows">0</div>
    </div>

    <div class="card">
      <div class="label">Skipped</div>
      <div class="value" id="skip">0</div>
    </div>
  </div>

  <div class="debug">
    <div class="debug-title">Detected Rows Preview</div>
    <div class="debug-list" id="debugList"></div>
  </div>
</div>

<script>
const input = document.getElementById("input");
const modeEl = document.getElementById("mode");
const manualColEl = document.getElementById("manualCol");
const hintText = document.getElementById("hintText");
const debugList = document.getElementById("debugList");

let manualColumn = 3;

function cleanNum(value){
  if(value === undefined || value === null) return null;

  let str = String(value)
    .replace(/,/g, "")
    .replace(/[^\d.\-]/g, "");

  if(!str || str === "-" || str === ".") return null;

  const num = Math.abs(parseFloat(str));
  if(isNaN(num)) return null;

  // safety: elak ID panjang detect jadi bet
  if(num > 1000000) return null;

  return num;
}

function isDate(v){
  return /^\d{4}-\d{2}-\d{2}$/.test(v);
}

function isTime(v){
  return /^\d{2}:\d{2}:\d{2}$/.test(v);
}

function isNumberToken(v){
  return /^-?\d+(?:,\d{3})*(?:\.\d+)?$/.test(v);
}

function applyManual(){
  manualColumn = parseInt(manualColEl.value, 10) || 1;
  modeEl.value = "manual";
  calculate();
}

function extractBet(line){
  if(!line.trim()) return null;
  if(/set\s*score/i.test(line)) return null;
  if(/transfer\s*success/i.test(line)) return null;
  if(/withdraw/i.test(line) && !/bet/i.test(line)) return null;

  const parts = line.trim().split(/\s+/);
  const mode = modeEl.value;

  // ✅ Manual mode: ikut column yang bro pilih
  if(mode === "manual"){
    const index = manualColumn - 1;
    return cleanNum(parts[index]);
  }

  // ✅ Auto Format A:
  // Game TableID Bet Win Begin End Date Time
  // DolphinReef 0 2.00 0.00 17.98 15.98 2026-04-30 13:46:53
  const firstDateIndex = parts.findIndex(isDate);

  if(firstDateIndex !== -1){
    const beforeDate = parts.slice(0, firstDateIndex);
    const numsBeforeDate = beforeDate.filter(isNumberToken);

    // kalau sebelum date ada 5 angka: tableId, bet, win, begin, end
    if(numsBeforeDate.length >= 5){
      const bet = cleanNum(numsBeforeDate[1]);
      if(bet !== null) return bet;
    }

    // ✅ Auto Format B:
    // ... ID 2026-04-30 18:24:04 -5.0000 0.0000 -5.0000 4.0000 ...
    if(parts[firstDateIndex + 1] && isTime(parts[firstDateIndex + 1])){
      const betAfterDateTime = cleanNum(parts[firstDateIndex + 2]);
      if(betAfterDateTime !== null) return betAfterDateTime;
    }
  }

  // ✅ Auto Format C:
  // Ada perkataan Bet, ambil nombor valid selepas Bet
  const betWordIndex = parts.findIndex(x => /^bet$/i.test(x));
  if(betWordIndex !== -1){
    for(let i = betWordIndex + 1; i < parts.length; i++){
      if(isDate(parts[i])) break;
      const n = cleanNum(parts[i]);
      if(n !== null && n > 0) return n;
    }
  }

  return null;
}

function calculate(){
  const lines = input.value.split(/\n+/);

  let total = 0;
  let valid = 0;
  let skip = 0;
  let preview = [];

  lines.forEach((line, idx)=>{
    if(!line.trim()) return;

    const bet = extractBet(line);

    if(bet !== null){
      total += bet;
      valid++;

      if(preview.length < 80){
        preview.push({
          type:"good",
          no:idx + 1,
          bet:bet.toFixed(2),
          text:line.trim()
        });
      }
    }else{
      skip++;

      if(preview.length < 80){
        preview.push({
          type:"bad",
          no:idx + 1,
          bet:"Skip",
          text:line.trim()
        });
      }
    }
  });

  document.getElementById("total").textContent = total.toFixed(2);
  document.getElementById("rows").textContent = valid;
  document.getElementById("skip").textContent = skip;

  renderPreview(preview);
}

function renderPreview(items){
  if(!items.length){
    debugList.innerHTML = `<div class="debug-row bad"><div>-</div><div>Empty</div><div>No data pasted yet.</div></div>`;
    return;
  }

  debugList.innerHTML = items.map(item => `
    <div class="debug-row ${item.type}">
      <div>#${item.no}</div>
      <div>${item.bet}</div>
      <div>${escapeHTML(item.text)}</div>
    </div>
  `).join("");
}

function escapeHTML(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function copyResult(){
  const total = document.getElementById("total").textContent;
  navigator.clipboard.writeText(total);
}

function clearAll(){
  input.value = "";
  calculate();
}

input.addEventListener("input", calculate);

modeEl.addEventListener("change", ()=>{
  if(modeEl.value === "manual"){
    manualColumn = parseInt(manualColEl.value, 10) || 1;
    hintText.textContent = "Manual aktif: masukkan nombor column, lalu tekan OK.";
  }else{
    hintText.textContent = "Auto detect aktif. Manual boleh guna column apa saja.";
  }
  calculate();
});

manualColEl.addEventListener("keydown", (e)=>{
  if(e.key === "Enter"){
    applyManual();
  }
});

calculate();
</script>

</body>
</html>
