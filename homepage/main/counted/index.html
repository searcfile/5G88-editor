<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Universal Valid Bet Calculator</title>

<style>
*{
  box-sizing:border-box;
}

html,
body{
  width:100%;
  min-height:100%;
}

body{
  margin:0;
  min-height:100vh;
  background:#050505;
  color:#fff;
  font-family:Arial, sans-serif;
  padding:18px;
}

.container{
  width:min(100%, 980px);
  margin:0 auto;
  background:#111;
  padding:18px;
  border-radius:16px;
  border:1px solid #333;
  box-shadow:0 18px 50px rgba(0,0,0,.45);
}

h2{
  color:#f6c945;
  margin:20px 0 14px;
  font-size:24px;
  line-height:1.2;
}

textarea{
  display:block;
  width:100%;
  height:325px;
  resize:vertical;
  background:#030303;
  color:#fff;
  border:1px solid #444;
  border-radius:10px;
  padding:14px;
  outline:none;
  font-size:13px;
  line-height:1.5;
}

textarea::placeholder{
  color:#9ca3af;
}

textarea:focus{
  border-color:#f6c945;
  box-shadow:0 0 0 3px rgba(246,201,69,.18);
}

.controls{
  margin-top:14px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

select,
input{
  height:38px;
  border-radius:8px;
  border:1px solid #444;
  background:#111;
  color:#fff;
  padding:0 12px;
  outline:none;
  font-size:14px;
}

select{
  width:132px;
}

input{
  width:185px;
}

select:focus,
input:focus{
  border-color:#f6c945;
  box-shadow:0 0 0 3px rgba(246,201,69,.14);
}

button{
  height:38px;
  border:0;
  border-radius:8px;
  padding:0 16px;
  background:#f6c945;
  color:#111;
  font-weight:bold;
  cursor:pointer;
  font-size:14px;
}

button:hover{
  filter:brightness(1.08);
}

button:active{
  transform:translateY(1px);
}

.ghost{
  background:#222;
  color:#fff;
  border:1px solid #444;
}

.result{
  margin-top:15px;
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:10px;
}

.card{
  min-width:0;
  background:#080808;
  border:1px solid #333;
  padding:12px;
  border-radius:10px;
}

.card > div:first-child{
  font-size:14px;
  margin-bottom:5px;
  color:#fff;
}

.value{
  font-size:24px;
  line-height:1;
  color:#f6c945;
  font-weight:bold;
}

/* scrollbar cantik */
textarea::-webkit-scrollbar{
  width:8px;
  height:8px;
}

textarea::-webkit-scrollbar-track{
  background:transparent;
}

textarea::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,.18);
  border-radius:999px;
}

textarea::-webkit-scrollbar-thumb:hover{
  background:rgba(246,201,69,.45);
}

/* responsive tablet / phone */
@media(max-width:700px){
  body{
    padding:12px;
  }

  .container{
    padding:14px;
  }

  h2{
    font-size:21px;
    margin-top:8px;
  }

  textarea{
    height:300px;
  }

  .controls{
    display:grid;
    grid-template-columns:1fr 1fr;
  }

  select,
  input,
  button{
    width:100%;
  }

  .result{
    grid-template-columns:1fr;
  }
}

@media(max-width:420px){
  body{
    padding:10px;
  }

  .container{
    padding:12px;
    border-radius:14px;
  }

  .controls{
    grid-template-columns:1fr;
  }

  h2{
    font-size:20px;
  }

  textarea{
    height:280px;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>Universal Valid Bet Calculator</h2>

  <textarea id="input" placeholder="Paste game log text here..."></textarea>

  <div class="controls">
    <select id="mode">
      <option value="auto">Auto Detect</option>
      <option value="manual">Manual Column</option>
    </select>

    <input id="manualCol" type="number" value="3" min="1" title="Bet column position">
    
    <button onclick="copyResult()">Copy</button>
    <button class="ghost" onclick="clearAll()">Reset</button>
  </div>

  <div class="result">
    <div class="card">
      <div>Total Bet</div>
      <div class="value" id="total">0.00</div>
    </div>

    <div class="card">
      <div>Valid Rows</div>
      <div class="value" id="rows">0</div>
    </div>

    <div class="card">
      <div>Skipped</div>
      <div class="value" id="skip">0</div>
    </div>
  </div>
</div>

<script>
const input = document.getElementById("input");

function extractBet(line){
  if(/set\s*score/i.test(line)) return null;

  const parts = line.trim().split(/\s+/);
  const mode = document.getElementById("mode").value;

  // MANUAL MODE
  if(mode === "manual"){
    const col = parseInt(document.getElementById("manualCol").value) - 1;
    const bet = parseFloat(parts[col]);
    return isNaN(bet) ? null : bet;
  }

  // AUTO MODE
  const dateIndex = parts.findIndex(x => /^\d{4}-\d{2}-\d{2}$/.test(x));
  if(dateIndex === -1) return null;

  const beforeDate = parts.slice(0, dateIndex);

  const nums = beforeDate.filter(x => /^-?\d+(\.\d+)?$/.test(x));

  // biasanya: TableID, Bet, Win, BeginMoney, EndMoney
  if(nums.length < 2) return null;

  const bet = parseFloat(nums[1]);

  return isNaN(bet) ? null : bet;
}

function calculate(){
  const lines = input.value.split(/\n+/);

  let total = 0;
  let valid = 0;
  let skip = 0;

  lines.forEach(line=>{
    if(!line.trim()) return;

    const bet = extractBet(line);

    if(bet !== null){
      total += bet;
      valid++;
    }else{
      skip++;
    }
  });

  document.getElementById("total").textContent = total.toFixed(2);
  document.getElementById("rows").textContent = valid;
  document.getElementById("skip").textContent = skip;
}

function copyResult(){
  navigator.clipboard.writeText(document.getElementById("total").textContent);
}

function clearAll(){
  input.value = "";
  calculate();
}

input.addEventListener("input", calculate);
</script>

</body>
</html>
