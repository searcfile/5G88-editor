<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Platform Valid Bet Calculator</title>

<style>
*{box-sizing:border-box}

:root{
  --bg:#050505;
  --border:#333;
  --text:#fff;
  --muted:#9ca3af;
  --gold:#f6c945;
  --gold2:#ffdd55;
}

html,body{width:100%;min-height:100%}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(246,201,69,.16), transparent 35%),
    radial-gradient(circle at bottom right, rgba(246,201,69,.08), transparent 35%),
    var(--bg);
  color:var(--text);
  font-family:Arial,sans-serif;
  padding:18px;
}

.container{
  width:min(100%,1120px);
  margin:0 auto;
  background:linear-gradient(180deg,#141414,#0b0b0b);
  padding:20px;
  border-radius:20px;
  border:1px solid var(--border);
  box-shadow:0 22px 70px rgba(0,0,0,.55);
}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
}

h2{
  color:var(--gold);
  margin:0;
  font-size:25px;
}

.badge{
  color:#111;
  background:var(--gold);
  border-radius:999px;
  padding:7px 11px;
  font-size:12px;
  font-weight:bold;
}

textarea{
  width:100%;
  height:340px;
  resize:vertical;
  background:#030303;
  color:#fff;
  border:1px solid #444;
  border-radius:14px;
  padding:15px;
  outline:none;
  font-size:13px;
  line-height:1.5;
}

textarea::placeholder{color:var(--muted)}

textarea:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(246,201,69,.16);
}

.panel{
  margin-top:14px;
  display:grid;
  grid-template-columns:1.1fr .8fr .7fr auto auto auto;
  gap:10px;
  align-items:center;
}

.add-panel{
  margin-top:10px;
  display:grid;
  grid-template-columns:1fr 150px auto;
  gap:10px;
  align-items:center;
  padding:12px;
  border:1px solid #2f2f2f;
  border-radius:14px;
  background:#090909;
}

select,input{
  width:100%;
  height:40px;
  border-radius:10px;
  border:1px solid #444;
  background:#111;
  color:#fff;
  padding:0 12px;
  outline:none;
  font-size:14px;
}

select:focus,input:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(246,201,69,.14);
}

button{
  height:40px;
  border:0;
  border-radius:10px;
  padding:0 16px;
  background:linear-gradient(180deg,var(--gold2),var(--gold));
  color:#111;
  font-weight:bold;
  cursor:pointer;
  font-size:14px;
}

button:hover{filter:brightness(1.08)}
button:active{transform:translateY(1px)}

.ghost{
  background:#222;
  color:#fff;
  border:1px solid #444;
}

.danger{
  background:#3a1515;
  color:#ffb4b4;
  border:1px solid #6b2525;
}

.hint{
  margin-top:8px;
  color:var(--muted);
  font-size:12px;
}

.result{
  margin-top:15px;
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
}

.card{
  background:linear-gradient(180deg,#0b0b0b,#050505);
  border:1px solid #333;
  padding:14px;
  border-radius:14px;
}

.card .label{
  font-size:14px;
  margin-bottom:7px;
}

.value{
  font-size:26px;
  color:var(--gold);
  font-weight:bold;
  word-break:break-all;
}

.debug{
  margin-top:14px;
  background:#070707;
  border:1px solid #2b2b2b;
  border-radius:14px;
  overflow:hidden;
}

.debug-title{
  padding:11px 13px;
  color:var(--gold);
  font-weight:bold;
  border-bottom:1px solid #222;
}

.debug-list{
  max-height:210px;
  overflow:auto;
  font-size:12px;
}

.debug-row{
  display:grid;
  grid-template-columns:55px 90px 80px 1fr;
  gap:8px;
  padding:8px 13px;
  border-bottom:1px solid rgba(255,255,255,.05);
  color:#ddd;
}

.debug-row.bad{color:#ff8b8b}
.debug-row.good{color:#d7ffd7}

textarea::-webkit-scrollbar,
.debug-list::-webkit-scrollbar{
  width:8px;
  height:8px;
}

textarea::-webkit-scrollbar-track,
.debug-list::-webkit-scrollbar-track{background:transparent}

textarea::-webkit-scrollbar-thumb,
.debug-list::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,.18);
  border-radius:999px;
}

@media(max-width:900px){
  .panel,.add-panel{grid-template-columns:1fr 1fr}
  .result{grid-template-columns:1fr}
}

@media(max-width:520px){
  body{padding:10px}
  .container{padding:14px;border-radius:16px}
  .header{align-items:flex-start;flex-direction:column}
  h2{font-size:21px}
  textarea{height:300px}
  .panel,.add-panel{grid-template-columns:1fr}
  .debug-row{grid-template-columns:42px 70px 60px 1fr}
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <h2>Platform Valid Bet Calculator</h2>
    <div class="badge">Custom Platform</div>
  </div>

  <textarea id="input" placeholder="Paste game log text here..."></textarea>

  <div class="panel">
    <select id="platformSelect"></select>

    <select id="columnMode">
      <option value="number">Number Column</option>
      <option value="text">Text Column</option>
      <option value="afterDateTime">After Date Time</option>
    </select>

    <input id="betColumn" type="number" value="1" min="1">

    <button type="button" id="applyBtn">Apply</button>
    <button type="button" id="copyBtn">Copy</button>
    <button type="button" class="ghost" id="resetBtn">Reset</button>
  </div>

  <div class="add-panel">
    <input id="newPlatformName" placeholder="New platform name, contoh: XE88">
    <input id="newPlatformCol" type="number" min="1" value="1" placeholder="Bet column">
    <button type="button" id="savePlatformBtn">Save Platform</button>
  </div>

  <div class="hint" id="hintText">
    Number Column = kira ikut nombor saja. Contoh: -5.0000 0.0000 -5.0000 = column 1 ialah 5.00.
  </div>

  <div class="result">
    <div class="card">
      <div class="label">Total Bet</div>
      <div class="value" id="total">0.00</div>
    </div>
    <div class="card">
      <div class="label">Valid Rows</div>
      <div class="value" id="rows">0</div>
    </div>
    <div class="card">
      <div class="label">Skipped</div>
      <div class="value" id="skip">0</div>
    </div>
  </div>

  <div class="debug">
    <div class="debug-title">Detected Rows Preview</div>
    <div class="debug-list" id="debugList"></div>
  </div>
</div>

<script>
const input = document.getElementById("input");
const platformSelect = document.getElementById("platformSelect");
const columnMode = document.getElementById("columnMode");
const betColumn = document.getElementById("betColumn");
const hintText = document.getElementById("hintText");
const debugList = document.getElementById("debugList");

const STORAGE_KEY = "validBetPlatforms.v2";

const defaultPlatforms = {
  dolphin: {
    name: "Dolphin / Format Lama",
    mode: "number",
    col: 2
  },
  fortune: {
    name: "Fortune Gems / DateTime",
    mode: "afterDateTime",
    col: 1
  }
};

let platforms = loadPlatforms();
let activeKey = localStorage.getItem("activeValidBetPlatform") || "dolphin";

function loadPlatforms(){
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  return {...defaultPlatforms, ...saved};
}

function savePlatforms(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(platforms));
}

function renderPlatforms(){
  platformSelect.innerHTML = "";

  Object.keys(platforms).forEach(key=>{
    const opt = document.createElement("option");
    opt.value = key;
    opt.textContent = platforms[key].name;
    platformSelect.appendChild(opt);
  });

  if(!platforms[activeKey]){
    activeKey = Object.keys(platforms)[0];
  }

  platformSelect.value = activeKey;
  loadPlatformSetting();
}

function loadPlatformSetting(){
  const p = platforms[platformSelect.value];
  if(!p) return;

  columnMode.value = p.mode || "number";
  betColumn.value = p.col || 1;

  localStorage.setItem("activeValidBetPlatform", platformSelect.value);
  updateHint();
}

function updatePlatformSetting(){
  const key = platformSelect.value;
  if(!platforms[key]) return;

  platforms[key].mode = columnMode.value;
  platforms[key].col = parseInt(betColumn.value, 10) || 1;

  savePlatforms();
  updateHint();
  calculate();
}

function saveNewPlatform(){
  const name = document.getElementById("newPlatformName").value.trim();
  const col = parseInt(document.getElementById("newPlatformCol").value, 10) || 1;

  if(!name){
    alert("Isi nama platform dulu bro");
    return;
  }

  const key = name.toLowerCase()
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_+|_+$/g, "");

  platforms[key] = {
    name,
    mode: columnMode.value || "number",
    col
  };

  savePlatforms();
  activeKey = key;
  renderPlatforms();

  document.getElementById("newPlatformName").value = "";
  document.getElementById("newPlatformCol").value = "1";

  calculate();
}

function cleanNum(value){
  if(value === undefined || value === null) return null;

  let str = String(value)
    .replace(/,/g, "")
    .replace(/[^\d.\-]/g, "");

  if(!str || str === "-" || str === ".") return null;

  const num = Math.abs(parseFloat(str));
  if(isNaN(num)) return null;
  if(num > 1000000) return null;

  return num;
}

function isDate(v){
  return /^\d{4}-\d{2}-\d{2}$/.test(v);
}

function isTime(v){
  return /^\d{2}:\d{2}:\d{2}$/.test(v);
}

function getTextColumns(line){
  return line.trim().split(/\s+/);
}

function getNumberColumns(line){
  return getTextColumns(line)
    .filter(x => !isDate(x) && !isTime(x))
    .map(cleanNum)
    .filter(x => x !== null);
}

function extractBet(line){
  if(!line.trim()) return null;
  if(/set\s*score/i.test(line)) return null;
  if(/transfer\s*success/i.test(line)) return null;
  if(/withdraw/i.test(line) && !/bet/i.test(line)) return null;

  const p = platforms[platformSelect.value];
  if(!p) return null;

  const mode = p.mode;
  const col = (parseInt(p.col, 10) || 1) - 1;
  const parts = getTextColumns(line);

  if(mode === "text"){
    return cleanNum(parts[col]);
  }

  if(mode === "number"){
    const nums = getNumberColumns(line);
    return nums[col] ?? null;
  }

  if(mode === "afterDateTime"){
    const dateIndex = parts.findIndex((x, i) =>
      isDate(x) && parts[i + 1] && isTime(parts[i + 1])
    );

    if(dateIndex !== -1){
      return cleanNum(parts[dateIndex + 2]);
    }

    return null;
  }

  return null;
}

function calculate(){
  const lines = input.value.split(/\n+/);

  let total = 0;
  let valid = 0;
  let skip = 0;
  let preview = [];

  lines.forEach((line, idx)=>{
    if(!line.trim()) return;

    const bet = extractBet(line);

    if(bet !== null){
      total += bet;
      valid++;

      if(preview.length < 100){
        preview.push({
          type:"good",
          no:idx + 1,
          bet:bet.toFixed(2),
          col: platforms[platformSelect.value].col,
          text:line.trim()
        });
      }
    }else{
      skip++;

      if(preview.length < 100){
        preview.push({
          type:"bad",
          no:idx + 1,
          bet:"Skip",
          col:"-",
          text:line.trim()
        });
      }
    }
  });

  document.getElementById("total").textContent = total.toFixed(2);
  document.getElementById("rows").textContent = valid;
  document.getElementById("skip").textContent = skip;

  renderPreview(preview);
}

function renderPreview(items){
  if(!items.length){
    debugList.innerHTML = `
      <div class="debug-row bad">
        <div>-</div><div>Empty</div><div>-</div><div>No data pasted yet.</div>
      </div>
    `;
    return;
  }

  debugList.innerHTML = items.map(item => `
    <div class="debug-row ${item.type}">
      <div>#${item.no}</div>
      <div>${item.bet}</div>
      <div>Col ${item.col}</div>
      <div>${escapeHTML(item.text)}</div>
    </div>
  `).join("");
}

function updateHint(){
  const mode = columnMode.value;
  const col = betColumn.value || 1;

  if(mode === "number"){
    hintText.textContent = `Number Column aktif: system kira nombor saja. Sekarang ambil nombor column ${col}.`;
  }else if(mode === "text"){
    hintText.textContent = `Text Column aktif: system kira ikut semua column text. Sekarang ambil text column ${col}.`;
  }else{
    hintText.textContent = `After Date Time aktif: system ambil nombor selepas date + time pertama. Sesuai format Fortune Gems.`;
  }
}

function escapeHTML(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function copyResult(){
  navigator.clipboard.writeText(document.getElementById("total").textContent);
}

function clearAll(){
  input.value = "";
  calculate();
}

document.getElementById("applyBtn").addEventListener("click", updatePlatformSetting);
document.getElementById("copyBtn").addEventListener("click", copyResult);
document.getElementById("resetBtn").addEventListener("click", clearAll);
document.getElementById("savePlatformBtn").addEventListener("click", saveNewPlatform);

input.addEventListener("input", calculate);

platformSelect.addEventListener("change", ()=>{
  activeKey = platformSelect.value;
  loadPlatformSetting();
  calculate();
});

columnMode.addEventListener("change", updateHint);
betColumn.addEventListener("keydown", e=>{
  if(e.key === "Enter") updatePlatformSetting();
});

renderPlatforms();
calculate();
</script>

</body>
</html>
