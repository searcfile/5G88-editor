<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Universal Valid Bet Calculator</title>

<style>
body{
  margin:0;
  background:#050505;
  color:#fff;
  font-family:Arial;
  padding:20px;
}

.container{
  max-width:950px;
  margin:auto;
  background:#111;
  padding:18px;
  border-radius:16px;
  border:1px solid #333;
}

h2{
  color:#f6c945;
  margin-bottom:12px;
}

textarea{
  width:100%;
  height:300px;
  background:#050505;
  color:#fff;
  border:1px solid #444;
  border-radius:10px;
  padding:12px;
  outline:none;
}

textarea:focus{
  border-color:#f6c945;
  box-shadow:0 0 0 2px rgba(246,201,69,.2);
}

.controls{
  margin:10px 0;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

select,input{
  padding:8px;
  border-radius:8px;
  border:1px solid #444;
  background:#111;
  color:#fff;
}

.result{
  margin-top:15px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.card{
  background:#0b0b0b;
  border:1px solid #333;
  padding:12px;
  border-radius:10px;
}

.value{
  font-size:24px;
  color:#f6c945;
  font-weight:bold;
}

button{
  padding:10px 14px;
  border:0;
  border-radius:8px;
  background:#f6c945;
  color:#111;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  filter:brightness(1.1);
}

.ghost{
  background:#222;
  color:#fff;
  border:1px solid #444;
}

@media(max-width:600px){
  .result{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>Universal Valid Bet Calculator</h2>

  <textarea id="input" placeholder="Paste game log text here..."></textarea>

  <div class="controls">
    <select id="mode">
      <option value="auto">Auto Detect</option>
      <option value="manual">Manual Column</option>
    </select>

    <input id="manualCol" type="number" value="3" min="1" title="Bet column position">
    
    <button onclick="copyResult()">Copy</button>
    <button class="ghost" onclick="clearAll()">Reset</button>
  </div>

  <div class="result">
    <div class="card">
      <div>Total Bet</div>
      <div class="value" id="total">0.00</div>
    </div>

    <div class="card">
      <div>Valid Rows</div>
      <div class="value" id="rows">0</div>
    </div>

    <div class="card">
      <div>Skipped</div>
      <div class="value" id="skip">0</div>
    </div>
  </div>
</div>

<script>
const input = document.getElementById("input");

function extractBet(line){
  if(/set\s*score/i.test(line)) return null;

  const parts = line.trim().split(/\s+/);
  const mode = document.getElementById("mode").value;

  // MANUAL MODE
  if(mode === "manual"){
    const col = parseInt(document.getElementById("manualCol").value) - 1;
    const bet = parseFloat(parts[col]);
    return isNaN(bet) ? null : bet;
  }

  // AUTO MODE
  const dateIndex = parts.findIndex(x => /^\d{4}-\d{2}-\d{2}$/.test(x));
  if(dateIndex === -1) return null;

  const beforeDate = parts.slice(0, dateIndex);

  const nums = beforeDate.filter(x => /^-?\d+(\.\d+)?$/.test(x));

  // biasanya: TableID, Bet, Win, BeginMoney, EndMoney
  if(nums.length < 2) return null;

  const bet = parseFloat(nums[1]);

  return isNaN(bet) ? null : bet;
}

function calculate(){
  const lines = input.value.split(/\n+/);

  let total = 0;
  let valid = 0;
  let skip = 0;

  lines.forEach(line=>{
    if(!line.trim()) return;

    const bet = extractBet(line);

    if(bet !== null){
      total += bet;
      valid++;
    }else{
      skip++;
    }
  });

  document.getElementById("total").textContent = total.toFixed(2);
  document.getElementById("rows").textContent = valid;
  document.getElementById("skip").textContent = skip;
}

function copyResult(){
  navigator.clipboard.writeText(document.getElementById("total").textContent);
}

function clearAll(){
  input.value = "";
  calculate();
}

input.addEventListener("input", calculate);
</script>

</body>
</html>
