      :root{
    --page-bg: #000;
    --page-text: rgba(255,255,255,0.85);
    --page-input: #141414;
    --border-input:#424242;
    --page-bg2:#1f1f1f;
    --name:#1668dc;
    --blur:rgba(255,255,255,0.25);

    --blue: #1668dc;
    --blue-hover: #3c89e8;
    --blue-active: #1554ad;
  }

  body.light-theme{
    --page-bg: #ffffff;
    --page-text: rgba(0,0,0,0.88);
    --page-input: #ffffff;
    --border-input:#d9d9d9;
    --page-bg2:#ffffff;
    --name:#1668dc;
    --blur:#00000063;

    --blue: #1668dc;
    --blue-hover: #3c89e8;
    --blue-active: #1554ad;
  }


    *{ box-sizing:border-box; margin:0; padding:0; }

    body{
      min-height:100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:var(--page-bg);
      color:var(--page-text);
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:0 12px;
      margin-top:16px;
    }

    .wrapper{
      width:100%;
      max-width:1400px;
    }

    /* SEARCH */
    .search-wrapper{
      display:flex;
      justify-content:center;
      margin-bottom:10px;
    }

    .search-box{
      position:relative;
      width:100%;
      max-width:360px;
    }

    .search-input{
      width:100%;
      padding:9px 40px 9px 38px;
      border-radius:6px;
      border:1px solid var(--border-input);
      background:var(--page-input);
      color:var(--page-text);
      font-size:0.9rem;
      outline:none;
      transition:
        border-color 0.15s ease,
        box-shadow 0.15s ease,
        background 0.15s ease,
        transform 0.08s ease;
    }

    .search-input::placeholder{
      color:var(--blur);
    }

    .search-input:focus{
      border-color:var(--blue);
    }
    .search-input:hover{
      border-color:var(--blue-hover);
    }
    .search-icon{
      position:absolute;
      left:12px;
      top:50%;
      transform:translateY(-50%);
      font-size:0.9rem;
      opacity:0.8;
      pointer-events:none;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .search-svg{
      width:16px;
      height:16px;
      fill:var(--blur);
      transition:fill 0.15s ease;
    }

    .search-input:focus ~ .search-icon .search-svg{
      fill:var(--accent-soft);
    }

    .clear-btn{
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      width:22px;
      height:22px;
      border-radius:999px;
      border:1px solid transparent;
      background:transparent;
      color:var(--page-text);
      font-size:0.78rem;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0;
      pointer-events:none;
      transition:
        opacity 0.12s ease,
        background 0.12s ease,
        border-color 0.12s ease,
        color 0.12s ease,
        transform 0.08s ease;
    }

    .clear-btn:hover{
      color:var(--blue-hover);
    }

    .clear-btn:active{
     color:var(--blue-active);
    }

    /* GRID */
    .card-grid{
      display:flex;
      flex-wrap:wrap;
      gap:16px;
      justify-content:center;
      align-items:flex-start;
      width:100%;
    }

    .item-card{
      background:var(--page-bg2);
      border-radius:6px;
      border:1px solid var(--border-input);
      padding:12px 12px 14px;
      display:flex;
      flex-direction:column;
      gap:10px;
      position:relative;
      overflow:hidden;
      cursor:default;
      transition:
        transform 0.16s ease,
        box-shadow 0.16s ease,
        border-color 0.16s ease;
      min-height:260px;

      /* 6 card per baris dengan gap 16px (5 gap = 80) */
      flex: 0 0 calc((100% - 80px) / 6);
      max-width: calc((100% - 80px) / 6);

      /* bantu GPU */
      will-change: transform;
    }

    /* matikan glow radial berat, biar render lebih ringan */
    .item-card::before{
      content:"";
      position:absolute;
      inset:0;
      opacity:0;
      pointer-events:none;
      /* kalau mau glow tipis boleh pakai warna lembut, sekarang dimatikan */
      background:none;
      transition:opacity 0.2s ease;
    }

    .item-card.copied{
      border-color:var(--border-input);
    }

    .image-wrap{
      border-radius:10px;
      overflow:hidden;
      position:relative;
      background:var(--page-input);
      border:1px solid var(--border-input);
      height:180px;
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .image-wrap::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(to top, rgba(15,23,42,0.55), transparent 40%);
      opacity:0.2;
    }

    .image-wrap img{
      width:100%;
      height:100%;
      display:block;
      object-fit:contain;
      object-position:center;
      transition:transform 0.25s ease;
      will-change: transform;
    }

    .item-card:hover .image-wrap img{
      transform:scale(1.04);
    }

    .item-info{
      display:flex;
      flex-direction:column;
      gap:4px;
      margin-top:4px;
      flex-grow:1;
    }

    .item-title{
      font-size:1rem;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .item-code{
      font-family:"JetBrains Mono","SF Mono",Consolas,monospace;
      font-size:0.8rem;
      font-weight:500;
      color:#3c89e8;
      background:#111a2c;
      border-radius:4px;
      padding-inline: 7px;
      align-self:flex-start;
      border:1px solid #15325b;
      line-height: 20px;
    }

    .copy-btn{
      margin-top:8px;
      border:none;
      outline:none;
      padding:0px 15px;
      border-radius:6px;
      font-size:14px;
      letter-spacing:0.06em;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      background:var(--blue);
      color:white;
      border:1px solid transparent;
      transition: all .2s ease;
      height:32px;
    
    }

    .copy-btn span.icon{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      translate:0 0;
      transition: all .2s ease:
    }

    .copy-btn .copy-icon-svg{
      width:16px;
      height:16px;
      fill:#38bdf8;
      transition: all .2s ease:
    }

    .copy-btn:hover .copy-icon-svg{
      fill:#0ea5e9;
    }

    .item-card.copied .copy-icon-svg{
      fill:#022c22;
    }

    .copy-btn:hover{
      background:var(--blue-hover);
    }

    .copy-btn:active{
      background:var(--blue-active);
    }

    .copy-toast{
      position:fixed;
      left:50%;
      bottom:22px;
      transform:translateX(-50%) translateY(30px);
      padding:10px 16px;
      border-radius:6px;
      background:#141414;
      border:1px solid #424242;
      color:rgba(255,255,255,0.85);
      font-size:14px;
      letter-spacing:0.08em;
      display:flex;
      align-items:center;
      gap:8px;
      opacity:0;
      pointer-events:none;
      transition:opacity 0.18s ease, transform 0.18s ease;
      z-index:50;
    }

    .copy-toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    /* 4 card per baris */
    @media (max-width: 1024px){
      .item-card{
        flex: 0 0 calc((100% - 48px) / 4);
        max-width: calc((100% - 48px) / 4);
      }
    }

    /* 3 card per baris */
    @media (max-width: 800px){
      .item-card{
        flex: 0 0 calc((100% - 32px) / 3);
        max-width: calc((100% - 32px) / 3);
      }
    }

    /* 2 card per baris */
    @media (max-width: 600px){
      .item-card{
        flex: 0 0 calc((100% - 16px) / 2);
        max-width: calc((100% - 16px) / 2);
      }
    }

    /* 1 card full di HP kecil */
    @media (max-width: 400px){
      .item-card{
        flex: 0 0 100%;
        max-width:100%;
      }
    }
  /* ================= SCROLLBAR GLOBAL ================= */

/* Chrome, Edge, Safari */
::-webkit-scrollbar {
  width: 6px; /* nipis */
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: #555;

/* Firefox */
html {
  scrollbar-width: thin;
  scrollbar-color: #555 transparent;
}
  :where(button, a, .btn, [tabindex]):focus-visible{

  outline-offset: 1px;
  transition: outline-offset 0s, outline 0s;
}
:where(.input, input, select, textarea, [tabindex]):focus{
  border-color: #1668dc !important;
  outline: 0 !important;
  box-shadow: 0 0 0 2px rgba(0,60,180,0.15);
  background-color: var(--page-input);
  transition: all .2s ease;
}
select:focus,
select:focus-visible{
  border-color: #1668dc !important;
  outline: none !important;
  box-shadow: 0 0 0 2px rgba(0,60,180,0.15);
  background-color: var(--page-input);
  transition: all .2s ease;
}

          <div class="item-code">${item.code}</div>
        </div>
        <button class="copy-btn">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="copy-icon-svg">
              <path d="m22 7c0-.478-.379-1-1-1h-14c-.62 0-1 .519-1 1v14c0 .621.52 1 1 1h14c.478 0 1-.379 1-1zm-14.5.5h13v13h-13zm-5.5 7.5v2c0 .621.52 1 1 1h2v-1.5h-1.5v-1.5zm13.369-5s-2.136.002-4.616.003c-.414 0-.75.336-.75.75-.001 2.479-.003 4.612-.003 4.612 0 .41.335.745.75.745.414 0 .75-.334.75-.745v-2.804l4.439 4.439c.293.293.768.293 1.061 0s.293-.768 0-1.061l-4.439-4.439h2.808c.409 0 .741-.336.741-.75s-.333-.75-.741-.75zm-11.869.637v3.363h-1.5v-3.363zm0-4.637v3.637h-1.5v-3.637zm11.5-4v1.5h1.5v1.5h1.5v-2c0-.478-.379-1-1-1zm-10 0h-2c-.62 0-1 .519-1 1v2h1.5v-1.5h1.5zm4.5 1.5h-3.5v-1.5h3.5zm4.5 0h-3.5v-1.5h3.5z"/>
            </svg>
          </span>
          <span>Copy Image</span>
        </button>
      `;

      grid.appendChild(card);
    });

    const cards = document.querySelectorAll('.item-card');

    // COPY IMAGE
    cards.forEach(card => {
      const btn = card.querySelector('.copy-btn');

      btn.addEventListener('click', async (e) => {
        e.stopPropagation();

        const img = card.querySelector('img');
        if (!img) return;

        if (!(navigator.clipboard && navigator.clipboard.write && window.ClipboardItem)) {
          alert('Browser tidak support copy image ke clipboard. Coba Chrome / Edge terbaru ya bro.');
          return;
        }

        try{
          const res = await fetch(img.src);
          const blob = await res.blob();

          await navigator.clipboard.write([
            new ClipboardItem({ [blob.type]: blob })
          ]);

          card.classList.add('copied');
          const labelSpan = btn.querySelector('span:last-child');
          const oldText = labelSpan.textContent;
          labelSpan.textContent = 'Copied!';
          showToast();

          setTimeout(() => {
            card.classList.remove('copied');
            labelSpan.textContent = oldText;
          }, 1200);

        }catch(err){
          console.error('Gagal copy image', err);
          alert('Gagal copy image. Mungkin karena permission / CORS.');
        }
      });
    });

    // SEARCH
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearSearch');
    const searchBox = document.getElementById('searchBox');

    function applyFilter(){
      const term = searchInput.value.trim().toLowerCase();
      if (term.length > 0){
        searchBox.classList.add('has-value');
      } else {
        searchBox.classList.remove('has-value');
      }

      cards.forEach(card => {
        const titleEl  = card.querySelector('.item-title');
        const titleText = (titleEl?.textContent || '').toLowerCase();
        const dataItem  = (card.dataset.item || '').toLowerCase();
        const match = term === '' || titleText.includes(term) || dataItem.includes(term);
        card.style.display = match ? '' : 'none';
      });
    }

    searchInput.addEventListener('input', applyFilter);

    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      applyFilter();
      searchInput.focus();
    });
  });
(function () {
  const THEME_KEY = "siteTheme";

  function applyChildTheme(theme) {
    document.body.classList.remove("light-theme", "dark-theme");
    document.body.classList.add(theme === "light" ? "light-theme" : "dark-theme");
  }

  applyChildTheme(localStorage.getItem(THEME_KEY) === "dark" ? "dark" : "light");

  window.addEventListener("message", function (e) {
    const allowedOrigins = [
      "https://5g88-main.vercel.app"
    ];
    if (!allowedOrigins.includes(e.origin)) return;

    const data = e.data || {};
    if (data.type === "theme-change") {
      const theme = data.theme === "dark" ? "dark" : "light";
      localStorage.setItem(THEME_KEY, theme);
      applyChildTheme(theme);
    }
  });
})();
// ✅ Tukar ikut page
window.HISTORY_TAB_NAME = "ITEM COLLECTION";
// ✅ Hantar ke main page
function sendUserAction(actionName, extra = {}) {
  if (!actionName) return;
  window.parent.postMessage({
    type: "user-tab-action",
    tab: window.HISTORY_TAB_NAME,
    action: actionName,
    extra,
    time: Date.now()
  }, "https://5g88-main.vercel.app");
}
/* =========================
   AUTO TRACK CLICK - COUNT SEMUA CLICK
========================= */
document.addEventListener("click", function(e) {
  const el = e.target.closest("button, [onclick], a, .btn, [data-action]");
  if (!el) return;

  if (el.disabled || el.getAttribute("aria-disabled") === "true") return;

  let name =
    el.getAttribute("data-action") ||
    el.getAttribute("title") ||
    el.getAttribute("aria-label") ||
    el.innerText ||
    el.textContent ||
    el.id ||
    "";

  name = String(name)
    .replace(/\s+/g, " ")
    .trim();

  if (!name || name.length < 2) return;

  name = name.slice(0, 40);

  sendUserAction(name);
}, true);
/* =========================
   AUTO TRACK CTRL + C / COPY IMAGE
========================= */
document.addEventListener("keydown", function(e) {
  const key = String(e.key || "").toLowerCase();

  if ((e.ctrlKey || e.metaKey) && key === "c") {
    sendUserAction("COPY IMAGE", {
      method: "keyboard",
      shortcut: "Ctrl+C"
    });
  }
}, true);
/* =========================
   AUTO TRACK BROWSER COPY EVENT
========================= */
document.addEventListener("copy", function() {
  sendUserAction("COPY IMAGE", {
    method: "copy-event"
  });
}, true);
</script>
</body>
