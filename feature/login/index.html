<html lang="en">
<head>

  <style>
  :root{ 
  --bg-main: #fff;
  --sidebar: #001529;
  --text-main: #000;
  --text-soft: rgba(17,24,39,0.88);
  --text-dim: rgba(17,24,39,0.72);
  --colorbtn: rgba(0, 0, 0, 0.88);
  --backgroundbtn: #ffffff;
  --backgrounddrop: #ffffff;
  --border: #303030;
  --border2: #d9d9d9;
  --panel-border: #d4dbe6;
  --blur: rgba(0,0,0,0.25);
  --border3: #f0f0f0;
  --tab2: #ffffff;
  --border-bottom: #ffffff;
  --close: rgba(0, 0, 0, 0.88);
   --border-input5:#f0f0f0;  

  --tab-bg: rgba(255,255,255,0.04);
  --tab-border: #d4dbe6;

  --btn-bg: transparent;
  --btn-text: rgba(17,24,39,0.88);
  --btn-border: #d4dbe6;

  --gold: #1668dc;
  --gold-hover: #3c89e8;
  --gold-active: #1554ad;

  --overlay-bg: rgba(15,23,42,0.18);
  --popup-bg: #ffffff;

  --empty-text: rgba(17,24,39,.7);
  --empty-title: rgba(17,24,39,.88);

  --toggle-track: #cfd8e3;
  --toggle-knob: #ffffff;
  --btnfocus: #91caff;
}

body.dark-theme{
  --bg-main: #141414;
  --sidebar: #001529;
  --text-main: #fff;
  --text-soft: rgba(255,255,255,0.85);
  --text-dim: rgba(255,255,255,0.65);
  --colorbtn: rgba(255,255,255,0.85);
  --backgroundbtn: #141414;
  --backgrounddrop: #1f1f1f;
  --border: #303030;
  --border2: #424242;
  --panel-border: #424242;
  --blur: rgba(255,255,255,0.25);
  --border3: #303030;
  --tab2: #141414;
  --border-bottom: #141414;
  --close: rgba(255,255,255,0.45);
   --border-input5:#303030;  

  --tab-bg: rgba(255,255,255,0.04);
  --tab-border: #303030;

  --btn-bg: transparent;
  --btn-text: rgba(255,255,255,0.85);
  --btn-border: #424242;

  --gold: #1668dc;
  --gold-hover: #3c89e8;
  --gold-active: #1554ad;

  --overlay-bg: rgba(0,0,0,0.5);
  --popup-bg: #1f1f1f;

  --empty-text: rgba(255,255,255,.7);
  --empty-title: rgba(255,255,255,.85);

  --toggle-track: #2c7be5;
  --toggle-knob: #ffffff;
  --btnfocus: #15325b;
}
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg-main);
      color:var(--text-soft);
      padding:20px;
    }

.login-box{
  width:100%;
  max-width:420px;
  background:var(--backgrounddrop);
  border:1px solid var(--border-input5);
  border-radius:12px;
  padding:0;
  overflow:hidden;
  box-shadow:rgba(0,0,0,0.08) 0px 8px 24px;
}
.login-header{
  width:100%;
  padding:32px 40px 28px;
  background:#1677ff;
  text-align:center;
  line-height: 1.5714285714285714;
}

.login-content{
  padding:32px 40px;
}

.login-icon{
  width:64px;
  height:64px;
  margin:0 auto 16px;
  border-radius:50%;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.3);
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-icon svg{
  width:28px;
  height:28px;
  color:white;
}

.title{
  text-align:center;
  font-size:24px;
  font-weight:600;
  color:white;
  line-height:1.5;
}

.sub{
  text-align:center;
  color:rgba(255,255,255,.65);
  font-size:13px;
}
    .title{
      text-align:center;
      font-size:24px;
      font-weight:600;
      color:white;
    }

    .sub{
      text-align:center;
      color: rgba(255, 255, 255, 0.65);
      font-size:13px;
    }

    .field{
      margin-bottom:24px;
    }

    .label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      color:var(--text-soft);
      font-weight:500;
    }

    .input-wrap{
      position:relative;
    }
    .input-icon{
  position:absolute;
  left:11px;
  top:50%;
  transform:translateY(-50%);
  font-size:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--close);
  opacity:.7;
  pointer-events:none;
}

.input-icon svg{
  width:1em;
  height:1em;
  display:block;
}

.input.has-left-icon{
  padding-left:32px;
}

.input.has-right-icon{
  padding-right:52px;
}

.input-wrap:focus-within .input-icon{
  color:var(--text-soft);
  opacity:1;
}
    .input{
      width:100%;
      height:40px;
      border-radius:8px;
      border:1px solid var(--border2);
      background:var(--backgroundbtn);
      color:var(--text-soft);
      padding:7px 11px;
      outline:none;
      transition:all .2s ease;
      font-size:14px;
    }

    .input::placeholder{
      color:var(--blur);
    }
    .input:hover:not(:focus){
  border-color:var(--gold-hover);
}
    .field:has(.label:hover) .input:not(:focus){
  border-color: var(--border2) !important;
}
    .input:focus{
      border-color:#1668dc;
    }

.password-toggle{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  align-items:center;
  justify-content:center;
  background:none;
  border:none;
  color: var(--close);
  cursor:pointer;
  padding:0;
  transition:all .3s ease;
  line-height:0;
}

.password-toggle svg{
  width:16px;
  height:16px;
  display:block;
}

.password-toggle:hover{
  color:var(--colorbtn);
}
.input-wrap:has(.password-toggle:hover) .input{
  border-color: var(--gold-hover);
}
    .field-error{
  display:none;
  margin-top:6px;
  font-size:12px;
  color:#ff4d4f;
}

    .btn{
      width:100%;
      height:46px;
      border:none;
      border-radius:8px;
      background:#1668dc;
      color:#fff;
      cursor:pointer;
      transition:all .2s ease;
      font-size:15px;
      padding:0px 15px;
      font-weight:600;
    }

    .btn:hover{
      background:#3c89e8;
    }

    .btn:active{
      background:#1554ad;
    }
    .loading{
      opacity:.7;
      pointer-events:none;
    }
  .turnstile-wrap{
  width:100%;
  margin:0 auto 0;
  display:flex;
  justify-content:center;
  margin-bottom:10px;
}

#turnstileBox{
  display:flex;
  justify-content:center;
  width:100%;
   margin-top: 15px;
}
    .otp-row{
  display:grid;
  grid-template-columns:repeat(6, 1fr);
  gap:8px;
}

.otp-input{
  width:100%;
  height:38px;
  border-radius:8px;
  border:1px solid var(--border2);
  background:var(--backgroundbtn);
  color:var(--text-soft);
  text-align:center;
  font-size:20px;
  font-weight:700;
  outline:none;
}

.otp-input:focus{
  border-color:#1668dc;
}
  </style>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCIYYpl-1psexPB_-CadD1smsc_e6rhu1U",
  authDomain: "page-login2.firebaseapp.com",
  databaseURL: "https://page-login2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "page-login2",
  storageBucket: "page-login2.firebasestorage.app",
  messagingSenderId: "860837620702",
  appId: "1:860837620702:web:db51c2a50d414a4de44b4f"
};

  // ✅ guna NAMA APP YANG SAMA macam settings page
  const loginApp = firebase.apps.find(app => app.name === "loginApp")
    || firebase.initializeApp(firebaseConfig, "loginApp");

  const auth = loginApp.auth();
const db = loginApp.database();
let pendingUser = null;
  const loginForm = document.getElementById("loginForm");
  const usernameEl = document.getElementById("username");
  const passwordEl = document.getElementById("password");
  const loginBtn = document.getElementById("loginBtn");
  const loginBox = document.getElementById("loginBox");
  const togglePassword = document.getElementById("togglePassword");
  const usernameError = document.getElementById("usernameError");
  const passwordError = document.getElementById("passwordError");

function clearFieldErrors(){
  usernameError.textContent = "";
  passwordError.textContent = "";
  usernameError.style.display = "none";
  passwordError.style.display = "none";
  usernameEl.classList.remove("invalid");
  passwordEl.classList.remove("invalid");
}

function setFieldError(type, text){
  const el = type === "username" ? usernameError : passwordError;
  const input = type === "username" ? usernameEl : passwordEl;

  el.textContent = text;
  el.style.display = "block";
  input.classList.add("invalid");
}

  const SETTINGS_URL = "/settings/";
  const USER_DOMAIN = "@5g88.local";

  let hasRedirected = false;
  let isSubmitting = false;
let turnstileWidgetId = null;

function renderTurnstile(){
  if (!window.turnstile) return;

  const box = document.getElementById("turnstileBox");
  if (!box) return;

  box.innerHTML = "";

  turnstileWidgetId = turnstile.render("#turnstileBox", {
    sitekey: "0x4AAAAAAC1xHeoFIKqZZywR",
    theme: document.body.classList.contains("dark-theme") ? "light" : "dark"
  });
}

  function normalizeEmailFromUsername(input) {
    const v = String(input || "").trim().toLowerCase();
    if (!v) return "";
    if (v.includes("@")) return v;
    return v + USER_DOMAIN;
  }

  function setLoading(state) {
    loginBtn.disabled = state;
    loginBox.classList.toggle("loading", state);
    loginBtn.textContent = state ? "Logging in..." : "Log in";
  }

togglePassword.addEventListener("click", () => {
  const isPwd = passwordEl.type === "password";
  const eyeHide = document.getElementById("eyeHide");
  const eyeShow = document.getElementById("eyeShow");

  passwordEl.type = isPwd ? "text" : "password";

  eyeHide.style.display = isPwd ? "none" : "block";
  eyeShow.style.display = isPwd ? "block" : "none";

  togglePassword.setAttribute(
    "aria-label",
    isPwd ? "Hide password" : "Show password"
  );

  passwordEl.focus();
});
  // ✅ pastikan session disimpan local
  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
    .catch(err => console.error("Persistence error:", err));

  // ✅ hanya redirect dari sini
auth.onAuthStateChanged((user) => {
  if (!user) return;
  pendingUser = user;
});

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    if (isSubmitting) return;

    const username = usernameEl.value.trim();
    const password = passwordEl.value;

clearFieldErrors();

if (!username) {
  setFieldError("username", "Username wajib isi.");
  usernameEl.focus();
  return;
}

if (!password) {
  setFieldError("password", "Password wajib isi.");
  passwordEl.focus();
  return;
}

    const email = normalizeEmailFromUsername(username);

    try {
      isSubmitting = true;
      setLoading(true);
const cred = await auth.signInWithEmailAndPassword(email, password);
pendingUser = cred.user;

document.getElementById("loginForm").style.display = "none";
document.getElementById("secondPassPanel").style.display = "block";
document.getElementById("secondUserName").textContent = username;

setLoading(false);
isSubmitting = false;

setTimeout(() => {
  document.querySelector(".otp-input")?.focus();
}, 100);

    } catch (err) {
      console.error("Login error:", err);

      let msg = "Login gagal.";
      if (err.code === "auth/user-not-found") msg = "User tidak ditemukan.";
      else if (err.code === "auth/wrong-password") msg = "Password salah.";
      else if (err.code === "auth/invalid-login-credentials") msg = "Username atau password salah.";
      else if (err.code === "auth/invalid-email") msg = "Format username/email tidak sah.";
      else if (err.code === "auth/too-many-requests") msg = "Terlalu banyak percubaan. Cuba lagi nanti.";

if (
  err.code === "auth/user-not-exist" ||
  err.code === "auth/invalid-email"
) {
  setFieldError("username", "Username salah.");
  usernameEl.focus();
} else if (err.code === "auth/wrong-password") {
  setFieldError("password", "Password salah.");
  passwordEl.focus();
} else {
  setFieldError("password", "Username atau password salah.");
}
      isSubmitting = false;
      setLoading(false);
    }
  });
const secondPassPanel = document.getElementById("secondPassPanel");
const verifySecondBtn = document.getElementById("verifySecondBtn");
const changeLoginBtn = document.getElementById("changeLoginBtn");
const secondPassError = document.getElementById("secondPassError");
const otpInputs = Array.from(document.querySelectorAll(".otp-input"));

otpInputs.forEach((input, index) => {
  input.addEventListener("input", () => {
    input.value = input.value.replace(/\D/g, "").slice(0, 1);
    if (input.value && otpInputs[index + 1]) otpInputs[index + 1].focus();
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && !input.value && otpInputs[index - 1]) {
      otpInputs[index - 1].focus();
    }
  });
});

changeLoginBtn.addEventListener("click", async () => {
  await auth.signOut();
  pendingUser = null;
  otpInputs.forEach(i => i.value = "");
  secondPassError.style.display = "none";
  secondPassPanel.style.display = "none";
  loginForm.style.display = "block";
  passwordEl.value = "";
  usernameEl.focus();
});

verifySecondBtn.addEventListener("click", async () => {
  if (!pendingUser) return;

  const code = otpInputs.map(i => i.value).join("");

  secondPassError.style.display = "none";
  secondPassError.textContent = "";

  if (code.length !== 6) {
    secondPassError.textContent = "Sila isi 6 digit 2nd password.";
    secondPassError.style.display = "block";
    return;
  }

  verifySecondBtn.disabled = true;
  verifySecondBtn.textContent = "Verifying...";

  try {
    const snap = await db.ref("users/" + pendingUser.uid + "/secondPassword").get();
    const savedCode = String(snap.val() || "");

    if (code !== savedCode) {
      secondPassError.textContent = "2nd password salah.";
      secondPassError.style.display = "block";
      verifySecondBtn.disabled = false;
      verifySecondBtn.textContent = "Verify";
      return;
    }

    localStorage.setItem("loginUser", JSON.stringify({
      uid: pendingUser.uid,
      email: pendingUser.email || "",
      username: (pendingUser.email || "").replace("@5g88.local", ""),
      lastLogin: Date.now()
    }));

    window.location.replace(SETTINGS_URL);

  } catch (err) {
    console.error(err);
    secondPassError.textContent = "Gagal semak 2nd password.";
    secondPassError.style.display = "block";
    verifySecondBtn.disabled = false;
    verifySecondBtn.textContent = "Verify";
  }
});
  const THEME_KEY = "siteTheme";

function applyTheme(theme) {
  const finalTheme = theme === "dark" ? "dark" : "light";
  document.body.classList.toggle("dark-theme", finalTheme === "dark");

  setTimeout(renderTurnstile, 200);
}

  // apply masa mula load
  applyTheme(localStorage.getItem(THEME_KEY) || "light");

  // dengar dari parent
  window.addEventListener("message", (event) => {
    if (event.data?.type === "theme-change") {
      applyTheme(event.data.theme);
    }
  });
</script>
