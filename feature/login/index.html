<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/settings/logo.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Back Office Editor Admin</title>
  <style>
  :root{
  --bg-main: #fff;
  --sidebar: #001529;
  --text-main: #000;
  --text-soft: rgba(17,24,39,0.88);
  --text-dim: rgba(17,24,39,0.72);
  --colorbtn: rgba(0, 0, 0, 0.88);
  --backgroundbtn: #ffffff;
  --backgrounddrop: #ffffff;
  --border: #303030;
  --border2: #d9d9d9;
  --panel-border: #d4dbe6;
  --blur: rgba(0,0,0,0.25);
  --border3: #f0f0f0;
  --tab2: #ffffff;
  --border-bottom: #ffffff;
  --close: rgba(0, 0, 0, 0.88);

  --tab-bg: rgba(255,255,255,0.04);
  --tab-border: #d4dbe6;

  --btn-bg: transparent;
  --btn-text: rgba(17,24,39,0.88);
  --btn-border: #d4dbe6;

  --gold: #1668dc;
  --gold-hover: #3c89e8;
  --gold-active: #1554ad;

  --overlay-bg: rgba(15,23,42,0.18);
  --popup-bg: #ffffff;

  --empty-text: rgba(17,24,39,.7);
  --empty-title: rgba(17,24,39,.88);

  --toggle-track: #cfd8e3;
  --toggle-knob: #ffffff;
  --btnfocus: #91caff;
}

body.dark-theme{
  --bg-main: #000;
  --sidebar: #001529;
  --text-main: #fff;
  --text-soft: rgba(255,255,255,0.85);
  --text-dim: rgba(255,255,255,0.65);
  --colorbtn: rgba(255,255,255,0.85);
  --backgroundbtn: #141414;
  --backgrounddrop: #1f1f1f;
  --border: #303030;
  --border2: #424242;
  --panel-border: #424242;
  --blur: rgba(255,255,255,0.25);
  --border3: #303030;
  --tab2: #141414;
  --border-bottom: #141414;
  --close: rgba(255,255,255,0.45);

  --tab-bg: rgba(255,255,255,0.04);
  --tab-border: #303030;

  --btn-bg: transparent;
  --btn-text: rgba(255,255,255,0.85);
  --btn-border: #424242;

  --gold: #1668dc;
  --gold-hover: #3c89e8;
  --gold-active: #1554ad;

  --overlay-bg: rgba(0,0,0,0.5);
  --popup-bg: #1f1f1f;

  --empty-text: rgba(255,255,255,.7);
  --empty-title: rgba(255,255,255,.85);

  --toggle-track: #2c7be5;
  --toggle-knob: #ffffff;
  --btnfocus: #15325b;
}
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at top, #1f2937 0, transparent 55%),
        radial-gradient(circle at bottom, #020617 0, #000 65%);
      color:#fff;
      padding:20px;
    }

    .login-box{
      width:100%;
      max-width:420px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:28px 22px;
      box-shadow:0 20px 50px rgba(0,0,0,0.35);
      backdrop-filter:blur(10px);
    }

    .logo-wrap{
      display:flex;
      justify-content:center;
      margin-bottom:14px;
    }

    .logo-wrap img{
      width:78px;
      height:78px;
      object-fit:contain;
      border-radius:16px;
    }

    .title{
      text-align:center;
      font-size:28px;
      font-weight:700;
      margin-bottom:6px;
    }

    .sub{
      text-align:center;
      color:rgba(255,255,255,0.68);
      font-size:14px;
      margin-bottom:22px;
    }

    .field{
      margin-bottom:14px;
    }

    .label{
      display:block;
      margin-bottom:7px;
      font-size:13px;
      color:rgba(255,255,255,0.82);
      font-weight:600;
    }

    .input-wrap{
      position:relative;
    }

    .input{
      width:100%;
      height:32px;
      border-radius:6px;
      border:1px solid #334155;
      background:rgba(15,23,42,0.72);
      color:#fff;
      padding:0 14px;
      outline:none;
      transition:all .2s ease;
      font-size:14px;
      padding:0px 15px;
    }

    .input::placeholder{
      color:rgba(255,255,255,0.36);
    }

    .input:focus{
      border-color:#1668dc;
      box-shadow:0 0 0 3px rgba(22,104,220,0.18);
    }

    .password-toggle{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      background:none;
      border:none;
      color:rgba(255,255,255,0.6);
      cursor:pointer;
      font-size:10px;
      font-weight:700;
    }

    .btn{
      width:100%;
      height:32px;
      border:none;
      border-radius:6px;
      background:#1668dc;
      color:#fff;
      cursor:pointer;
      transition:all .2s ease;
      margin-top:4px;
      font-size:14px;
      padding:0px 15px;
    }

    .btn:hover{
      background:#3c89e8;
    }

    .btn:active{
      background:#1554ad;
      transform:scale(.99);
    }

    .info{
      margin-top:14px;
      text-align:center;
      font-size:13px;
      color:rgba(255,255,255,0.68);
      min-height:18px;
    }

    .error{
      color:#ff6b6b;
    }

    .success{
      color:#7dff9b;
    }

    .loading{
      opacity:.7;
      pointer-events:none;
    }
  </style>
</head>
<body>
  <div class="login-box" id="loginBox">
    <div class="logo-wrap">
      <img src="https://i.imgur.com/QrxyBjc.png" alt="5G88 Logo">
    </div>

    <div class="title">Login Admin</div>
    <div class="sub">Masuk guna username dan password</div>

    <form id="loginForm">
      <div class="field">
        <label class="label" for="username">Username</label>
        <div class="input-wrap">
          <input
            id="username"
            class="input"
            type="text"
            placeholder="Username"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
            required
          />
        </div>
      </div>

      <div class="field">
        <label class="label" for="password">Password</label>
        <div class="input-wrap">
          <input
            id="password"
            class="input"
            type="password"
            placeholder="Masukkan password"
            autocomplete="new-password"
            required
          />
          <button type="button" class="password-toggle" id="togglePassword">SHOW</button>
        </div>
      </div>

      <button type="submit" class="btn" id="loginBtn">LOGIN</button>
      <div class="info" id="loginMsg"></div>
    </form>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCIYYpl-1psexPB_-CadD1smsc_e6rhu1U",
    authDomain: "page-login2.firebaseapp.com",
    projectId: "page-login2",
    storageBucket: "page-login2.firebasestorage.app",
    messagingSenderId: "860837620702",
    appId: "1:860837620702:web:db51c2a50d414a4de44b4f"
  };

  // ✅ guna NAMA APP YANG SAMA macam settings page
  const loginApp = firebase.apps.find(app => app.name === "loginApp")
    || firebase.initializeApp(firebaseConfig, "loginApp");

  const auth = loginApp.auth();

  const loginForm = document.getElementById("loginForm");
  const usernameEl = document.getElementById("username");
  const passwordEl = document.getElementById("password");
  const loginBtn = document.getElementById("loginBtn");
  const loginMsg = document.getElementById("loginMsg");
  const loginBox = document.getElementById("loginBox");
  const togglePassword = document.getElementById("togglePassword");

  const SETTINGS_URL = "/settings/";
  const USER_DOMAIN = "@5g88.local";

  let hasRedirected = false;
  let isSubmitting = false;

  function showMsg(text, type = "") {
    loginMsg.textContent = text;
    loginMsg.className = "info " + type;
  }

  function normalizeEmailFromUsername(input) {
    const v = String(input || "").trim().toLowerCase();
    if (!v) return "";
    if (v.includes("@")) return v;
    return v + USER_DOMAIN;
  }

  function setLoading(state) {
    loginBtn.disabled = state;
    loginBox.classList.toggle("loading", state);
    loginBtn.textContent = state ? "PLEASE WAIT..." : "LOGIN";
  }

  togglePassword.addEventListener("click", () => {
    const isPwd = passwordEl.type === "password";
    passwordEl.type = isPwd ? "text" : "password";
    togglePassword.textContent = isPwd ? "HIDE" : "SHOW";
  });

  // ✅ pastikan session disimpan local
  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
    .catch(err => console.error("Persistence error:", err));

  // ✅ hanya redirect dari sini
  auth.onAuthStateChanged((user) => {
    if (!user) return;

    localStorage.setItem("loginUser", JSON.stringify({
      uid: user.uid,
      email: user.email || "",
      username: (user.email || "").replace("@5g88.local", ""),
      lastLogin: Date.now()
    }));

    if (!hasRedirected) {
      hasRedirected = true;
      window.location.replace(SETTINGS_URL);
    }
  });

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    if (isSubmitting) return;

    const username = usernameEl.value.trim();
    const password = passwordEl.value;

    if (!username || !password) {
      showMsg("Username dan password wajib isi.", "error");
      return;
    }

    const email = normalizeEmailFromUsername(username);

    try {
      isSubmitting = true;
      setLoading(true);
      showMsg("Sedang login...", "");

      await auth.signInWithEmailAndPassword(email, password);

      // ✅ jangan redirect di sini
      // biar onAuthStateChanged saja yang redirect

    } catch (err) {
      console.error("Login error:", err);

      let msg = "Login gagal.";
      if (err.code === "auth/user-not-found") msg = "User tidak ditemukan.";
      else if (err.code === "auth/wrong-password") msg = "Password salah.";
      else if (err.code === "auth/invalid-login-credentials") msg = "Username atau password salah.";
      else if (err.code === "auth/invalid-email") msg = "Format username/email tidak sah.";
      else if (err.code === "auth/too-many-requests") msg = "Terlalu banyak percubaan. Cuba lagi nanti.";

      showMsg(msg, "error");
      isSubmitting = false;
      setLoading(false);
    }
  });
  const THEME_KEY = "siteTheme";

  function applyTheme(theme) {
    const finalTheme = theme === "dark" ? "dark" : "light";
    document.body.classList.toggle("dark-theme", finalTheme === "dark");
  }

  // apply masa mula load
  applyTheme(localStorage.getItem(THEME_KEY) || "light");

  // dengar dari parent
  window.addEventListener("message", (event) => {
    if (event.data?.type === "theme-change") {
      applyTheme(event.data.theme);
    }
  });
</script>
</body>
</html>
