<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/settings/logo.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Back Office Editor Admin</title>
  <style>
:root{
  --bg-main: #fff;
  --sidebar: #001529;
  --text-main: #000;
  --text-soft: rgba(17,24,39,0.88);
  --text-dim: rgba(17,24,39,0.72);
  --colorbtn: rgba(0, 0, 0, 0.88);
  --backgroundbtn: #ffffff;
  --backgrounddrop: #ffffff;
  --border: #303030;
  --border2: #d9d9d9;
  --panel-border: #d4dbe6;
  --blur: rgba(0,0,0,0.25);
  --border3: #f0f0f0;
  --tab2: #ffffff;
  --border-bottom: #ffffff;
  --close: rgba(0, 0, 0, 0.88);

  --tab-bg: rgba(255,255,255,0.04);
  --tab-border: #d4dbe6;

  --btn-bg: transparent;
  --btn-text: rgba(17,24,39,0.88);
  --btn-border: #d4dbe6;

  --gold: #1668dc;
  --gold-hover: #3c89e8;
  --gold-active: #1554ad;

  --overlay-bg: rgba(15,23,42,0.18);
  --popup-bg: #ffffff;

  --empty-text: rgba(17,24,39,.7);
  --empty-title: rgba(17,24,39,.88);

  --toggle-track: #cfd8e3;
  --toggle-knob: #ffffff;
  --btnfocus: #91caff;
}

body.dark-theme{
  --bg-main: #000;
  --sidebar: #001529;
  --text-main: #fff;
  --text-soft: rgba(255,255,255,0.85);
  --text-dim: rgba(255,255,255,0.65);
  --colorbtn: rgba(255,255,255,0.85);
  --backgroundbtn: #141414;
  --backgrounddrop: #1f1f1f;
  --border: #303030;
  --border2: #424242;
  --panel-border: #424242;
  --blur: rgba(255,255,255,0.25);
  --border3: #303030;
  --tab2: #141414;
  --border-bottom: #141414;
  --close: rgba(255,255,255,0.45);

  --tab-bg: rgba(255,255,255,0.04);
  --tab-border: #303030;

  --btn-bg: transparent;
  --btn-text: rgba(255,255,255,0.85);
  --btn-border: #424242;

  --gold: #1668dc;
  --gold-hover: #3c89e8;
  --gold-active: #1554ad;

  --overlay-bg: rgba(0,0,0,0.5);
  --popup-bg: #1f1f1f;

  --empty-text: rgba(255,255,255,.7);
  --empty-title: rgba(255,255,255,.85);

  --toggle-track: #2c7be5;
  --toggle-knob: #ffffff;
  --btnfocus: #15325b;
}
    * {margin: 0;padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }
    body {
      background:var(--bg-main);
      color: var(--colorbtn);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

.sidebar-overlay {
  position: fixed;
  top: 64px;
  left: 0;
  width: 100%;
  height: calc(100vh - 64px);
  z-index: 1001;
  display: none;
  background: transparent;
}
.sidebar-overlay.active {
  display: block;
}
.sidebar {
  position: fixed;
  top: 64px;
  left: 0;
  width: 255px;
  height: calc(100vh - 64px);
  background: #001529;
  z-index: 1002;
  overflow: hidden;
  border-right: 1px solid rgba(255,255,255,0.12);
  box-shadow: 4px 0 18px rgba(0,0,0,0.35);
  transform: translateX(-100%);
  transition: transform 0.28s ease;
}
.sidebar.active {
  transform: translateX(0);
}
.sidebar-inner {
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 12px 10px 16px;
  box-sizing: border-box;
  scroll-behavior: smooth;
}
.sidebar-inner::-webkit-scrollbar {
  width: 8px;
}

.sidebar-inner::-webkit-scrollbar-track {
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
}

.sidebar-inner::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #1f6fe5, #0e4da8);
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.08);
}

.sidebar-inner::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg,  rgba(255, 255, 255, 0.65), rgba(255, 255, 255, 0.85));
}

/* Firefox */
.sidebar-inner {
  scrollbar-width: thin;
  scrollbar-color: rgba(255, 255, 255, 0.25) transparent;
}
  .sidebar h2 {color: rgba(255,255,255,0.85);margin-bottom: 15px;border:1px solid #424242;border-radius:6px;text-align:center;font-size: 20px;}.sidebar h2{display:none !important;}
  .sidebar a {display: block;margin: 10px 0;color: rgba(255,255,255,0.65);text-decoration: none;font-size: 14px;font-weight: bold;border-radius: 6px;transition: all 0.2s;padding: 4px 8px;gap: 5px;white-space: nowrap;border-bottom: 1px solid #424242;}
  .sidebar a:hover {background:#03203d;color: white;}

.header {
  position: fixed;
  width: 100%;
  z-index: 1003;
  height: 64px;
  background: #001529;
  display: flex;
  align-items: center;
  padding: 0 15px 0 0;
  top: 0;
  left: 0;
  transition: background .25s ease, color .25s ease;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-left: 38px; /* bagi ruang untuk menu icon */
}

.header-right {
  display: flex;
  align-items: center;
  margin-left: auto;
  gap: 12px;
}
.user-dropdown {
  position: relative;
  display: flex;
  align-items: center;
  height: 100%;
}

.user-button {
  height: 32px;
  padding: 0 15px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--backgroundbtn);
  color: var(--colorbtn);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  white-space: nowrap;
  transition: border-color .2s ease, color .2s ease, background .2s ease;
}

.user-button:hover {
  border-color: var(--gold-hover);
  color: var(--gold-hover);
}

.user-button:active {
  border-color: var(--gold-active);
  color: var(--gold-active);
}

.user-button svg {
  width: 18px;
  height: 18px;
  fill: currentColor;
  flex-shrink: 0;
}

.user-name-text {
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.dropdown-content {
    display: none;
    position: absolute;
    background: var(--backgrounddrop);
    min-width: 220px;
    border: 1px solid var(--border2);
    border-radius: 6px;
    box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.3);
    padding: 10px;
    z-index: 1;
    color: var(--colorbtn);
    top: 120%;
    right: 0;
    left: auto;
    transform: none;
    font-size: 14px;
    transition: all 0.2s ease !important;
}

.dropdown-content.show {
  display: block;
}

.dropdown-user-top {
  padding: 4px 4px 8px;
}

#userEmail {
  color: var(--text-soft);
  font-size: 14px;
  word-break: break-word;
}

.dropdown-divider {
  border: 0;
  border-top: 1px solid var(--border2);
  margin: 8px 0;
}

.dropdown-btn {
  width: 100%;
  height: 32px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--backgroundbtn);
  color: var(--colorbtn);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  transition: border-color .2s ease, color .2s ease, background .2s ease;
  margin-top: 8px;
}

.dropdown-btn:hover {
  border-color: var(--gold-hover);
  color: var(--gold-hover);
}

.dropdown-btn:active {
  border-color: var(--gold-active);
  color: var(--gold-active);
}

.dropdown-btn svg {
  width: 16px;
  height: 16px;
  fill: currentColor;
  flex-shrink: 0;
}
.dropdown-profile-btn{
  width: 100%;
  height: 32px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--backgroundbtn);
  color: var(--colorbtn);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 8px;
  pointer-events: none;
  font-weight: 600;
}

.dropdown-profile-btn svg{
  width: 16px;
  height: 16px;
  fill: currentColor;
  flex-shrink: 0;
}

.dropdown-profile-name{
  display: inline-block;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.theme-toggle-btn{
  width: 100%;
  height: 32px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--backgroundbtn);
  color: var(--colorbtn);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 0 10px;
  cursor: pointer;
  transition: border-color .2s ease, color .2s ease, background .2s ease;
  margin-top: 8px;
}

.theme-toggle-btn:hover{
  border-color: var(--gold-hover);
  color: var(--gold-hover);
}

.theme-toggle-btn:active{
  border-color: var(--gold-active);
  color: var(--gold-active);
}

.theme-toggle-label{
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
}

.theme-switch{
  width: 42px;
  height: 22px;
  border-radius: 999px;
  background: var(--toggle-track);
  position: relative;
  flex-shrink: 0;
  transition: background .25s ease;
}

.theme-switch-knob{
  position: absolute;
  top: 2px;
  left: 2px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--toggle-knob);
  transition: transform .25s ease;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
}

/* masa dark aktif */
body.dark-theme .theme-switch{
  background: #2c7be5;
}

body.dark-theme .theme-switch-knob{
  transform: translateX(20px);
}
.container {
  position: relative;
  transition: margin-left 0.3s ease, width 0.3s ease;
  width: 100%;
}
.container.shrink {
  margin-left: 255px;
  width: calc(100% - 255px);
}
.menu-icon {
  position: static;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 64px;
  height: 64px;
  font-size: 16px;
  border-radius: 6px;
  color: #ffffff;
  cursor: pointer;
  z-index: 1100;
  transition: color 0.3s;
  flex-shrink: 0;
}
.menu-icon svg {
  width: 1rem;
  height: 1rem;
  display: block;
  fill: currentColor;
}
.menu-icon:hover {background: rgba(255, 255, 255, 0.08);}
.menu-icon:active {background:rgba(255, 255, 255, 0.18);}    
.menu-img {width: 20px;height: 20px;vertical-align: middle;margin-right: 8px;border-radius: 4px;}
@media (max-width: 815px) {
  .container,
  .container.shrink {
    margin-left: 0 !important;
    width: 100% !important;
  }
}

html, body {
  height: 100%;
}

#pageFrame {
  display: block;
  width: 100%;
  height: calc(100vh - 120px);
  border: none;
}
.tab-bar {
  position: relative;
  transition: margin-left 0.2s ease, width 0.2s ease;
  width: 100%;
  height: 56px;
  background: var(--bg-main);
  display: flex;
  align-items: flex-end;
  gap: 0;
  z-index: 1;
  justify-content: flex-start;
  white-space: nowrap;
  margin-top: 64px;
  overflow-x: auto;
  overflow-y: hidden;
  -ms-overflow-style: none;
  scrollbar-width: none;
  box-sizing: border-box;
  padding: 0px 10px;
}
.tab-bar::after{
  content: "";
  position: absolute;
  bottom: 0;
  left: 10px;
  width: calc(100% - 20px); 
  height: 1px;
  background: var(--border2);
  z-index: 1; /* 🔥 belakang tab */
}
.tab-bar::-webkit-scrollbar {display: none;}
.tab {
  background: var(--tab-bg);
  color: var(--text-soft)!important;
  padding: 12px 16px;
  border-radius: 8px 8px 0 0;
  gap: 2px;
  white-space: nowrap;
  transition:
    transform .18s ease,
    color .18s ease,
    background .18s ease,
    border-color .18s ease,
    box-shadow .18s ease,
    opacity .18s ease;
  border: 1px solid var(--border3);
  display: inline-flex;
  font-size: 14px;
  align-items: center;
  user-select: none;
  cursor: pointer;
  filter: none;
  box-sizing: border-box;
  flex-shrink: 0;
  line-height: 1.2;
  z-index: 2;
  margin-bottom: -1px;
  will-change: transform;
}
.tab .close-tab{
  background: transparent;
  color: var(--close);
  border: none;
  border-radius: 0;
  cursor: pointer;
  width: 1em;
  height: 1em;
  padding: 0;
  margin-left: 4px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: color .3s ease, transform .2s ease;
    margin-left: 4px;
    pointer-events: auto;
  font-size:12px;
}
.tab .close-tab:hover{
  color:var(--text-main)!important
}
.tab .close-tab:active{
  color:var(--gold-active)!important
}
.tab:not(.active-tab):hover {
  color: var(--gold-hover) !important;
}
.tab:not(.active-tab):active,
.tab:not(.active-tab):hover:active {
  color: var(--gold-active) !important;
}
.active-tab {
  color: var(--gold) !important;background:var(--tab2);
  transition: all 0.3s ease;border-bottom: 1px solid var(--border-bottom);z-index: 3;
}

.header.shrink {
  margin-left: 0 !important;
  width: 100%;
  transition: none;
}
.container {
  transition: all 0.25s ease;
}

.tab-bar {
  transition: all 0.25s ease;
}
.live-chat-button .btn-label {
    display: inline-flex;
    align-items: center;
    height: 100%;
}
.live-chat-button {
  color: rgba(255,255,255,0.65);
  border: none;
  font-size: 14px;
  cursor: pointer;
  transition: color 0.3s, background 0.2s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: transparent;
  position: relative;

  height: 100%;
  height: 64px;
  align-self: stretch;

  padding: 0 15px;
  white-space: nowrap;
  border-radius: 0;
  box-sizing: border-box;
  flex-shrink: 0;
}
.live-chat-button:hover {color: #ffffff;background: transparent;transition: color 0.3s!important;}
.live-chat-button.active-detail {
  background: var(--gold);
  color: white;
}
.live-chat-button.active-livechat {
  background: var(--gold);
  color: white;
}
.live-chat-button.active-livechat {
  background: var(--gold);
  color: white;
}
.live-chat-button.active-tabsettings {
  background: var(--gold);
  color: white;
}
.livechat-badge{
  position: absolute;
  top: 8px;
  right: -2px;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  border-radius: 999px;
  background: #ff2b2b;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  line-height: 18px;
  text-align: center;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 3;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.08) inset;
}
.sidebar-inner{
  position: relative;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  background: #001529;
  padding: 0;
}

.sidebar-top{
  position: sticky;
  top: 0;
  z-index: 999;
  background: #001529;
  padding: 10px 10px 12px;
  box-sizing: border-box;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.sidebar-search-wrap{
  width: 100%;
  display: flex;
  justify-content: center;
  margin: 0;
  padding: 0;
  background: #001529;
}
.sidebar-search-input{
  width: 100%;
  max-width: 210px;
  height: 32px;
  border: 1px solid var(--border2);
  border-radius: 6px;
  background: var(--backgroundbtn);
  color: var(--text-soft);
  text-align: left;
  outline: none;
  padding: 0 11px;
  font-size: 14px;
  transition: all 0.2s ease;
  box-sizing: border-box;
}

.sidebar-search-input::placeholder{
  color: var(--blur);
  text-align: left;
}

.sidebar-search-input:hover{
  border-color: var(--gold-hover);
}

.sidebar-search-input:focus{
  border-color: var(--gold);
}
.date-time {color: white;font-size: 14px;white-space: nowrap;transition: color 0.3s;}

.header-btn-icon{
  flex-shrink: 0;
}

@media (max-width: 900px){
  .date-time{
    display: none !important;
  }

  .header-right{
    gap: 8px;
  }

  .header-left{
    gap: 8px;
    margin-left: 12px;
  }

  .live-chat-button{
    min-width: 44px;
    width: 44px;
    padding: 0;
    justify-content: center;
    gap: 0;
  }

  .live-chat-button .btn-label{
    display: none !important;
  }

  .live-chat-button .header-btn-icon{
    margin-right: 0 !important;
  }

  .user-button{
    padding: 0 10px;
  }

  .user-name-text{
    max-width: 76px;
  }
}

@media (max-width: 640px){
  .date-time{
    display: none !important;
  }

  .header{
    padding-right: 8px;
  }

  .header-left{
    gap: 4px;
    margin-left: 6px;
  }

  .live-chat-button{
    min-width: 40px;
    width: 40px;
    height: 64px;
    padding: 0;
    justify-content: center;
    gap: 0;
  }

  .live-chat-button .btn-label{
    display: none !important;
  }

  .live-chat-button .header-btn-icon{
    margin-right: 0 !important;
  }

  .header-right{
    gap: 6px;
  }

  .user-button{
    height: 32px;
    padding: 0 8px;
    gap: 6px;
  }

  .user-name-text{
    max-width: 56px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
}

@media (max-width: 520px){
  .user-name-text{
    display: none !important;
  }

  .user-button{
    border: none !important;
    background: transparent !important;
    padding: 0 !important;
    width: 40px;
    height: 40px;
    min-width: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .user-button svg{
    width: 22px;
    height: 22px;
  }

  .user-button:hover{
    background: rgba(255,255,255,0.08) !important;
    border-radius: 50%;
  }

  .dropdown-content{
    min-width: 230px;
    right: 0;
  }

  .dropdown-user-name{
    display: flex;
  }
}
.modal-overlay{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 3000;
  padding: 16px;
}

.modal-overlay.show{
  display: flex;
}

.modal-box{
  width: 100%;
  max-width: 420px;
  background: var(--backgrounddrop);
  border: 1px solid var(--border2);
  border-radius: 12px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.4);
  padding: 20px;
  position: relative;
}

.modal-title{
  color: var(--text-main);
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 18px;
}

.modal-close-btn{
  position: absolute;
  top: 10px;
  right: 10px;
  width: 34px;
  height: 34px;
  border: 1px solid var(--border2);
  border-radius: 8px;
  background: var(--backgroundbtn);
  color: var(--colorbtn);
  font-size: 22px;
  line-height: 1;
  cursor: pointer;
}

.modal-close-btn:hover{
  border-color: var(--gold-hover);
  color: var(--gold-hover);
}

.modal-form{
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.modal-input{
  width: 100%;
  height: 40px;
  border: 1px solid var(--border2);
  border-radius: 8px;
  background: var(--backgroundbtn);
  color: var(--text-soft);
  padding: 0 12px;
  outline: none;
  font-size: 14px;
}

.modal-input:focus{
  border-color: var(--gold);
}

.modal-input::placeholder{
  color: var(--blur);
}

.modal-actions{
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 18px;
}

.modal-btn{
  min-width: 92px;
  height: 36px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--backgroundbtn);
  color: var(--colorbtn);
  cursor: pointer;
  font-weight: 600;
}

.modal-btn:hover{
  border-color: var(--gold-hover);
  color: var(--gold-hover);
}

.modal-btn-primary{
  background: var(--gold);
  border-color: var(--gold);
  color: #fff;
}

.modal-btn-primary:hover{
  background: var(--gold-hover);
  border-color: var(--gold-hover);
  color: #fff;
}

.modal-btn-primary:active{
  background: var(--gold-active);
  border-color: var(--gold-active);
}
  </style>
</head>
<body>
<div class="sidebar-overlay" id="overlay"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-inner">
    <div class="sidebar-top">
      <div class="sidebar-search-wrap">
        <input
          type="text"
          id="sidebarSearchInput"
          class="sidebar-search-input"
          placeholder="Search menu..."
          autocomplete="off"
        />

function ensureHeaderChatTracker(userId) {
  if (!userId) return;
  if (livechatMeta[userId]?.listening) return;

  livechatMeta[userId] = livechatMeta[userId] || {};
  livechatMeta[userId].listening = true;
  livechatMeta[userId].booted = false;

  const lastRef = db.ref(`chats/${userId}`).limitToLast(1);

  lastRef.on("child_added", (snap) => {
    const msg = snap.val() || {};
    const wasBooted = !!livechatMeta[userId].booted;
    if (!wasBooted) {
      livechatMeta[userId].booted = true;
      return;
    }

    if (msg.from !== "user") return;
    if (msg.readByAdmin === true) return;

    db.ref(`users/${userId}`).transaction((userData) => {
      userData = userData || {};
      const current = Number(userData.unreadCountForAdmin || 0);

      userData.unreadForAdmin = true;
      userData.unreadCountForAdmin = current + 1;
      userData.lastChatTime = Number(msg.time) || Date.now();
      return userData;
    });
  });
}

function startHeaderLivechatTracker() {
  if (livechatTrackerStarted) return;
  livechatTrackerStarted = true;

  db.ref("users").on("child_added", (snap) => {
    const userId = snap.key;
    ensureHeaderChatTracker(userId);
  });

  db.ref("users").once("value", (snap) => {
    const users = snap.val() || {};
    Object.keys(users).forEach((userId) => {
      ensureHeaderChatTracker(userId);
    });
  });
}

  return JSON.parse(localStorage.getItem(getCurrentUserStorageKey("openTabs")) || "[]");
}
const sidebarSearchInput = document.getElementById("sidebarSearchInput");

function initSidebarSearch() {
  if (!sidebarSearchInput || !sidebar) return;

  const sidebarLinks = sidebar.querySelectorAll("a");

  sidebarSearchInput.addEventListener("input", function () {
    const keyword = this.value.trim().toLowerCase();

    sidebarLinks.forEach(link => {
      const text = link.textContent.trim().toLowerCase();
      link.style.display = text.includes(keyword) ? "" : "none";
    });
  });
}
function addTab(label, url) {
  const existingTabs = getTabs();
  const exists = existingTabs.some(tab => tab.label === label);
  if (!exists) {
    existingTabs.push({ label, url });
    saveTabs(existingTabs);
  }

  renderTabs();
  loadPage(url);

  // ✅ Highlight tombol LiveChat jika tab ADMIN LIVECHAT dibuka
  const liveBtn = document.getElementById("liveChatBtn");
  const dot = document.getElementById("livechatDot");

if (liveBtn) {
  if (label === "ADMIN LIVECHAT" || label === "LIVE CHAT") {
    liveBtn.classList.add("active-livechat");
  } else {
    liveBtn.classList.remove("active-livechat");
  }

  db.ref("users").once("value").then((snapshot) => {
    const users = snapshot.val() || {};
    let totalUnread = 0;

    Object.values(users).forEach(user => {
      totalUnread += Number(user?.unreadCountForAdmin || 0);
    });

    setLivechatBadgeCount(totalUnread);
  });
}
  const detailBtn = document.getElementById("detailLoginBtn");

if (detailBtn) {
  if (label === "DETAIL LOGIN") {
    detailBtn.classList.add("active-detail");
  } else {
    detailBtn.classList.remove("active-detail");
  }
}
  const settingsBtn = document.getElementById("tabsettingsBtn");

if (settingsBtn) {
  if (label === "TAB SETTINGS") {
    settingsBtn.classList.add("active-tabsettings");
  } else {
    settingsBtn.classList.remove("active-tabsettings");
  }
}
}

  function closeTab(label) {
    let tabs = getTabs().filter(tab => tab.label !== label);
    saveTabs(tabs);
    renderTabs();
    if (tabs.length > 0) {
      loadPage(tabs[tabs.length - 1].url);
    } else {
      pageFrame.src = "";
    }
  }

  function renderTabs() {
    tabBar.innerHTML = "";
    const tabs = getTabs();

    tabs.forEach((tab, index) => {
      const tabElement = document.createElement("div");
      tabElement.className = "tab";
      tabElement.draggable = true;
      tabElement.dataset.index = index;

      tabElement.addEventListener("dragstart", function (e) {
        e.dataTransfer.setData("text/plain", index);
        tabElement.style.opacity = "0.5";
      });

      tabElement.addEventListener("dragend", function () {
        tabElement.style.opacity = "1";
      });

      tabElement.addEventListener("dragover", function (e) {
        e.preventDefault();
      });

      tabElement.addEventListener("drop", function (e) {
        e.preventDefault();
        const fromIndex = parseInt(e.dataTransfer.getData("text/plain"));
        const toIndex = index;

        if (fromIndex !== toIndex) {
          const updatedTabs = getTabs();
          const [movedTab] = updatedTabs.splice(fromIndex, 1);
          updatedTabs.splice(toIndex, 0, movedTab);
          saveTabs(updatedTabs);
          renderTabs();
        }
      });

      tabElement.onclick = () => loadPage(tab.url);

      if (tab.url === pageFrame.src) {
        tabElement.classList.add("active-tab");
      }

      const title = document.createElement("span");
      title.textContent = tab.label;
      title.style.pointerEvents = "none";

      const closeBtn = document.createElement("button");
      closeBtn.className = "close-tab";
      closeBtn.textContent = "×";
      closeBtn.style.marginLeft = "4px";
      closeBtn.style.cursor = "pointer";
      closeBtn.style.background = "none";
      closeBtn.style.border = "none";
      closeBtn.style.color = "red";
      closeBtn.style.fontSize = "14px";
      closeBtn.style.transition = "all 0.2s ease";
      closeBtn.style.padding = "0";
      closeBtn.style.pointerEvents = "auto";

      closeBtn.onmouseover = () => {
        closeBtn.style.color = "#ff1a1a";
        closeBtn.style.transform = "scale(1.2)";
      };
      closeBtn.onmouseout = () => {
        closeBtn.style.color = "red";
        closeBtn.style.transform = "scale(1)";
      };

      closeBtn.onclick = (e) => {
        e.stopPropagation();
        closeTab(tab.label);
      };

      tabElement.appendChild(title);
      tabElement.appendChild(closeBtn);
      tabBar.appendChild(tabElement);
    });
  }

function loadPage(url) {
  pageFrame.src = url;
  localStorage.setItem(getCurrentUserStorageKey("activeTabUrl"), url);
  closeSidebar();

  document.querySelectorAll(".tab").forEach(tab => {
    tab.classList.remove("active-tab");
  });

  const tabs = getTabs();
  const tabElements = document.querySelectorAll(".tab");

  tabs.forEach((tab, index) => {
    if (tab.url === url && tabElements[index]) {
      tabElements[index].classList.add("active-tab");
    }
  });

  // ✅ Tambahan: aktifkan tombol header yang sesuai
  const matchedTab = tabs.find(tab => tab.url === url);
  const label = matchedTab?.label || "";

  const liveBtn = document.getElementById("liveChatBtn");
  const detailBtn = document.getElementById("detailLoginBtn");
  const settingsBtn = document.getElementById("tabsettingsBtn");

if (liveBtn) {
  if (label === "ADMIN LIVECHAT" || label === "LIVE CHAT") {
    liveBtn.classList.add("active-livechat");
  } else {
    liveBtn.classList.remove("active-livechat");
  }

  db.ref("users").once("value").then((snapshot) => {
    const users = snapshot.val() || {};
    let totalUnread = 0;

    Object.values(users).forEach(user => {
      totalUnread += Number(user?.unreadCountForAdmin || 0);
    });

    setLivechatBadgeCount(totalUnread);
  });
}

  if (detailBtn) {
    if (label === "DETAIL LOGIN") {
      detailBtn.classList.add("active-detail");
    } else {
      detailBtn.classList.remove("active-detail");
    }
  }
    if (settingsBtn) {
    if (label === "TAB SETTINGS") {
      settingsBtn.classList.add("active-tabsettings");
    } else {
      settingsBtn.classList.remove("active-tabsettings");
    }
  }
}

window.onload = () => {
  renderTabs();
  initSidebarSearch();
  startHeaderLivechatTracker();

  const tabs = getTabs();
  const activeUrl = localStorage.getItem(getCurrentUserStorageKey("activeTabUrl"));
  const match = tabs.find(tab => tab.url === activeUrl);

  if (match) {
    loadPage(match.url);
  } else if (tabs.length > 0) {
    loadPage(tabs[tabs.length - 1].url);
  }

  updateDateTime();
  setInterval(updateDateTime, 1000);
};

  function formatTimestamp(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    const hh = String(date.getHours()).padStart(2, '0');
    const mm = String(date.getMinutes()).padStart(2, '0');
    const ss = String(date.getSeconds()).padStart(2, '0');
    return `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
  }
function updateDateTime() {
  const region = "Kuala_Lumpur";
  const now = new Date();

  const hours = String(now.getHours()).padStart(2, '0');
  const minutes = String(now.getMinutes()).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  const month = monthNames[now.getMonth()];

  const timeString = `${hours}:${minutes} ${month} ${day}`;

  document.getElementById('dateTime').textContent =
    `${region}: ${timeString}`;
}
updateDateTime();
setInterval(updateDateTime, 1000);

document.addEventListener("DOMContentLoaded", updateDateTime);
window.addEventListener("load", updateDateTime);
  function cleanUrl() {
    const cleanUrl = window.location.origin + window.location.pathname;
    window.history.replaceState({}, document.title, cleanUrl);
  }
  </script>
