  <style>
    :root{
  --bg-main: #000;
  --sidebar: #001529;
  --text-main: #fff;
  --text-soft: rgba(255,255,255,0.85);
  --text-dim: rgba(255,255,255,0.65);
  --colorbtn:rgba(255,255,255,0.85);
  --backgroundbtn:#141414;
  --backgrounddrop:#1f1f1f;
  --border:#303030;
  --border2:#424242;
  --panel-border: #424242;
  --blur:rgba(255,255,255,0.25);
  --border3:#303030;
  --tab2:#141414;
  --border-bottom:#141414;
  --close:rgba(255,255,255,0.45);

  --tab-bg: rgba(255,255,255,0.04);
  --tab-border: #303030;

  --btn-bg: transparent;
  --btn-text: rgba(255,255,255,0.85);
  --btn-border: #424242;

  --gold: #1668dc;
  --gold-hover: #3c89e8;
  --gold-active: #1554ad;

  --overlay-bg: rgba(0,0,0,0.5);
  --popup-bg: #1f1f1f;

  --empty-text: rgba(255,255,255,.7);
  --empty-title: rgba(255,255,255,.85);

  --toggle-track: #2c7be5;
  --toggle-knob: #ffffff;
  --btnfocus:#15325b;
}

/* default light theme */
body.light-theme{
  --bg-main: #fff;
  --sidebar: #001529;
  --text-main: #000;
  --text-soft: rgba(17,24,39,0.88);
  --text-dim: rgba(17,24,39,0.72);
  --colorbtn:rgba(0, 0, 0, 0.88);
  --backgroundbtn:#ffffff;
  --backgrounddrop:#ffffff;
  --border:#303030;
  --border2:#d9d9d9;
  --panel-border: #d4dbe6;
  --blur:rgba(0,0,0,0.25);
  --border3:#f0f0f0;
  --tab2:#ffffff;
  --border-bottom:#ffffff;
  --close:rgba(0, 0, 0, 0.88);

  --tab-bg: rgba(255,255,255,0.04);
  --tab-border: #d4dbe6;

  --btn-bg: transparent;
  --btn-text: rgba(17,24,39,0.88);
  --btn-border: #d4dbe6;

  --gold: #1668dc;
  --gold-hover: #3c89e8;
  --gold-active: #1554ad;

  --overlay-bg: rgba(15,23,42,0.18);
  --popup-bg: #ffffff;

  --empty-text: rgba(17,24,39,.7);
  --empty-title: rgba(17,24,39,.88);

  --toggle-track: #cfd8e3;
  --toggle-knob: #ffffff;
  --btnfocus:#91caff;
}
    * {margin: 0;padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }
    body {
      background: radial-gradient(circle at top, #1f2937 0, transparent 55%), radial-gradient(circle at bottom, #020617 0, #000 65%);
      color: #fff;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

.sidebar-overlay {
  position: fixed;
  top: 64px;
  left: 0;
  width: 100%;
  height: calc(100vh - 64px);
  z-index: 1001;
  display: none;
  background: transparent;
}
.sidebar-overlay.active {
  display: block;
}
.sidebar {
  position: fixed;
  top: 64px;
  left: 0;
  width: 255px;
  height: calc(100vh - 64px);
  background: #001529;
  z-index: 1002;
  overflow: hidden;
  border-right: 1px solid rgba(255,255,255,0.12);
  box-shadow: 4px 0 18px rgba(0,0,0,0.35);
  transform: translateX(-100%);
  transition: transform 0.28s ease;
}
.sidebar.active {
  transform: translateX(0);
}
.sidebar-inner {
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 12px 10px 16px;
  box-sizing: border-box;
  scroll-behavior: smooth;
}
.sidebar-inner::-webkit-scrollbar {
  width: 8px;
}

.sidebar-inner::-webkit-scrollbar-track {
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
}

.sidebar-inner::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #1f6fe5, #0e4da8);
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.08);
}

.sidebar-inner::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg,  rgba(255, 255, 255, 0.65), rgba(255, 255, 255, 0.85));
}

/* Firefox */
.sidebar-inner {
  scrollbar-width: thin;
  scrollbar-color: rgba(255, 255, 255, 0.25) transparent;
}
  .sidebar h2 {color: rgba(255,255,255,0.85);margin-bottom: 15px;border:1px solid #424242;border-radius:6px;text-align:center;font-size: 20px;}.sidebar h2{display:none !important;}
  .sidebar a {display: block;margin: 10px 0;color: rgba(255,255,255,0.65);text-decoration: none;font-size: 14px;font-weight: bold;border-radius: 6px;transition: all 0.2s;padding: 4px 8px;gap: 5px;white-space: nowrap;border-bottom: 1px solid #424242;}
  .sidebar a:hover {background:#03203d;color: white;}

.header {
  position: fixed;
  width: 100%;
  z-index: 1003;
  height: 64px;
  background: #001529;
  display: flex;
  align-items: center;
  padding: 0 15px 0 0;
  top: 0;
  left: 0;
  transition: background .25s ease, color .25s ease;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-left: 38px; /* bagi ruang untuk menu icon */
}

.header-right {
  display: flex;
  align-items: center;
  margin-left: auto;
  gap: 12px;
}
.user-dropdown {
  position: relative;
  display: flex;
  align-items: center;
  height: 100%;
}

.user-button {
  height: 32px;
  padding: 0 15px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--backgroundbtn);
  color: var(--colorbtn);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  white-space: nowrap;
  transition: border-color .2s ease, color .2s ease, background .2s ease;
}

.user-button:hover {
  border-color: var(--gold-hover);
  color: var(--gold-hover);
}

.user-button:active {
  border-color: var(--gold-active);
  color: var(--gold-active);
}

.user-button svg {
  width: 18px;
  height: 18px;
  fill: currentColor;
  flex-shrink: 0;
}

.user-name-text {
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.dropdown-content {
    display: none;
    position: absolute;
    background: var(--backgrounddrop);
    min-width: 220px;
    border: 1px solid var(--border2);
    border-radius: 6px;
    box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.3);
    padding: 10px;
    z-index: 1;
    color: var(--colorbtn);
    top: 120%;
    right: 0;
    left: auto;
    transform: none;
    font-size: 14px;
    transition: all 0.2s ease !important;
}

.dropdown-content.show {
  display: block;
}

.dropdown-user-top {
  padding: 4px 4px 8px;
}

#userEmail {
  color: var(--text-soft);
  font-size: 14px;
  word-break: break-word;
}

.dropdown-divider {
  border: 0;
  border-top: 1px solid var(--border2);
  margin: 8px 0;
}

.dropdown-btn {
  width: 100%;
  height: 32px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--backgroundbtn);
  color: var(--colorbtn);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  transition: border-color .2s ease, color .2s ease, background .2s ease;
  margin-top: 8px;
}

.dropdown-btn:hover {
  border-color: var(--gold-hover);
  color: var(--gold-hover);
}

.dropdown-btn:active {
  border-color: var(--gold-active);
  color: var(--gold-active);
}

.dropdown-btn svg {
  width: 16px;
  height: 16px;
  fill: currentColor;
  flex-shrink: 0;
}
.container {
  position: relative;
  transition: margin-left 0.3s ease, width 0.3s ease;
  width: 100%;
}
.container.shrink {
  margin-left: 255px;
  width: calc(100% - 255px);
}
.menu-icon {
  position: static;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 64px;
  height: 64px;
  font-size: 16px;
  border-radius: 6px;
  color: #ffffff;
  cursor: pointer;
  z-index: 1100;
  transition: color 0.3s;
  flex-shrink: 0;
}
.menu-icon svg {
  width: 1rem;
  height: 1rem;
  display: block;
  fill: currentColor;
}
.menu-icon:hover {background: rgba(255, 255, 255, 0.08);}
.menu-icon:active {background:rgba(255, 255, 255, 0.18);}    
.menu-img {width: 20px;height: 20px;vertical-align: middle;margin-right: 8px;border-radius: 4px;}
@media (max-width: 815px) {
  .container,
  .container.shrink {
    margin-left: 0 !important;
    width: 100% !important;
  }
}

html, body {
  height: 100%;
}

#pageFrame {
  display: block;
  width: 100%;
  height: calc(100vh - 120px);
  border: none;
}
.tab-bar {
  position: relative;
  transition: margin-left 0.2s ease, width 0.2s ease;
  width: 100%;
  height: 56px;
  background: var(--bg-main);
  display: flex;
  align-items: flex-end;
  gap: 0;
  z-index: 1;
  justify-content: flex-start;
  white-space: nowrap;
  margin-top: 64px;
  overflow-x: auto;
  overflow-y: hidden;
  -ms-overflow-style: none;
  scrollbar-width: none;
  box-sizing: border-box;
  padding: 0px 10px;
}
.tab-bar::after{
  content: "";
  position: absolute;
  bottom: 0;
  left: 10px;
  width: calc(100% - 20px); 
  height: 1px;
  background: var(--border2);
  z-index: 1; /* 🔥 belakang tab */
}
.tab-bar::-webkit-scrollbar {display: none;}
.tab {
  background: var(--tab-bg);
  color: var(--text-soft)!important;
  padding: 12px 16px;
  border-radius: 8px 8px 0 0;
  gap: 2px;
  white-space: nowrap;
  transition:
    transform .18s ease,
    color .18s ease,
    background .18s ease,
    border-color .18s ease,
    box-shadow .18s ease,
    opacity .18s ease;
  border: 1px solid var(--border3);
  display: inline-flex;
  font-size: 14px;
  align-items: center;
  user-select: none;
  cursor: pointer;
  filter: none;
  box-sizing: border-box;
  flex-shrink: 0;
  line-height: 1.2;
  z-index: 2;
  margin-bottom: -1px;
  will-change: transform;
}
.tab .close-tab{
  background: transparent;
  color: var(--close);
  border: none;
  border-radius: 0;
  cursor: pointer;
  width: 1em;
  height: 1em;
  padding: 0;
  margin-left: 4px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: color .3s ease, transform .2s ease;
    margin-left: 4px;
    pointer-events: auto;
  font-size:12px;
}
.tab .close-tab:hover{
  color:var(--text-main)!important
}
.tab .close-tab:active{
  color:var(--gold-active)!important
}
.tab:not(.active-tab):hover {
  color: var(--gold-hover) !important;
}
.tab:not(.active-tab):active,
.tab:not(.active-tab):hover:active {
  color: var(--gold-active) !important;
}
.active-tab {
  color: var(--gold) !important;background:var(--tab2);
  transition: all 0.3s ease;border-bottom: 1px solid var(--border-bottom);z-index: 3;
}

.header.shrink {
  margin-left: 0 !important;
  width: 100%;
  transition: none;
}
.container {
  transition: all 0.25s ease;
}

.tab-bar {
  transition: all 0.25s ease;
}
.live-chat-button .btn-label {
    display: inline-flex;
    align-items: center;
    height: 100%;
}
.live-chat-button {
  color: rgba(255,255,255,0.65);
  border: none;
  font-size: 14px;
  cursor: pointer;
  transition: color 0.3s, background 0.2s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: transparent;
  position: relative;

  height: 100%;
  height: 64px;
  align-self: stretch;

  padding: 0 15px;
  white-space: nowrap;
  border-radius: 0;
  box-sizing: border-box;
  flex-shrink: 0;
}
.live-chat-button.active-detail {
  background: var(--gold);
  color: white;
}
.live-chat-button.active-livechat {
  background: var(--gold);
  color: white;
}
.live-chat-button.active-livechat {
  background: var(--gold);
  color: white;
}
.live-chat-button.active-tabsettings {
  background: var(--gold);
  color: white;
}
  .dot-icon {
  position: absolute;
  top: -6px;
  right: 0;
  display: none;
  z-index: 2;
}
.sidebar-inner{
  position: relative;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  background: #001529;
  padding: 0;
}

.sidebar-top{
  position: sticky;
  top: 0;
  z-index: 999;
  background: #001529;
  padding: 10px 10px 12px;
  box-sizing: border-box;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.sidebar-search-wrap{
  width: 100%;
  display: flex;
  justify-content: center;
  margin: 0;
  padding: 0;
  background: #001529;
}
.sidebar-search-input{
  width: 100%;
  max-width: 210px;
  height: 32px;
  border: 1px solid var(--border2);
  border-radius: 6px;
  background: var(--backgroundbtn);
  color: var(--text-soft);
  text-align: left;
  outline: none;
  padding: 0 11px;
  font-size: 14px;
  transition: all 0.2s ease;
  box-sizing: border-box;
}

.sidebar-search-input::placeholder{
  color: var(--blur);
  text-align: left;
}

.sidebar-search-input:hover{
  border-color: var(--gold-hover);
}

.sidebar-search-input:focus{
  border-color: var(--gold);
}
.date-time {color: white;font-size: 14px;white-space: nowrap;transition: color 0.3s;}
  </style>
</head>

          <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8V22h19.2v-2.8c0-3.2-6.4-4.8-9.6-4.8z"/>
        </svg>
        <span id="userNameText" class="user-name-text"></span>
      </button>

      <div id="dropdownContent" class="dropdown-content">
        <div class="dropdown-user-top">
          <div id="userEmail"></div>
        </div>

        <hr class="dropdown-divider">

        <button id="logoutBtn" class="dropdown-btn" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M16 10v-5l8 7-8 7v-5h-8v-4h8zm-16-8v20h14v-2h-12v-16h12v-2h-14z"/>
          </svg>
          <span>Logout</span>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="mainContainer" class="container">
  <div id="tabBar" class="tab-bar"></div>

  <iframe
    id="pageFrame"
    allow="clipboard-write"
    sandbox="allow-scripts allow-same-origin allow-modals"
    style="width: 100%; border: none;">
  </iframe>
</div>

<audio id="notifSound" src="https://searcfile.github.io/5G88-audio/notifsound/notification.wav" preload="auto"></audio>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
  // ✅ Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCKmrlS4qrZCrMNRIfIRCWCbNgZT1uQ3ZI",
    authDomain: "blurphp.firebaseapp.com",
    databaseURL: "https://blurphp-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "blurphp",
    storageBucket: "blurphp.firebasedatabase.app",
    messagingSenderId: "593904200464",
    appId: "1:593904200464:web:cea7bc1360532c20d99395",
    measurementId: "G-R494S2DPZ5"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ✅ Firebase login app
  const loginFirebaseConfig = {
    apiKey: "AIzaSyC2uWjeQriOICtmuc8VU6yCRdXAtK8x0X4",
    authDomain: "page-login2.firebaseapp.com",
    projectId: "page-login2",
    storageBucket: "page-login2.firebasestorage.app",
    messagingSenderId: "860837620702",
    appId: "1:860837620702:web:db51c2a50d414a4de44b4f"
  };

  const loginApp = firebase.apps.find(app => app.name === "loginApp")
    || firebase.initializeApp(loginFirebaseConfig, "loginApp");

  const loginAuth = loginApp.auth();
// ✅ Guard: kalau belum login, terus balik ke login page
  const LOGIN_URL = "/5G88-editor/feature/login/";
  let authChecked = false;

loginAuth.onAuthStateChanged((user) => {
  authChecked = true;

  if (!user) {
    localStorage.removeItem("loginUser");
    window.location.replace(LOGIN_URL);
    return;
  }

  const email = user.email || "";
  const username = email.replace("@5g88.local", "") || "Admin";

  localStorage.setItem("loginUser", JSON.stringify({
    uid: user.uid,
    email,
    username,
    lastLogin: Date.now()
  }));

  const userNameTextEl = document.getElementById("userNameText");
  const userEmailEl = document.getElementById("userEmail");

  if (userNameTextEl) userNameTextEl.textContent = username;
  if (userEmailEl) userEmailEl.textContent = email;
});
const savedLoginUser = JSON.parse(localStorage.getItem("loginUser") || "null");
if (savedLoginUser) {
  const userNameTextEl = document.getElementById("userNameText");
  const userEmailEl = document.getElementById("userEmail");

  if (userNameTextEl) userNameTextEl.textContent = savedLoginUser.username || "Admin";
  if (userEmailEl) userEmailEl.textContent = savedLoginUser.email || "";
}
  const logoutBtn = document.getElementById("logoutBtn");
  if (logoutBtn) {
    logoutBtn.addEventListener("click", logoutAccount);
  }
const userNameBtn = document.getElementById("userName");
const dropdownContent = document.getElementById("dropdownContent");

if (userNameBtn && dropdownContent) {
  userNameBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    dropdownContent.classList.toggle("show");
  });

  document.addEventListener("click", (e) => {
    const insideDropdown = e.target.closest(".user-dropdown");
    if (!insideDropdown) {
      dropdownContent.classList.remove("show");
    }
  });
}
  async function logoutAccount() {
    try {
      await loginAuth.signOut();
    } catch (err) {
      console.error("Logout error:", err);
    } finally {
      localStorage.removeItem("loginUser");
      localStorage.removeItem("openTabs");
      localStorage.removeItem("activeTabUrl");
      window.location.replace(LOGIN_URL);
    }
  }
  // ✅ Interaksi user diperlukan agar audio bisa diputar
  let userHasInteracted = false;
  document.addEventListener('click', () => {
    userHasInteracted = true;
    console.log("✅ userHasInteracted = true");
  });

  let hasPlayed = false;
  const notifiedKeys = new Set(); // untuk deteksi pesan baru yang belum dibunyikan

  function playNotif() {
    const audio = document.getElementById("notifSound");
    if (audio && userHasInteracted) {
      audio.currentTime = 0;
      audio.play()
        .then(() => console.log("✅ Audio diputar"))
        .catch(err => console.warn("🔇 Audio gagal diputar:", err));
    } else {
      console.warn("❌ Tidak bisa play: belum ada interaksi user");
    }
  }

  function showLivechatDot(status) {
    const dot = document.getElementById("livechatDot");
    if (dot) dot.style.display = status ? "inline-block" : "none";
  }

  // ✅ Pantau semua pesan baru (real-time)
  db.ref("chats").on("child_changed", (snapshot) => {
    const userId = snapshot.key;
    const messages = snapshot.val();
    let foundUnread = false;

    for (const msgId in messages) {
      const msg = messages[msgId];
      const key = `${userId}-${msgId}`;

      if (msg.from === "user" && msg.readByAdmin !== true && !notifiedKeys.has(key)) {
        console.log("🔔 Pesan baru terdeteksi:", key);
        playNotif();
        showLivechatDot(true);
        notifiedKeys.add(key);
        foundUnread = true;
      }
    }

    if (!foundUnread) {
      showLivechatDot(false);
    }
  });

  // ✅ Juga pantau child_added (jika user baru kirim pesan pertama kali)
  db.ref("chats").on("child_added", (snapshot) => {
    const userId = snapshot.key;
    const messages = snapshot.val();
    if (!messages) return;

    for (const msgId in messages) {
      const msg = messages[msgId];
      const key = `${userId}-${msgId}`;

      if (msg.from === "user" && msg.readByAdmin !== true && !notifiedKeys.has(key)) {
        console.log("🔔 Pesan baru dari user baru:", key);
        playNotif();
        showLivechatDot(true);
        notifiedKeys.add(key);
      }
    }
  });
  const tabBar = document.getElementById("tabBar");
  const menuIcon = document.getElementById("menuIcon");
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  overlay.addEventListener("click", closeSidebar);
  const container = document.getElementById("mainContainer");
  const pageFrame = document.getElementById("pageFrame");

  menuIcon.addEventListener("click", () => {
  if (sidebar.classList.contains("active")) {
    closeSidebar();
  } else {
    openSidebar();
  }
});


function openSidebar() {
  sidebar.classList.add("active");
  overlay.classList.add("active"); // ✅ desktop + mobile sama-sama aktif

  container.classList.add("shrink");
  document.querySelector('.header').classList.add('shrink');
  document.getElementById("menuIcon").classList.add("active-menu-icon");
}

  function closeSidebar() {
    sidebar.classList.remove("active");
    overlay.classList.remove("active");
    container.classList.remove("shrink");
    document.querySelector('.header').classList.remove('shrink');
    document.getElementById("menuIcon").classList.remove("active-menu-icon");
  }
  document.addEventListener("click", (e) => {
  const isSidebar = e.target.closest("#sidebar");
  const isMenuIcon = e.target.closest("#menuIcon");

  if (!isSidebar && !isMenuIcon && sidebar.classList.contains("active")) {
    closeSidebar();
  }
});

  function saveTabs(tabs) {
    localStorage.setItem("openTabs", JSON.stringify(tabs));
  }

  function getTabs() {
    return JSON.parse(localStorage.getItem("openTabs")) || [];
  }
const sidebarSearchInput = document.getElementById("sidebarSearchInput");

function initSidebarSearch() {
  if (!sidebarSearchInput || !sidebar) return;

  const sidebarLinks = sidebar.querySelectorAll("a");

  sidebarSearchInput.addEventListener("input", function () {
    const keyword = this.value.trim().toLowerCase();

    sidebarLinks.forEach(link => {
      const text = link.textContent.trim().toLowerCase();
      link.style.display = text.includes(keyword) ? "" : "none";
    });
  });
}
function addTab(label, url) {
  const existingTabs = getTabs();
  const exists = existingTabs.some(tab => tab.label === label);
  if (!exists) {
    existingTabs.push({ label, url });
    saveTabs(existingTabs);
  }

  renderTabs();
  loadPage(url);

  // ✅ Highlight tombol LiveChat jika tab ADMIN LIVECHAT dibuka
  const liveBtn = document.getElementById("liveChatBtn");
  const dot = document.getElementById("livechatDot");

  if (liveBtn) {
    if (label === "ADMIN LIVECHAT" || label === "LIVE CHAT") {
      liveBtn.classList.add("active-livechat");
      if (dot) dot.style.display = "none"; // sembunyikan dot merah
    } else {
      liveBtn.classList.remove("active-livechat");
    }
  }
  const detailBtn = document.getElementById("detailLoginBtn");

if (detailBtn) {
  if (label === "DETAIL LOGIN") {
    detailBtn.classList.add("active-detail");
  } else {
    detailBtn.classList.remove("active-detail");
  }
}
  const settingsBtn = document.getElementById("tabsettingsBtn");

if (settingsBtn) {
  if (label === "TAB SETTINGS") {
    settingsBtn.classList.add("active-tabsettings");
  } else {
    settingsBtn.classList.remove("active-tabsettings");
  }
}
}

  function closeTab(label) {
    let tabs = getTabs().filter(tab => tab.label !== label);
    saveTabs(tabs);
    renderTabs();
    if (tabs.length > 0) {
      loadPage(tabs[tabs.length - 1].url);
    } else {
      pageFrame.src = "";
    }
  }

  function renderTabs() {
    tabBar.innerHTML = "";
    const tabs = getTabs();

    tabs.forEach((tab, index) => {
      const tabElement = document.createElement("div");
      tabElement.className = "tab";
      tabElement.draggable = true;
      tabElement.dataset.index = index;

      tabElement.addEventListener("dragstart", function (e) {
        e.dataTransfer.setData("text/plain", index);
        tabElement.style.opacity = "0.5";
      });

      tabElement.addEventListener("dragend", function () {
        tabElement.style.opacity = "1";
      });

      tabElement.addEventListener("dragover", function (e) {
        e.preventDefault();
      });

      tabElement.addEventListener("drop", function (e) {
        e.preventDefault();
        const fromIndex = parseInt(e.dataTransfer.getData("text/plain"));
        const toIndex = index;

        if (fromIndex !== toIndex) {
          const updatedTabs = getTabs();
          const [movedTab] = updatedTabs.splice(fromIndex, 1);
          updatedTabs.splice(toIndex, 0, movedTab);
          saveTabs(updatedTabs);
          renderTabs();
        }
      });

      tabElement.onclick = () => loadPage(tab.url);

      if (tab.url === pageFrame.src) {
        tabElement.classList.add("active-tab");
      }

      const title = document.createElement("span");
      title.textContent = tab.label;
      title.style.pointerEvents = "none";

      const closeBtn = document.createElement("button");
      closeBtn.className = "close-tab";
      closeBtn.textContent = "×";
      closeBtn.style.marginLeft = "4px";
      closeBtn.style.cursor = "pointer";
      closeBtn.style.background = "none";
      closeBtn.style.border = "none";
      closeBtn.style.color = "red";
      closeBtn.style.fontSize = "14px";
      closeBtn.style.transition = "all 0.2s ease";
      closeBtn.style.padding = "0";
      closeBtn.style.pointerEvents = "auto";

      closeBtn.onmouseover = () => {
        closeBtn.style.color = "#ff1a1a";
        closeBtn.style.transform = "scale(1.2)";
      };
      closeBtn.onmouseout = () => {
        closeBtn.style.color = "red";
        closeBtn.style.transform = "scale(1)";
      };

      closeBtn.onclick = (e) => {
        e.stopPropagation();
        closeTab(tab.label);
      };

      tabElement.appendChild(title);
      tabElement.appendChild(closeBtn);
      tabBar.appendChild(tabElement);
    });
  }

function loadPage(url) {
  pageFrame.src = url;
  localStorage.setItem("activeTabUrl", url);
  closeSidebar();

  document.querySelectorAll(".tab").forEach(tab => {
    tab.classList.remove("active-tab");
  });

  const tabs = getTabs();
  const tabElements = document.querySelectorAll(".tab");

  tabs.forEach((tab, index) => {
    if (tab.url === url && tabElements[index]) {
      tabElements[index].classList.add("active-tab");
    }
  });

  // ✅ Tambahan: aktifkan tombol header yang sesuai
  const matchedTab = tabs.find(tab => tab.url === url);
  const label = matchedTab?.label || "";

  const liveBtn = document.getElementById("liveChatBtn");
  const detailBtn = document.getElementById("detailLoginBtn");
  const settingsBtn = document.getElementById("tabsettingsBtn");

  if (liveBtn) {
    if (label === "ADMIN LIVECHAT" || label === "LIVE CHAT") {
      liveBtn.classList.add("active-livechat");
      const dot = document.getElementById("livechatDot");
      if (dot) dot.style.display = "none";
    } else {
      liveBtn.classList.remove("active-livechat");
    }
  }

  if (detailBtn) {
    if (label === "DETAIL LOGIN") {
      detailBtn.classList.add("active-detail");
    } else {
      detailBtn.classList.remove("active-detail");
    }
  }
    if (settingsBtn) {
    if (label === "TAB SETTINGS") {
      settingsBtn.classList.add("active-tabsettings");
    } else {
      settingsBtn.classList.remove("active-tabsettings");
    }
  }
}

window.onload = () => {
  renderTabs();
  initSidebarSearch();

  const tabs = getTabs();
  const activeUrl = localStorage.getItem("activeTabUrl");
  const match = tabs.find(tab => tab.url === activeUrl);

  if (match) {
    loadPage(match.url);
  } else if (tabs.length > 0) {
    loadPage(tabs[tabs.length - 1].url);
  }

  updateDateTime();
  setInterval(updateDateTime, 1000);
};

  function formatTimestamp(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    const hh = String(date.getHours()).padStart(2, '0');
    const mm = String(date.getMinutes()).padStart(2, '0');
    const ss = String(date.getSeconds()).padStart(2, '0');
    return `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
  }
function updateDateTime() {
  const region = "Kuala_Lumpur";
  const now = new Date();

  const hours = String(now.getHours()).padStart(2, '0');
  const minutes = String(now.getMinutes()).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  const month = monthNames[now.getMonth()];

  const timeString = `${hours}:${minutes} ${month} ${day}`;

  document.getElementById('dateTime').textContent =
    `${region}: ${timeString}`;
}
updateDateTime();
setInterval(updateDateTime, 1000);

document.addEventListener("DOMContentLoaded", updateDateTime);
window.addEventListener("load", updateDateTime);
  function cleanUrl() {
    const cleanUrl = window.location.origin + window.location.pathname;
    window.history.replaceState({}, document.title, cleanUrl);
  }
  </script>
