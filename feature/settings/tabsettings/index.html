  --muted:#94a3b8;

  --accent:#facc15;
  --accent2:#fbbf24;

  --btn:#1668dc;
  --btnH:#3c89e8;
  --btnA:#1554ad;

  --danger:#fb7185;
  --success:#22c55e;

  --r:18px;
  --r-sm:12px;
  --shadow:0 18px 45px rgba(0,0,0,.70);
  --shadow2:0 0 0 1px rgba(2,6,23,.9), 0 18px 40px rgba(0,0,0,.65);
  --shadow3:0 18px 55px rgba(0,0,0,.36);

  --headerH:64px;

  --bg-main:#fff;
  --sidebar:#001529;
  --text-main:#000;
  --text-soft:rgba(17,24,39,0.88);
  --text-dim:rgba(17,24,39,0.72);
  --colorbtn:rgba(0,0,0,0.88);
  --backgroundbtn:#ffffff;
  --backgrounddrop:#ffffff;
  --border:#303030;
  --border2:#d9d9d9;
  --panel-border:#d4dbe6;
  --blur:rgba(0,0,0,0.25);
  --border3:#f0f0f0;
  --tab2:#ffffff;
  --border-bottom:#ffffff;

  --tab-bg:rgba(255,255,255,0.04);

  --btn-bg:transparent;

  --overlay-bg:rgba(15,23,42,0.18);

  --empty-text:rgba(17,24,39,.7);
  --empty-title:rgba(17,24,39,.88);

  --toggle-track:#cfd8e3;
  --toggle-knob:#ffffff;
  --btnfocus:#91caff;

  --panel-dark:#111827;
  --panel-dark-2:#0f172a;

  --line-soft:rgba(255,255,255,.08);
  --line-soft-2:rgba(255,255,255,.12);
}

body.dark-theme{
  --bg-main:#000;
  --sidebar:#001529;
  --text-main:#fff;
  --text-soft:rgba(255,255,255,0.85);
  --text-dim:rgba(255,255,255,0.65);
  --colorbtn:rgba(255,255,255,0.85);
  --backgroundbtn:#141414;
  --backgrounddrop:#1f1f1f;
  --border:#303030;
  --border2:#424242;
  --panel-border:#424242;
  --blur:rgba(255,255,255,0.25);
  --border3:#303030;
  --tab2:#141414;
  --border-bottom:#141414;
  --close:rgba(255,255,255,0.45);

  --tab-bg:rgba(255,255,255,0.04);
  --tab-border:#303030;

  --btn-bg:transparent;
  --btn-text:rgba(255,255,255,0.85);
  --btn-border:#424242;

  --gold:#1668dc;
  --gold-hover:#3c89e8;
  --gold-active:#1554ad;

  --overlay-bg:rgba(0,0,0,0.5);
  --popup-bg:#1f1f1f;

  --empty-text:rgba(255,255,255,.7);
  --empty-title:rgba(255,255,255,.85);

  --toggle-track:#2c7be5;
  --toggle-knob:#ffffff;
  --btnfocus:#15325b;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html, body{
  min-height:100%;
}

body{
  min-height:100vh;
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:
    radial-gradient(circle at top left, rgba(22,104,220,.16), transparent 24%),
    radial-gradient(circle at top right, rgba(59,130,246,.10), transparent 22%),
    linear-gradient(180deg, #030712 0%, #050816 45%, #020617 100%);
}

/* ===== scrollbar ===== */
*::-webkit-scrollbar{
  width:8px;
  height:8px;
}
*::-webkit-scrollbar-track{
  background:transparent;
}
*::-webkit-scrollbar-thumb{
  background:rgba(148,163,184,.22);
  border-radius:999px;
}
*::-webkit-scrollbar-thumb:hover{
  background:rgba(148,163,184,.34);
}

/* ===== layout ===== */
.container{
  max-width:1280px;
  margin:22px auto 36px;
  padding:0 20px;
}

/* ===== Header ===== */
header{
  height:var(--headerH);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:18px;
  padding:10px 14px;
  border:1px solid rgba(148,163,184,.12);
  border-radius:16px;
  background:
    linear-gradient(135deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),
    radial-gradient(circle at 30% 0%, rgba(22,104,220,.25), transparent 55%);
  box-shadow:0 12px 30px rgba(0,0,0,.35);
  backdrop-filter:blur(10px);
}

.title-wrap{
  display:flex;
  flex-direction:column;
  gap:4px;
  min-width:0;
}

h1{
  font-size:22px;
  font-weight:900;
  color:var(--accent);
  letter-spacing:.04em;
  display:flex;
  gap:10px;
  align-items:center;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.subtitle{
  font-size:12.5px;
  color:rgba(226,232,240,.75);
}

/* ===== Main Grid ===== */
.pageGrid{
  display:grid;
  grid-template-columns:minmax(390px, 520px) minmax(0, 1fr);
  gap:18px;
  align-items:start;
}

@media (max-width: 1080px){
  .pageGrid{
    grid-template-columns:1fr;
  }
  .container{
    margin:16px auto 28px;
  }
}

/* ===== Card base ===== */
.cardShell{
  border-radius:20px;
  border:1px solid rgba(255,255,255,.08);
  background:
    linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.025));
  box-shadow:var(--shadow3);
  backdrop-filter:blur(14px);
  overflow:hidden;
  height:100%;
}

/* ===== LEFT PANEL ===== */
.rightPanel{
  padding:18px;
}

.rpHead{
  padding:16px;
  border-radius:18px;
  border:1px solid rgba(148,163,184,.16);
  background:
    radial-gradient(circle at top left, rgba(22,104,220,.18), transparent 55%),
    linear-gradient(135deg, rgba(0,0,0,.28), rgba(255,255,255,.03));
  box-shadow:0 10px 25px rgba(0,0,0,.35);
  margin-bottom:16px;
}

.rpTitle{
  font-size:28px;
  font-weight:1000;
  letter-spacing:.02em;
  color:#eaf2ff;
  display:flex;
  align-items:center;
  gap:10px;
  line-height:1.2;
}

.rpSub{
  margin-top:7px;
  color:rgba(226,232,240,.72);
  font-size:12.5px;
  line-height:1.5;
}

.rpBody{
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:0;
}

.rpLabel{
  font-size:12px;
  color:rgba(226,232,240,.82);
  font-weight:700;
  letter-spacing:.03em;
}

.rpInput,
.rpSearch,
.secSearch{
  width:100%;
  height:42px;
  padding:0 14px;
  border-radius:12px;
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.08);
  color:var(--text);
  outline:none;
  transition:border-color .18s ease, box-shadow .18s ease, background .18s ease, transform .18s ease;
  font-size:14px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}

.rpInput::placeholder,
.rpSearch::placeholder,
.secSearch::placeholder{
  color:rgba(255,255,255,.34);
}

.rpInput:focus,
.rpSearch:focus,
.secSearch:focus{
  border-color:#3c89e8;
  box-shadow:0 0 0 4px rgba(60,137,232,.14);
  background:rgba(255,255,255,.05);
}

.rpInput:hover,
.rpSearch:hover,
.secSearch:hover{
  border-color:rgba(60,137,232,.45);
  background:rgba(255,255,255,.045);
}

.rpRow{
  display:flex;
  gap:12px;
}

.rpCol{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
}

@media (max-width: 560px){
  .rpRow{
    flex-direction:column;
  }
}

/* ===== buttons ===== */
.rpBtns{
  display:flex;
  gap:12px;
  margin-top:4px;
}

.rpBtn{
  flex:1;
  padding:0 15px;
  border-radius:12px;
  border:1px solid transparent;
  background:#1668dc;
  color:#ffffff;
  font-weight:800;
  letter-spacing:.03em;
  cursor:pointer;
  transition:all .2s ease;
  height:42px;
  box-shadow:0 12px 24px rgba(22,104,220,.22);
}

.rpBtn:hover{
  background:#3c89e8;
  transform:translateY(-1px);
}

.rpBtn:active{
  background:#1554ad;
  transform:translateY(0);
}

.rpBtn.ghost{
  background:rgba(255,255,255,.05);
  color:rgba(226,232,240,.92);
  border-color:rgba(255,255,255,.10);
  box-shadow:none;
}

.rpBtn.ghost:hover{
  background:rgba(255,255,255,.08);
}

.rpBtn.ghost:active{
  background:rgba(255,255,255,.11);
}

.rpDivider{
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(148,163,184,.22), transparent);
  margin:14px 0 4px;
}

.rpSavedHead{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.rpTitleSmall{
  font-size:15px;
  font-weight:800;
  color:#ffffff;
  letter-spacing:.02em;
}

.rpSearch{
  width:48%;
  min-width:190px;
}

.rpListWrap{
  max-height:430px;
  overflow-y:auto;
  padding:6px;
  border-radius:16px;
  border:1px solid rgba(148,163,184,.14);
  background:rgba(255,255,255,.018);
}

.rpList{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.rpItem{
  display:flex;
  gap:12px;
  align-items:center;
  justify-content:space-between;
  padding:13px 13px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
  background:
    linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.018));
  transition:transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
}

.rpItem:hover{
  border-color:rgba(60,137,232,.30);
  background:
    linear-gradient(180deg, rgba(22,104,220,.09), rgba(255,255,255,.02));
  transform:translateY(-1px);
  box-shadow:0 12px 28px rgba(0,0,0,.18);
}

.rpMeta{
  display:flex;
  flex-direction:column;
  gap:3px;
  min-width:0;
}

.rpMeta .t{
  color:#fff;
  font-weight:1000;
  font-size:15px;
  line-height:1.2;
}

.rpMeta .s{
  color:rgba(96,165,250,.92);
  font-size:11px;
  font-weight:800;
  letter-spacing:.06em;
  text-transform:uppercase;
}

.rpMeta .u{
  color:rgba(226,232,240,.52);
  font-size:12px;
  max-width:100%;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  margin-top:3px;
}

.rpActions{
  display:flex;
  gap:8px;
  flex-shrink:0;
}

.rpMini{
  min-width:68px;
  height:36px;
  padding:0 12px;
  border-radius:12px;
  border:1px solid rgba(148,163,184,.16);
  background:rgba(255,255,255,.05);
  color:#fff;
  cursor:pointer;
  transition:.16s ease;
  font-weight:700;
}

.rpMini:hover{
  background:rgba(255,255,255,.09);
  border-color:rgba(60,137,232,.30);
}

.rpMini:active{
  transform:translateY(1px);
}

.rpMini.danger{
  color:#ff8b99;
}

/* ===== RIGHT PANEL ===== */
.section{
  padding:18px;
}

.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}

.section-title{
  font-size:18px;
  font-weight:800;
  color:#ffffff;
  display:flex;
  align-items:center;
  gap:10px;
  white-space:nowrap;
  letter-spacing:.02em;
}

.section-note{
  font-size:12px;
  color:rgba(226,232,240,.65);
  text-align:right;
  line-height:1.35;
  max-width:420px;
}

/* ===== search ===== */
.secSearch{
  width:280px;
  max-width:46%;
}

/* ===== table ===== */
.table-scroll{
  max-height:760px;
  overflow-y:auto;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.018);
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  table-layout:fixed;
}

th,
td{
  padding:12px 10px;
  font-size:13px;
  border-bottom:1px solid rgba(255,255,255,.06);
}

th{
  position:sticky;
  top:0;
  z-index:2;
  text-align:left;
  color:#ffffff;
  font-weight:900;
  letter-spacing:.07em;
  text-transform:uppercase;
  font-size:11px;
  background:linear-gradient(180deg, #1e74eb 0%, #1668dc 100%);
  box-shadow:0 1px 0 rgba(255,255,255,.04);
}

th:first-child{
  border-top-left-radius:14px;
}
th:last-child{
  border-top-right-radius:14px;
}

tbody tr{
  transition:.16s ease;
}

tbody td{
  background:rgba(255,255,255,.016);
}

tbody tr:nth-child(odd) td{
  background:rgba(255,255,255,.024);
}

tbody tr:hover td{
  background:rgba(22,104,220,.095);
}

.feature-name{
  font-weight:800;
  font-size:14px;
  color:#fff;
}

.feature-sub{
  font-size:11px;
  color:rgba(226,232,240,.48);
  margin-top:4px;
}

.col-name{
  width:54%;
  text-align:left;
}
.col-switch{
  width:20%;
  text-align:center;
}
.col-status{
  width:26%;
  text-align:center;
}

td:nth-child(2), th:nth-child(2){
  text-align:center;
}
td:nth-child(3), th:nth-child(3){
  text-align:center;
}

/* ===== switch ===== */
.switch-wrap{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.switch{
  position:relative;
  display:inline-block;
  width:52px;
  height:28px;
}

.switch input{
  opacity:0;
  width:0;
  height:0;
}

.slider{
  position:absolute;
  inset:0;
  cursor:pointer;
  background:rgba(255,255,255,.12);
  transition:.25s;
  border-radius:999px;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
}

.slider:before{
  position:absolute;
  content:"";
  height:22px;
  width:22px;
  left:3px;
  bottom:3px;
  background:linear-gradient(to bottom, #f9fafb, #e5e7eb);
  border-radius:50%;
  transition:.25s;
  box-shadow:0 1px 3px rgba(15,23,42,.7);
}

input:checked + .slider{
  background:linear-gradient(120deg, rgba(22,104,220,.95), rgba(60,137,232,.95));
  box-shadow:0 0 12px rgba(22,104,220,.40);
}

input:checked + .slider:before{
  transform:translateX(24px);
}

.status-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:90px;
  height:30px;
  padding:0 10px;
  font-size:11px;
  letter-spacing:.04em;
  gap:6px;
  border-radius:999px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  font-weight:800;
}

.hide-pill{
  color:#ffc7cf;
}

.show-pill{
  color:#cbffd9;
}

.pill-dot{
  width:7px;
  height:7px;
  border-radius:50%;
}

.pill-dot.hide{
  background:#fb7185;
  box-shadow:0 0 8px rgba(248,113,113,.6);
}

.pill-dot.show{
  background:#22c55e;
  box-shadow:0 0 8px rgba(34,197,94,.6);
}

/* ===== toast ===== */
.toast{
  position:fixed;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(2,6,23,.92);
  color:#e5e7eb;
  border-radius:14px;
  border:1px solid rgba(148,163,184,.18);
  box-shadow:var(--shadow);
  padding:12px 14px;
  font-size:12px;
  display:none;
  align-items:center;
  gap:8px;
  z-index:40;
  backdrop-filter:blur(10px);
}

.toast.show{
  display:flex;
}

.toast span.icon{
  font-size:16px;
}

/* ===== custom select style (untuk dropdown custom nanti) ===== */
.rpInput.select-hidden{
  display:none !important;
}

.custom-select{
  position:relative;
  width:100%;
}

.custom-select.is-disabled{
  opacity:.55;
  pointer-events:none;
}

.custom-select-trigger{
  width:100%;
  height:42px;
  padding:0 42px 0 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.035);
  color:#fff;
  display:flex;
  align-items:center;
  cursor:pointer;
  transition:border-color .18s ease, box-shadow .18s ease, background .18s ease;
  position:relative;
  font-size:14px;
  user-select:none;
}

.custom-select-trigger:hover{
  border-color:rgba(60,137,232,.45);
  background:rgba(255,255,255,.045);
}

.custom-select.open .custom-select-trigger{
  border-color:#3c89e8;
  box-shadow:0 0 0 4px rgba(60,137,232,.14);
  background:rgba(255,255,255,.05);
}

.custom-select-trigger::after{
  content:"";
  position:absolute;
  right:14px;
  top:50%;
  width:10px;
  height:10px;
  border-right:2px solid rgba(255,255,255,.72);
  border-bottom:2px solid rgba(255,255,255,.72);
  transform:translateY(-62%) rotate(45deg);
  transition:transform .18s ease;
}

.custom-select.open .custom-select-trigger::after{
  transform:translateY(-22%) rotate(-135deg);
}

.custom-select-menu{
  position:absolute;
  top:calc(100% + 8px);
  left:0;
  right:0;
  z-index:80;
  display:none;
  max-height:230px;
  overflow:auto;
  border-radius:14px;
  padding:6px;
  background:#0d1525;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 18px 42px rgba(0,0,0,.40);
}

.custom-select.open .custom-select-menu{
  display:block;
}

.custom-select-option{
  min-height:40px;
  padding:10px 12px;
  border-radius:10px;
  color:#fff;
  font-size:14px;
  display:flex;
  align-items:center;
  cursor:pointer;
  transition:background .15s ease, color .15s ease;
}

.custom-select-option:hover{
  background:rgba(60,137,232,.12);
}

.custom-select-option.active{
  background:rgba(22,104,220,.18);
  color:#dbeafe;
  font-weight:800;
}

/* ===== responsive ===== */
@media (max-width: 760px){
  .container{
    padding:0 14px;
  }

  .rightPanel,
  .section{
    padding:14px;
  }

  .rpSavedHead{
    flex-direction:column;
    align-items:stretch;
  }

  .rpSearch{
    width:100%;
    min-width:100%;
  }

  .section-header{
    flex-wrap:wrap;
    align-items:stretch;
  }

  .secSearch{
    width:100%;
    max-width:100%;
  }

  .rpItem{
    flex-direction:column;
    align-items:stretch;
  }

  .rpActions{
    justify-content:flex-end;
  }
}

@media (max-width: 520px){
  .rpTitle{
    font-size:23px;
  }

  .col-name{
    width:48%;
  }
  .col-switch{
    width:24%;
  }
  .col-status{
    width:28%;
  }

  th, td{
    padding:11px 8px;
  }
}
</style>
</head>
<body>
<div class="container">

  <!-- ✅ GRID: LEFT Add Tab Link, RIGHT Tab Setting -->
  <div class="pageGrid">

    <!-- ===== LEFT: ADD TAB LINK (moved here) ===== -->
    <div class="cardShell rightPanel" id="tabLinkPanel">
      <div class="rpHead">
        <div class="rpTitle">➕ Add Tab Link</div>
        <div class="rpSub">Tambah tab baru untuk Sidebar / Header (GameLog, Bank Receipt, List Type).</div>
      </div>

      <div class="rpBody">
        <label class="rpLabel">Tab Name</label>
        <input class="rpInput" id="newTabName" placeholder="Contoh: VAULT" />

        <label class="rpLabel">Tab URL</label>
        <input class="rpInput" id="newTabUrl" placeholder="https://searcfile.github.io/5g88-php/vault/" />

        <div class="rpRow">
          <div class="rpCol">
            <label class="rpLabel">Place</label>
            <select class="rpInput" id="newTabPlace">
              <option value="sidebar">Sidebar</option>
              <option value="header">Header</option>
            </select>
          </div>

          <div class="rpCol">
            <label class="rpLabel">Header Group</label>
            <select class="rpInput" id="newTabGroup" disabled>
              <option value="gamelog">GameLog</option>
              <option value="bank">Bank Receipt</option>

          <button class="rpBtn ghost" id="btnClearTab" type="button">Clear</button>
          <button class="rpBtn" id="btnAddTab" type="button">Save / Add</button>

        <div class="rpDivider"></div>

<div class="rpSavedHead">
  <div class="rpTitleSmall">Saved Custom Tabs</div>
  <input class="rpSearch" id="tabSearch" placeholder="Search tab name or URL..." />
</div>

<div class="rpListWrap" id="customTabWrap">
  <div class="rpList" id="customTabList"></div>
</div>

    <div class="cardShell section">
      <div class="section-header">
        <div class="section-title">
          <span>Tab Setting</span>
        </div>
          <input class="secSearch" id="featureSearch" placeholder="Search feature..." />
      </div>

      <div class="table-scroll">
        <table>
          <thead>
            <tr>

<div id="toast" class="toast">
  <span class="icon">✅</span>
  <span id="toastMsg">Saved</span>
</div>

<!-- ====== FIREBASE ====== -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<script>
// ==== Firebase blurphp ====
const blurphpConfig = {
  apiKey: "AIzaSyCKmrlS4qrZCrMNRIfIRCWCbNgZT1uQ3ZI",
  authDomain: "blurphp.firebaseapp.com",
  databaseURL: "https://blurphp-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "blurphp",
  storageBucket: "blurphp.appspot.com",
  messagingSenderId: "593904200464",
  appId: "1:593904200464:web:cea7bc1360532c20d99395"
};

const blurphpApp = firebase.initializeApp(blurphpConfig, "blurphp-settings");
const db        = blurphpApp.database();
const auth      = blurphpApp.auth();

// login anon supaya rules `auth != null` aman
auth.signInAnonymously().catch(err => {
  console.error("Anon auth blurphp gagal:", err);
});

// Toast helper
function showToast(msg){
  const toast = document.getElementById("toast");
  const msgEl = document.getElementById("toastMsg");
  if (!toast || !msgEl) return;
  msgEl.textContent = msg;
  toast.classList.add("show");
  setTimeout(()=> toast.classList.remove("show"), 1300);
}
function applyFeatureFilter(){
  const input = document.getElementById("featureSearch");
  const q = (input?.value || "").trim().toUpperCase();

  const tbody = document.getElementById("uiGlobalBody");
  if(!tbody) return;

  Array.from(tbody.querySelectorAll("tr")).forEach(tr=>{
    const nameEl = tr.querySelector(".feature-name");
    const label = (nameEl?.textContent || "").trim().toUpperCase();
    tr.style.display = (!q || label.includes(q)) ? "" : "none";
  });
}
function buildGlobalUiTable(list, tbody, dbNode){
  if (!tbody) return;

  tbody.innerHTML = "";
  const rowMap = {}; // reset

  list.forEach(label => {
    const tr = document.createElement("tr");

    const td1 = document.createElement("td");
    const name = document.createElement("div");
    name.className = "feature-name";
    name.textContent = label;

    const sub = document.createElement("div");
    sub.className = "feature-sub";
    sub.textContent = "Terapkan untuk semua user di homepage";

    td1.appendChild(name);
    td1.appendChild(sub);

    const td2 = document.createElement("td");
    const wrap = document.createElement("div");
    wrap.className = "switch-wrap";

    const sw = document.createElement("label");
    sw.className = "switch";

    const chk = document.createElement("input");
    chk.type = "checkbox";

    const slider = document.createElement("span");
    slider.className = "slider";

    sw.appendChild(chk);
    sw.appendChild(slider);
    wrap.appendChild(sw);
    td2.appendChild(wrap);

    const td3 = document.createElement("td");
    const pill = document.createElement("span");
    pill.className = "status-pill show-pill";

    const pillDot = document.createElement("span");
    pillDot.className = "pill-dot show";
    const pillText = document.createElement("span");
    pillText.textContent = "Shown";

    pill.appendChild(pillDot);
    pill.appendChild(pillText);
    td3.appendChild(pill);

    rowMap[label] = { chk, pill, pillDot, pillText };

    // ✅ handler toggle
    chk.addEventListener("change", () => {
      const hide = chk.checked;        // checked = hide
      const ref  = db.ref(dbNode + "/" + label);

      const op = hide ? ref.set(true) : ref.remove();

      op.then(() => {
        pill.className = hide ? "status-pill hide-pill" : "status-pill show-pill";
        pillDot.className = "pill-dot " + (hide ? "hide" : "show");
        pillText.textContent = hide ? "Inactive" : "Active";
        showToast("Saved: " + label + " → " + (hide ? "Inactive" : "Active"));
      }).catch(err => {
        console.error("Gagal simpan setting", dbNode, label, err);
        chk.checked = !hide;
        alert("Gagal simpan ke server (cek Firebase rules / internet).");
      });
    });

    tr.appendChild(td1);
    tr.appendChild(td2);
    tr.appendChild(td3);
    tbody.appendChild(tr);
  });

  return rowMap; // ✅ pulangkan mapping
}
/* ===============================
   CUSTOM TABS (Firebase)
   path: settings/uiCustomTabs/{id}
   =============================== */
const CUSTOM_TABS_NODE = "settings/uiCustomTabs";
// ===== DEFAULT FEATURES (yang memang ada dalam homepage) =====
const DEFAULT_FEATURES = [
  "LINK DOWNLOAD","ITEM COLLECTION","LIST TYPE","BANK RECEIPT","GAMELOG"
];

function toLabel(s){
  return String(s||"").trim().toUpperCase();
}

// gabung default + custom (auto)
function buildFeatureListFromCustomTabs(customObj){
  const set = new Set(DEFAULT_FEATURES.map(toLabel));

  Object.values(customObj || {}).forEach(t=>{
    const label = toLabel(t?.label);
    if(label) set.add(label);
  });

  return Array.from(set).filter(Boolean).sort((a,b)=>a.localeCompare(b));
}

function safeId(s){
  return String(s||"")
    .trim().toLowerCase()
    .replace(/\s+/g,"_")
    .replace(/[^a-z0-9_]/g,"");
}
function makeTabId(label, place, group){
  const base = safeId(label) || ("tab_" + Date.now());
  const p = (place || "sidebar").toLowerCase();
  const g = (group || "none").toLowerCase();
  return (p === "header") ? `${base}__header__${g}` : `${base}__sidebar`;
}
function isValidUrl(url){
  try{
    const u = new URL(url);
    return u.protocol === "http:" || u.protocol === "https:";
  }catch{ return false; }
}

function setGroupEnabled(){
  const placeEl = document.getElementById("newTabPlace");
  const grpEl   = document.getElementById("newTabGroup");
  if(!placeEl || !grpEl) return;
  grpEl.disabled = (placeEl.value !== "header");
}

function clearTabForm(){
  const nameEl  = document.getElementById("newTabName");
  const urlEl   = document.getElementById("newTabUrl");
  const placeEl = document.getElementById("newTabPlace");
  const grpEl   = document.getElementById("newTabGroup");
  if(nameEl) nameEl.value = "";
  if(urlEl)  urlEl.value  = "";
  if(placeEl) placeEl.value = "sidebar";
  if(grpEl) grpEl.value = "gamelog";
  setGroupEnabled();
}

function renderCustomTabList(dataObj){
  const box = document.getElementById("customTabList");
  if(!box) return;

  const entries = Object.entries(dataObj || {});
  if(!entries.length){
    box.innerHTML = `<div style="color:rgba(255,255,255,.55);font-size:12px;">No custom tabs yet.</div>`;
    return;
  }

  // sort terbaru atas
  entries.sort((a,b)=> (b[1]?.updatedAt||0) - (a[1]?.updatedAt||0));

  box.innerHTML = "";
  entries.forEach(([id, t])=>{
    const label = t?.label || id;
    const url   = t?.url || "";
    const place = t?.place || "sidebar";
    const group = t?.group || "gamelog";

    const item = document.createElement("div");
    item.className = "rpItem";

    // ✅ NEW: dataset untuk search
    item.dataset.name = String(label || "").toLowerCase();
    item.dataset.url  = String(url   || "").toLowerCase();

    item.innerHTML = `
      <div class="rpMeta">
        <div class="t">${label}</div>
        <div class="s">${place.toUpperCase()}${place==="header" ? " • "+group.toUpperCase() : ""}</div>
        <div class="u">${url}</div>
      </div>
      <div class="rpActions">
        <button class="rpMini" type="button" data-act="copy" data-id="${id}">Copy</button>
        <button class="rpMini danger" type="button" data-act="del" data-id="${id}">Delete</button>
      </div>
    `;
    box.appendChild(item);
  });
  applyTabSearchFilter();
}
function applyTabSearchFilter(){
  const input = document.getElementById("tabSearch");
  const q = (input?.value || "").trim().toLowerCase();

  document.querySelectorAll("#customTabList .rpItem").forEach(el=>{
    const n = el.dataset.name || "";
    const u = el.dataset.url  || "";
    el.style.display = (!q || n.includes(q) || u.includes(q)) ? "" : "none";
  });
}
function bindCustomTabsPanel(){
  const nameEl  = document.getElementById("newTabName");
  const urlEl   = document.getElementById("newTabUrl");
  const placeEl = document.getElementById("newTabPlace");
  const grpEl   = document.getElementById("newTabGroup");
  const addBtn  = document.getElementById("btnAddTab");
  const clrBtn  = document.getElementById("btnClearTab");
  const listBox = document.getElementById("customTabList");
  const searchEl = document.getElementById("tabSearch");
  if(searchEl){
    searchEl.addEventListener("input", applyTabSearchFilter);
  }
  if(!nameEl || !urlEl || !placeEl || !grpEl || !addBtn || !clrBtn || !listBox) return;

  placeEl.addEventListener("change", setGroupEnabled);
  setGroupEnabled();

  clrBtn.addEventListener("click", clearTabForm);

addBtn.addEventListener("click", async ()=>{
  const label = (nameEl.value || "").trim();
  const url   = (urlEl.value  || "").trim();
  const place = placeEl.value; // sidebar/header
  const group = grpEl.value;   // gamelog/bank/list

  if(!label) return alert("Isi Tab Name dulu bro.");
  if(!isValidUrl(url)) return alert("URL tak valid bro. Pastikan https://...");

  // ✅ ID unik ikut place+group
  let id = makeTabId(label, place, group);

  const payload = {
    label, url, place,
    group: (place==="header" ? group : "none"),
    updatedAt: Date.now()
  };

  try{
    // ✅ elak overwrite kalau id dah ada
    const exist = await db.ref(`${CUSTOM_TABS_NODE}/${id}`).get();
    if(exist.exists()){
      id = id + "__" + Date.now();
    }

    await db.ref(`${CUSTOM_TABS_NODE}/${id}`).set(payload);
    showToast("Saved tab: " + label);
    clearTabForm();
  }catch(err){
    console.error("Save custom tab error:", err);
    alert("Gagal save tab (cek rules Firebase).");
  }
});

  listBox.addEventListener("click", async (e)=>{
    const btn = e.target.closest("button[data-act]");
    if(!btn) return;

    const act = btn.getAttribute("data-act");
    const id  = btn.getAttribute("data-id");
    if(!id) return;

    if(act === "copy"){
      const snap = await db.ref(`${CUSTOM_TABS_NODE}/${id}`).get().catch(()=>null);
      const url = snap?.val()?.url || "";
      if(!url) return;
      navigator.clipboard.writeText(url).then(()=> showToast("Copied"));
    }

    if(act === "del"){
      if(!confirm("Delete tab ni bro?")) return;
      try{
        await db.ref(`${CUSTOM_TABS_NODE}/${id}`).remove();
        showToast("Deleted");
      }catch(err){
        console.error("Delete custom tab error:", err);
        alert("Gagal delete tab.");
      }
    }
  });
}

document.addEventListener("DOMContentLoaded", () => {
  const tbody = document.getElementById("uiGlobalBody");
  const node  = "settings/uiVisibility";
  initCustomSelects();
  let latestCustomTabs = {};
  let latestHidden = {};

  let currentRowMap = {};

  function render(){
    const features = buildFeatureListFromCustomTabs(latestCustomTabs);

    // build semula table
    currentRowMap = buildGlobalUiTable(features, tbody, node) || {};

    // apply hidden state yang current
    features.forEach(label=>{
      const ui = currentRowMap[label];
      if(!ui) return;
      const hide = !!latestHidden[label];
      ui.chk.checked          = hide;
      ui.pill.className       = hide ? "status-pill hide-pill" : "status-pill show-pill";
      ui.pillDot.className    = "pill-dot " + (hide ? "hide" : "show");
      ui.pillText.textContent = hide ? "Inactive" : "Active";
    });
  }

  // ✅ listen uiVisibility (hidden map)
  db.ref(node).on("value", snap=>{
    latestHidden = snap.val() || {};
    render();
  });

  // ✅ listen custom tabs (auto add/remove)
  db.ref(CUSTOM_TABS_NODE).on("value", snap=>{
    latestCustomTabs = snap.val() || {};
    render();                 // table kiri auto update
    renderCustomTabList(latestCustomTabs); // panel kanan pun update
  });

  // init panel kanan
  bindCustomTabsPanel();
  setGroupEnabled();
  const featureSearch = document.getElementById("featureSearch");
if(featureSearch){
  featureSearch.addEventListener("input", applyFeatureFilter);
}
applyFeatureFilter();
});
  const THEME_KEY = "siteTheme";

  function applyTheme(theme) {
    const finalTheme = theme === "dark" ? "dark" : "light";
    document.body.classList.toggle("dark-theme", finalTheme === "dark");
  }

  // apply masa mula load
  applyTheme(localStorage.getItem(THEME_KEY) || "light");

  // dengar dari parent
  window.addEventListener("message", (event) => {
    if (event.data?.type === "theme-change") {
      applyTheme(event.data.theme);
    }
  });
/* =========================
   CUSTOM SELECT UPGRADE
   ========================= */
function closeAllCustomSelect(exceptEl = null){
  document.querySelectorAll(".custom-select.open").forEach(el=>{
    if (el !== exceptEl) el.classList.remove("open");
  });
}

function syncCustomSelectDisabledState(selectEl){
  if (!selectEl) return;
  const wrap = selectEl.nextElementSibling;
  if (!wrap || !wrap.classList.contains("custom-select")) return;
  wrap.classList.toggle("is-disabled", !!selectEl.disabled);
}

function updateCustomSelectTrigger(selectEl){
  if (!selectEl) return;
  const wrap = selectEl.nextElementSibling;
  if (!wrap || !wrap.classList.contains("custom-select")) return;

  const trigger = wrap.querySelector(".custom-select-trigger");
  const options = wrap.querySelectorAll(".custom-select-option");
  const current = selectEl.options[selectEl.selectedIndex];

  if (trigger) {
    trigger.textContent = current ? current.textContent : "Select";
  }

  options.forEach(opt=>{
    const active = opt.dataset.value === selectEl.value;
    opt.classList.toggle("active", active);
  });

  syncCustomSelectDisabledState(selectEl);
}

function createCustomSelect(selectEl){
  if (!selectEl || selectEl.dataset.customized === "1") return;

  selectEl.dataset.customized = "1";
  selectEl.classList.add("select-hidden");

  const wrapper = document.createElement("div");
  wrapper.className = "custom-select";

  const trigger = document.createElement("button");
  trigger.type = "button";
  trigger.className = "custom-select-trigger";

  const menu = document.createElement("div");
  menu.className = "custom-select-menu";

  Array.from(selectEl.options).forEach(option=>{
    const item = document.createElement("div");
    item.className = "custom-select-option";
    item.textContent = option.textContent;
    item.dataset.value = option.value;

    item.addEventListener("click", ()=>{
      selectEl.value = option.value;
      updateCustomSelectTrigger(selectEl);
      wrapper.classList.remove("open");

      // trigger event supaya code lama jalan macam biasa
      selectEl.dispatchEvent(new Event("change", { bubbles:true }));
    });

    menu.appendChild(item);
  });

  trigger.addEventListener("click", ()=>{
    if (selectEl.disabled) return;
    const willOpen = !wrapper.classList.contains("open");
    closeAllCustomSelect(wrapper);
    wrapper.classList.toggle("open", willOpen);
  });

  wrapper.appendChild(trigger);
  wrapper.appendChild(menu);

  selectEl.insertAdjacentElement("afterend", wrapper);
  updateCustomSelectTrigger(selectEl);
  syncCustomSelectDisabledState(selectEl);

  // bila value select berubah dari code lain
  selectEl.addEventListener("change", ()=> updateCustomSelectTrigger(selectEl));

  // observe disabled attribute berubah dari code lama
  const mo = new MutationObserver(()=>{
    syncCustomSelectDisabledState(selectEl);
    updateCustomSelectTrigger(selectEl);
  });
  mo.observe(selectEl, { attributes:true, attributeFilter:["disabled"] });
}

function initCustomSelects(){
  createCustomSelect(document.getElementById("newTabPlace"));
  createCustomSelect(document.getElementById("newTabGroup"));
}

document.addEventListener("click", (e)=>{
  if (!e.target.closest(".custom-select")) {
    closeAllCustomSelect();
  }
});

document.addEventListener("keydown", (e)=>{
  if (e.key === "Escape") closeAllCustomSelect();
});
</script>
