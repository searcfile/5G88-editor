<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Transaction Center</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f0f;
  color:#fff;
}

/* layout */
.container {
  display:flex;
  height:100vh;
}

/* LEFT USER LIST */
.user-list {
  width:260px;
  background:#111;
  border-right:1px solid #222;
  overflow:auto;
}

.user-item {
  padding:12px;
  border-bottom:1px solid #222;
  cursor:pointer;
}

.user-item:hover {
  background:#1a1a1a;
}

.user-item.active {
  background:#222;
}

/* RIGHT CONTENT */
.content {
  flex:1;
  padding:20px;
}

/* CARDS */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
}

.card {
  background:#181818;
  padding:15px;
  border-radius:10px;
  border:1px solid #333;
}

.card h3 {
  margin:0;
  font-size:14px;
  color:#aaa;
}

.card .value {
  font-size:22px;
  margin-top:8px;
  color:#ffd700;
}

/* HEADER */
.header {
  margin-bottom:15px;
}

.header h2 {
  margin:0;
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="user-list" id="userList"></div>

  <!-- RIGHT -->
  <div class="content">
    <div class="header">
      <h2 id="userTitle">Select User</h2>
    </div>

    <div class="grid" id="statsGrid"></div>
  </div>

</div>

<script>
// 🔥 GUNA blurphp firebase (sama macam system kau)
const firebaseConfig = {
  apiKey: "AIzaSyCKmrlS4qrZCrMNRIfIRCWCbNgZT1uQ3ZI",
  authDomain: "blurphp.firebaseapp.com",
  databaseURL: "https://blurphp-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "blurphp"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// =============================
// LOAD USER LIST
// =============================
const userListEl = document.getElementById("userList");
const statsGrid = document.getElementById("statsGrid");
const userTitle = document.getElementById("userTitle");

let currentUser = null;

// ambil semua user summary
db.ref("transactionSummary/byUser").on("value", snap => {
  const data = snap.val() || {};
  userListEl.innerHTML = "";

  Object.entries(data).forEach(([key, user]) => {
    const div = document.createElement("div");
    div.className = "user-item";
    div.textContent = user.name || user.email;

    div.onclick = () => {
      document.querySelectorAll(".user-item").forEach(el=>el.classList.remove("active"));
      div.classList.add("active");

      currentUser = user;
      renderUserDetail(user);
    };

    userListEl.appendChild(div);
  });
});

// =============================
// RENDER DETAIL
// =============================
function renderUserDetail(user) {
  if (!user) return;

  userTitle.textContent = user.name + " (" + user.email + ")";
  statsGrid.innerHTML = "";

  const tabs = user.tabs || {};

  Object.entries(tabs).forEach(([tab, count]) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${tab}</h3>
      <div class="value">${count} kali</div>
    `;

    statsGrid.appendChild(card);
  });

  // total card
  const totalCard = document.createElement("div");
  totalCard.className = "card";
  totalCard.innerHTML = `
    <h3>TOTAL</h3>
    <div class="value">${user.total || 0}</div>
  `;
  statsGrid.appendChild(totalCard);
}

</script>

</body>
</html>
